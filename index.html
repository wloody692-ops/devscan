<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
min-height:100vh;
}

.header{
padding:14px;
text-align:center;
background:rgba(16,185,129,0.08);
border-bottom:1px solid #10b981;
position:sticky;
top:0;
}

.header h1{
margin:0;
font-size:28px;
color:#10b981;
}

.container{
padding:12px;
max-width:900px;
margin:auto;
}

.searchBox{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #10b981;
background:#062d1d;
color:white;
outline:none;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#10b981;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:15px;
padding:15px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:6px;
font-size:12px;
background:#10b981;
color:black;
}
</style>
</head>

<body>

<div class="header">
  <h1>DevScan</h1>
</div>

<div class="container">

<div class="searchBox">
<input id="token" placeholder="Paste token address">
<button onclick="scan()">Analyze</button>
</div>

<div id="result"></div>

</div>

<script>

// ===== DEV WALLET (simple + stable) =====
async function getDevWallet(token){

try{

const r = await fetch("https://api.dexscreener.com/latest/dex/tokens/"+token);
const data = await r.json();

const pair = data.pairs?.[0];

// أفضل احتمال للديف (بدون تعقيد زائد)
if(pair?.pairAddress) return pair.pairAddress;

if(pair?.baseToken?.address) return pair.baseToken.address;

return "Unknown";

}catch(e){
return "Unknown";
}
}

// ===== HOLDERS =====
function holderScore(volume, liquidity){

let bot = 50;

if(volume > liquidity * 4) bot += 25;
if(liquidity < 5000) bot += 20;
if(volume < 20000) bot -= 20;

bot = Math.max(0, Math.min(100, bot));

return {
bot,
real: 100 - bot
};
}

// ===== WHALES =====
function whales(volume, liquidity){

let p = Math.min(100, (volume / (liquidity + 1)) * 25);

return p;
}

// ===== RUG =====
function rug(liquidity, volume, whale){

let r = 30;

if(liquidity < 3000) r += 30;
if(volume > liquidity * 4) r += 25;
if(whale > 60) r += 15;

return Math.min(100, r);
}

// ===== MAIN =====
async function scan(){

const token = document.getElementById("token").value.trim();
const result = document.getElementById("result");

if(!token){
result.innerHTML="❌ اكتب التوكن";
return;
}

result.innerHTML="⏳ Loading...";

try{

const r = await fetch("https://api.dexscreener.com/latest/dex/tokens/"+token);
const data = await r.json();

if(!data.pairs){
result.innerHTML="❌ No data";
return;
}

const p = data.pairs[0];

const liquidity = p.liquidity?.usd || 0;
const volume = p.volume?.h24 || 0;

const whale = whales(volume, liquidity);
const rugRisk = rug(liquidity, volume, whale);
const holder = holderScore(volume, liquidity);

let score = 50;
if(liquidity > 20000) score += 20;
if(liquidity < 3000) score -= 25;
if(volume > 100000) score += 15;

const devWallet = await getDevWallet(token);

let status = "🟢 SAFE";
if(score < 40 || rugRisk > 70) status = "🔴 HIGH RISK";
else if(score < 70) status = "🟡 MID";

result.innerHTML=`
<div class="card">

<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>

<p>💧 Liquidity: $${Math.round(liquidity)}</p>
<p>📊 Volume: $${Math.round(volume)}</p>

<hr>

<h2>Score: ${Math.round(score)}/100</h2>
<span class="badge">${status}</span>

<hr>

<h3>🧬 Dev Wallet</h3>
<p style="word-break:break-all">${devWallet}</p>

<hr>

<h3>🧠 Holders</h3>
<p>Bot Score: ${holder.bot}%</p>
<p>Real Holders: ${holder.real}%</p>

<hr>

<h3>🐋 Whales</h3>
<p>${Math.round(whale)}%</p>

<hr>

<h3>💀 Rug Risk</h3>
<p>${Math.round(rugRisk)}%</p>

</div>
`;

}catch(e){
result.innerHTML="❌ Error";
}

}

</script>

</body>
</html>
