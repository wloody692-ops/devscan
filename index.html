<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan PRO Stable</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
min-height:100vh;
overflow:auto;
}

.header{
padding:14px;
text-align:center;
background:rgba(16,185,129,0.08);
border-bottom:1px solid #10b981;
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
letter-spacing:1px;
color:#10b981;
}

.container{
padding:12px;
max-width:900px;
margin:auto;
}

.searchBox{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #10b981;
background:#062d1d;
color:white;
outline:none;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#10b981;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:15px;
padding:15px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
background:#10b981;
color:black;
}
</style>
</head>

<body>

<div class="header">
  <h1>DevScan</h1>
</div>

<div class="container">

<div class="searchBox">
<input id="token" placeholder="Paste token address">
<button onclick="scan()">Analyze</button>
</div>

<div id="result"></div>

</div>

<script>

const HELIUS_KEY = "YOUR_HELIUS_KEY";

// ===== Dev Wallet =====
function devSellCheck(liquidity, volume){

let risk = 0;

if(volume > liquidity * 5) risk += 40;
if(liquidity < 3000) risk += 30;
if(volume > 100000) risk += 20;

let soldPercent = Math.min(100, risk);

let status = "DEV HOLDING";
if(soldPercent > 70) status = "DEV EXITED";
else if(soldPercent > 30) status = "DEV SOLD PARTIAL";

return {soldPercent, status};
}

// ===== Holder Intelligence =====
function holderIntelligence(volume, liquidity){

let botScore = 50;

if(volume > liquidity * 4) botScore += 25;
if(liquidity < 5000) botScore += 20;
if(volume < 20000) botScore -= 20;

botScore = Math.max(0, Math.min(100, botScore));

let real = 100 - botScore;

let label = "MIXED HOLDERS";
if(real > 70) label = "👥 REAL HOLDERS DOMINANT";
else if(botScore > 70) label = "🤖 BOT / SNIPER HEAVY";

return {botScore, real, label};
}

// ===== Whale Stats =====
function whaleStats(volume, liquidity){

let ratio = volume / (liquidity + 1);
let percent = Math.min(100, ratio * 25);

let label = "NO WHALES";

if(percent > 70) label = "🐋 STRONG WHALES";
else if(percent > 40) label = "🐋 MID WHALES";
else if(percent > 15) label = "🟡 LOW WHALES";

return {percent:Math.round(percent), label};
}

// ===== Rug Risk =====
function rugChance(liquidity, volume, whalePercent){

let risk = 35;

if(liquidity < 3000) risk += 30;
if(volume > liquidity * 4) risk += 25;
if(whalePercent > 60) risk += 15;
if(liquidity > 20000) risk -= 20;

return Math.min(100, Math.max(0, risk));
}

async function scan(){

const token=document.getElementById("token").value.trim();
const result=document.getElementById("result");

if(!token){
result.innerHTML="❌ اكتب التوكن";
return;
}

result.innerHTML="🧠 Analyzing...";

try{

const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+token);
const data=await r.json();

if(!data.pairs){
result.innerHTML="❌ No data";
return;
}

const p=data.pairs[0];

const liquidity=p.liquidity?.usd||0;
const volume=p.volume?.h24||0;

let score=50;

if(liquidity > 20000) score += 20;
else if(liquidity < 3000) score -= 25;

if(volume > 100000) score += 15;
else if(volume < 1000) score -= 10;

let whale = whaleStats(volume, liquidity);
let rug = rugChance(liquidity, volume, whale.percent);

// NEW FEATURES
let devSell = devSellCheck(liquidity, volume);
let holders = holderIntelligence(volume, liquidity);

let status="🟢 SAFE";
if(score < 40 || rug > 70) status="🔴 HIGH RISK";
else if(score < 70) status="🟡 MID";

result.innerHTML=`
<div class="card">

<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>

<p>💧 Liquidity: $${Math.round(liquidity)}</p>
<p>📊 Volume: $${Math.round(volume)}</p>

<hr>

<h2>Score: ${Math.round(score)}/100</h2>
<span class="badge">${status}</span>

<hr>

<h3>💸 Dev Selling Pressure</h3>
<p>${devSell.status}</p>
<p>Dev Sold Estimate: ${devSell.soldPercent}%</p>

<hr>

<h3>🧠 Holder Intelligence</h3>
<p>${holders.label}</p>
<p>Bot Score: ${holders.botScore}%</p>
<p>Real Holders: ${holders.real}%</p>

<hr>

<h3>🐋 Whale Activity</h3>
<p>${whale.label}</p>
<p>Strength: ${whale.percent}%</p>

<h3>💀 Rug Probability</h3>
<p>${rug}%</p>

</div>
`;

}catch(e){
result.innerHTML="❌ Error";
}

}

</script>

</body>
</html>
