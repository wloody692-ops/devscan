<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
background:rgba(16,185,129,0.08);
border-bottom:1px solid #10b981;
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.header a{
display:block;
margin-top:6px;
color:#10b981;
text-decoration:none;
font-weight:bold;
}

.container{
padding:12px;
max-width:900px;
margin:auto;
}

.searchBox{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:1px solid #10b981;
background:#062d1d;
color:white;
outline:none;
}

button{
padding:14px 18px;
border:none;
border-radius:10px;
background:#10b981;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:15px;
padding:15px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:bold;
background:#10b981;
color:black;
}

.green{color:#00ff88;font-weight:bold;}
.red{color:#ff3b3b;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<h1>DEVSCAN</h1>

<a href="https://twitter.com/devscan1" target="_blank">
Twitter
</a>

</div>

<div class="container">

<div class="searchBox">
<input id="token" placeholder="Paste token address">
<button onclick="scan()">Analyze</button>
</div>

<div id="result"></div>

</div>

<script>

const HELIUS_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";

/* ================= MINT ================= */
async function getMintAuthority(mint){
try{
const r=await fetch(`https://api.helius.xyz/v0/mints/${mint}?api-key=${HELIUS_KEY}`);
const d=await r.json();
return d?.mintAuthority||null;
}catch{return null}
}

/* ================= CREATOR ================= */
async function getStableCreator(mint){
try{
const r=await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=100`);
const d=await r.json();

let freq={};

d?.forEach(tx=>{
if(tx.feePayer){
freq[tx.feePayer]=(freq[tx.feePayer]||0)+2;
}
});

return Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;

}catch{return null}
}

/* ================= DEV SELL DETECTION (NEW) ================= */
async function detectDevSell(wallet){

try{
if(!wallet || wallet==="Unknown") return {status:"UNKNOWN",score:0};

const r = await fetch(
`https://api.helius.xyz/v0/addresses/${wallet}/transactions?api-key=${HELIUS_KEY}&limit=50`
);

const txs = await r.json();

let sells = 0;
let buys = 0;

txs?.forEach(tx=>{
if(tx.type==="SWAP"){
if(tx.description?.toLowerCase().includes("sell")) sells++;
if(tx.description?.toLowerCase().includes("buy")) buys++;
}
});

let score = sells - buys;

let status = "HOLDING";

if(score > 5) status = "DUMPING";
else if(score > 2) status = "SELLING";
else status = "HOLDING";

return {status, score};

}catch{
return {status:"UNKNOWN",score:0};
}
}

/* ================= WHALE ================= */
function whaleStats(volume,liquidity){

let ratio=volume/(liquidity+1);
let percent=Math.min(100,ratio*25);

let label="LOW";

if(percent>60) label="HIGH";
else if(percent>30) label="MID";

return {percent:Math.round(percent),label};
}

/* ================= RUG ================= */
function rugChance(liquidity,volume,whale){

let r=30;

if(liquidity<3000) r+=30;
if(volume>liquidity*3) r+=20;
if(whale>60) r+=20;
if(liquidity>20000) r-=20;

return Math.max(0,Math.min(100,r));
}

/* ================= MAIN ================= */
async function scan(){

const token=document.getElementById("token").value.trim();
const result=document.getElementById("result");

if(!token){
result.innerHTML="Enter token";
return;
}

result.innerHTML="Analyzing...";

try{

const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+token);
const data=await r.json();

if(!data.pairs){
result.innerHTML="No data";
return;
}

const p=data.pairs[0];

let liquidity=p.liquidity?.usd||0;
let volume=p.volume?.h24||0;

let score=50;

if(liquidity>20000) score+=20;
else if(liquidity<3000) score-=25;

if(volume>100000) score+=15;
else if(volume<1000) score-=10;

let mintAuth=await getMintAuthority(token);
let creator=await getStableCreator(token);

/* DEV SELL CHECK */
let devSell = await detectDevSell(mintAuth || creator);

/* WHALE */
let whale=whaleStats(volume,liquidity);

/* RUG */
let rug=rugChance(liquidity,volume,whale.percent);

/* STATUS */
let status="🟢 SAFE";
if(score<40||rug>70) status="🔴 RISK";
else if(score<70) status="🟡 MID";

result.innerHTML=`
<div class="card">

<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>

<p>Liquidity: $${Math.round(liquidity)}</p>
<p>Volume: $${Math.round(volume)}</p>

<hr>

<h3>Score: ${Math.round(score)}/100</h3>
<span class="badge">${status}</span>

<hr>

<h3>Dev Wallet</h3>
<p>${mintAuth || creator || "Unknown"}</p>

<h3>Dev Status</h3>
<p class="${devSell.status==='DUMPING'?'red':'green'}">
${devSell.status}
</p>

<hr>

<h3>Whales</h3>
<p>${whale.label}</p>
<p>${whale.percent}%</p>

<h3>Rug Risk</h3>
<p>${rug}%</p>

</div>
`;

}catch(e){
result.innerHTML="Error";
}

}

</script>

</body>
</html>
