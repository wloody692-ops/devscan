function switchTab(tab, el){

  document.getElementById('tab-'+tab).classList.add('active');

}
function dexLink(address,url){ return url||`https://dexscreener.com/solana/${address}`; }
function fmt(n){ return Math.round(n).toLocaleString(); }

// ── Liquidity Lock ────────────────────────────────────────────────────
async function checkLiquidityLock(pairAddress, mintAddress){
  try{
    const r2 = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${pairAddress}`);
    const d2 = await r2.json();
    const pair = d2?.pairs?.[0] || d2?.pair;
    if(!pair) return { locked:false, label:"Unknown", score:0 };
    const liq = pair.liquidity?.usd||0;
    const created = pair.pairCreatedAt||0;
    const ageHours = created?(Date.now()-created)/3600000:0;
    const liqH1 = pair.liquidity?.h1Change||0;
    const liqStable = Math.abs(liqH1)<15;
    if(liq>50000&&ageHours>48&&liqStable) return {locked:true,label:"🔒 LP Stable/Locked",score:30,liq,ageHours};
    if(liq>20000&&ageHours>24) return {locked:true,label:"🔐 LP Likely Safe",score:20,liq,ageHours};
    if(ageHours<2) return {locked:false,label:"⚠️ Very New",score:-10,liq,ageHours};
    return {locked:false,label:"🔓 LP Not Confirmed",score:0,liq,ageHours};
  }catch(e){ return {locked:false,label:"Unknown",score:0}; }
}

// ── Real Volume Detection (KEY FIX) ───────────────────────────────────
// Checks if volume is organic: many unique wallets, varied amounts, no loop patterns
async function analyzeRealVolume(mint, reportedVol, liq){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=50`);
    const txs = await r.json();
    if(!txs||!Array.isArray(txs)||txs.length<3) return { real:false, score:0, label:"❌ No TX Data", uniqueBuyers:0 };

    const buyWallets = new Set();
    const sellWallets = new Set();
    const amounts = [];
    const slots = [];
    let sameSlotCount = 0;
    let prevSlot = null;
    let tinyTxCount = 0; // <$1 = likely bots/wash

    for(let tx of txs){
      if(!tx.tokenTransfers) continue;
      const fp = tx.feePayer;
      if(!fp || IGNORE.has(fp)) continue;

      // Detect same-slot clustering (wash trading pattern)
      if(tx.slot === prevSlot) sameSlotCount++;
      prevSlot = tx.slot;
      slots.push(tx.slot);

      for(let t of tx.tokenTransfers){
        const amt = t.tokenAmount || 0;
        if(amt < 100) { tinyTxCount++; continue; } // skip dust
        amounts.push(amt);

        // Heuristic: toUserAccount = buyer, fromUserAccount = seller
        if(t.toUserAccount && !IGNORE.has(t.toUserAccount)) buyWallets.add(t.toUserAccount);
        if(t.fromUserAccount && !IGNORE.has(t.fromUserAccount)) sellWallets.add(t.fromUserAccount);
      }
    }

    const uniqueBuyers = buyWallets.size;
    const totalTxs = txs.length;
    const washRatio = sameSlotCount / Math.max(totalTxs, 1);
    const tinyRatio = tinyTxCount / Math.max(txs.length, 1);

    // Unique wallets per volume = organic signal
    // If only 1-2 wallets doing all trades = wash trading
    const walletDiversity = uniqueBuyers / Math.max(totalTxs, 1);

    // Amount variance check — bots use round/same numbers
    let amountVariance = 0;
    if(amounts.length > 3){
      const avg = amounts.reduce((a,b)=>a+b,0)/amounts.length;
      const variance = amounts.reduce((s,a)=>s+Math.pow(a-avg,2),0)/amounts.length;
      amountVariance = Math.sqrt(variance)/avg; // coefficient of variation
    }

    let score = 50;

    // Unique buyers boost (most important)
    if(uniqueBuyers >= 20) score += 30;
    else if(uniqueBuyers >= 10) score += 20;
    else if(uniqueBuyers >= 5) score += 10;
    else score -= 25; // very few unique buyers = bad

    // Wash trading penalty
    if(washRatio > 0.4) score -= 30;
    else if(washRatio > 0.2) score -= 15;

    // Tiny tx penalty (bot/dust)
    if(tinyRatio > 0.5) score -= 20;

    // Wallet diversity (good if many wallets relative to txs)
    if(walletDiversity > 0.5) score += 15;
    else if(walletDiversity < 0.15) score -= 20;

    // Amount variance (real humans use varied amounts)
    if(amountVariance > 0.8) score += 10;
    else if(amountVariance < 0.1) score -= 15; // all same amount = bot

    score = Math.min(100, Math.max(0, score));
    const real = score >= 55 && uniqueBuyers >= 5;

    const label = score >= 75 ? `✅ ${uniqueBuyers} Real Buyers` :
                  score >= 55 ? `🟡 Mostly Real (${uniqueBuyers} wallets)` :
                  score >= 35 ? `🟡 Mixed Volume` :
                  `❌ Suspicious Volume`;

    return { real, score, label, uniqueBuyers, washRatio:Math.round(washRatio*100) };
  }catch(e){
    return { real:false, score:0, label:"Unknown", uniqueBuyers:0 };
  }
}

// ── Real Whale Detection (IMPROVED) ──────────────────────────────────
// A real whale = one wallet, large single purchase, holds position
async function detectRealWhales(mint, liquidity, volume){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=50`);
    const txs = await r.json();
    if(!txs||!Array.isArray(txs)) return { hasRealWhales:false, label:"Unknown", whaleScore:0, realWhaleCount:0 };

    const walletData = {};

    for(let tx of txs){
      if(!tx.tokenTransfers) continue;
      const fp = tx.feePayer;
      if(!fp || IGNORE.has(fp)) continue;

      if(!walletData[fp]) walletData[fp] = { txCount:0, totalAmt:0, slots:new Set(), isSeller:false };
      walletData[fp].txCount++;
      walletData[fp].slots.add(tx.slot);

      for(let t of tx.tokenTransfers){
        const amt = t.tokenAmount||0;
        walletData[fp].totalAmt += amt;
        // If sending tokens away = likely selling
        if(t.fromUserAccount === fp) walletData[fp].isSeller = true;
      }
    }

    const entries = Object.entries(walletData);
    const totalWallets = entries.length;

    // Real whale criteria:
    // - 1 to 4 transactions (not a bot with 10+ txs)
    // - Large total amount relative to supply
    // - Not identified as a seller (dumper)
    // - Not in IGNORE list
    const realWhales = entries.filter(([w, d]) =>
      d.txCount >= 1 &&
      d.txCount <= 4 &&
      d.totalAmt > 800000 &&
      !d.isSeller &&
      !IGNORE.has(w)
    );

    // Bot wallets: high tx count, round amounts
    const botWallets = entries.filter(([w, d]) => d.txCount > 7);
    const botRatio = botWallets.length / Math.max(totalWallets, 1);

    const realWhaleCount = realWhales.length;

    let whaleScore = 0;
    if(realWhaleCount >= 4) whaleScore = 100;
    else if(realWhaleCount === 3) whaleScore = 80;
    else if(realWhaleCount === 2) whaleScore = 60;
    else if(realWhaleCount === 1) whaleScore = 35;

    // Penalize if bots dominate
    if(botRatio > 0.5) whaleScore -= 40;
    else if(botRatio > 0.3) whaleScore -= 20;

    // Penalize if whales are also sellers
    const whaleSellerCount = realWhales.filter(([,d])=>d.isSeller).length;
    if(whaleSellerCount > 0) whaleScore -= whaleSellerCount * 15;

    whaleScore = Math.min(100, Math.max(0, whaleScore));

    const hasRealWhales = realWhaleCount >= 2 && botRatio < 0.45 && whaleScore >= 50;
    const label = whaleScore >= 80 ? `🐋 ${realWhaleCount} Strong Whales` :
                  whaleScore >= 60 ? `🐋 ${realWhaleCount} Real Whales` :
                  whaleScore >= 35 ? `🟡 Weak Whale Signal` :
                  `❌ No Real Whales`;

    return { hasRealWhales, label, whaleScore, realWhaleCount, botRatio:Math.round(botRatio*100) };
  }catch(e){ return { hasRealWhales:false, label:"Unknown", whaleScore:0, realWhaleCount:0 }; }
}

// ── Holder Distribution ───────────────────────────────────────────────
async function getHolderData(mint){
  try{
    const r = await fetch(`https://mainnet.helius-rpc.com/?api-key=${HELIUS_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getTokenLargestAccounts',params:[mint]})
    });
    const d = await r.json();
    const holders = d?.result?.value||[];
    if(!holders.length) return null;
    const total = holders.reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0);
    if(!total) return null;
    const top1  = (parseFloat(holders[0]?.uiAmount)||0)/total*100;
    const top5  = holders.slice(0,5).reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0)/total*100;
    const top10 = holders.slice(0,10).reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0)/total*100;
    const label = top1>25?"🔴 Top wallet holds too much":top5>55?"🟡 Concentrated top 5":top10>75?"🟡 Moderate":"🟢 Healthy distribution";
    const distScore = Math.max(0, 100 - top5 - (top1>15?25:0) - (top10>80?10:0));
    return { top1:top1.toFixed(1), top5:top5.toFixed(1), top10:top10.toFixed(1), label, distScore:Math.round(distScore) };
  }catch(e){ return null; }
}

// ── Bot Activity ──────────────────────────────────────────────────────
async function analyzeBotActivity(mint){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=40`);
    const txs = await r.json();
    if(!txs||!Array.isArray(txs)) return {botScore:50,label:"Unknown"};
    const fps={};
    let sameBlock=0,prevSlot=null,roundBuys=0;
    for(let tx of txs){
      const fp=tx.feePayer;
      if(fp&&!IGNORE.has(fp)) fps[fp]=(fps[fp]||0)+1;
      if(tx.slot===prevSlot) sameBlock++;
      prevSlot=tx.slot;
      if(tx.tokenTransfers) for(let t of tx.tokenTransfers){
        const s=String(Math.round(t.tokenAmount||0));
        if(s.endsWith('0000')||s.endsWith('00000')) roundBuys++;
      }
    }
    const multiWallets=Object.values(fps).filter(v=>v>3).length;
    const uniq=Object.keys(fps).length;
    let botScore=0;
    if(sameBlock>5) botScore+=40;
    else if(sameBlock>2) botScore+=20;
    if(multiWallets>4) botScore+=30;
    else if(multiWallets>2) botScore+=15;
    if(roundBuys>6) botScore+=20;
    const diversityRatio=uniq/Math.max(txs.length,1);
    if(diversityRatio<0.3) botScore+=20;
    botScore=Math.min(100,botScore);
    const label=botScore>60?"🔴 HIGH BOT ACTIVITY":botScore>35?"🟡 SOME BOTS":"🟢 MOSTLY REAL";
    return {botScore,label,uniqueWallets:uniq};
  }catch(e){ return {botScore:50,label:"Unknown"}; }
}

// ── Dev Functions ─────────────────────────────────────────────────────
async function getMintAuthority(mint){
  try{
    const r=await fetch(`https://api.helius.xyz/v0/mints/${mint}?api-key=${HELIUS_KEY}`);
    const d=await r.json();
    const a=d?.mintAuthority;
    return (a&&!IGNORE.has(a))?a:null;
  }catch(e){ return null; }
}
async function getRealDev(mint){
  if(devCache[mint]) return devCache[mint];
  try{
    const r=await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=25`);
    const txs=await r.json();
    if(!txs||!Array.isArray(txs)||!txs.length) return null;
    const sorted=[...txs].sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    const cands={};
    for(let tx of sorted.slice(0,5)){
      const fp=tx.feePayer;
      if(fp&&!IGNORE.has(fp)&&fp!==mint) cands[fp]=(cands[fp]||0)+1;
    }
    const sc=Object.entries(cands).sort((a,b)=>b[1]-a[1]);
    if(!sc.length) return null;
    const res={wallet:sc[0][0],source:"Fee Payer (Oldest TX)"};
    devCache[mint]=res;
    return res;
  }catch(e){ return null; }
}
async function getDevHistory(devWallet,currentMint){
  try{
    const r=await fetch(`https://api.helius.xyz/v0/addresses/${devWallet}/transactions?api-key=${HELIUS_KEY}&limit=50`);
    const txs=await r.json();
    if(!txs||!Array.isArray(txs)) return [];
    let mints=new Set();
    txs.forEach(tx=>{
      if(tx.feePayer===devWallet&&tx.tokenTransfers)
        tx.tokenTransfers.forEach(t=>{if(t.mint&&t.mint!==currentMint&&!IGNORE.has(t.mint)) mints.add(t.mint);});
    });
    const toCheck=[...mints].reverse().slice(0,3);
    const results=await Promise.allSettled(toCheck.map(m=>fetch("https://api.dexscreener.com/latest/dex/tokens/"+m).then(r=>r.json())));
    let history=[];
    results.forEach(res=>{
      if(res.status==="fulfilled"&&res.value.pairs?.length>0){
        const p=res.value.pairs[0];const liq=p.liquidity?.usd||0;
        history.push({name:p.baseToken.name||"Unknown",symbol:p.baseToken.symbol||"?",liquidity:liq,alive:liq>1000});
      }
    });
    return history;
  }catch(e){ return []; }
}
function resolveDev(mintAuth,realDev){
  if(mintAuth) return {wallet:mintAuth,type:"Mint Authority (CONFIRMED DEV)"};
  if(realDev) return {wallet:realDev.wallet,type:`Early Dev Wallet (${realDev.source})`};
  return {wallet:"Unknown",type:"Unverified"};
}
function rugChance(liquidity,volume,whaleScore,botScore){
  let r=30;
  if(liquidity<5000) r+=35;
  else if(liquidity<15000) r+=15;
  if(volume>liquidity*6) r+=20;
  if(whaleScore>70) r-=10;
  if(botScore>60) r+=20;
  if(liquidity>30000) r-=15;
  return Math.min(100,Math.max(0,r));
}
function buildHistoryHTML(history){
  if(!history||!history.length) return `<p style="color:#6ee7b7;font-size:13px">No previous tokens found</p>`;
  const dead=history.filter(h=>!h.alive).length,total=history.length;
  const verdict=dead===total?`🔴 All rugged — HIGH RISK`:dead>total/2?`🟡 Most rugged (${dead}/${total})`:`🟢 Has survivors (${total-dead}/${total})`;
  return `<p style="margin-bottom:6px"><strong>${verdict}</strong></p>`+
    history.map(h=>`<div class="history-item ${h.alive?'history-alive':'history-dead'}">
      ${h.alive?'🟢':'🔴'} <strong>${h.name} (${h.symbol})</strong> — $${fmt(h.liquidity)} ${h.alive?'✅':'💀'}
    </div>`).join('');
}

// ── Scan Tab ──────────────────────────────────────────────────────────
async function scan(){
  const token=document.getElementById("token").value.trim();
  const result=document.getElementById("result");
  if(!token){result.innerHTML="❌ Enter token address";return;}
  result.innerHTML="🧠 Deep scanning...";
  try{
    const [dexRes,mintAuth,realDev]=await Promise.all([
      fetch("https://api.dexscreener.com/latest/dex/tokens/"+token).then(r=>r.json()),
      getMintAuthority(token),getRealDev(token)
    ]);
    if(!dexRes.pairs){result.innerHTML="❌ No data found";return;}
    const p=dexRes.pairs[0];
    const liq=p.liquidity?.usd||0,vol=p.volume?.h24||0,fdv=p.fdv||p.marketCap||0;
    const pairAddr=p.pairAddress||token;
    const devInfo=resolveDev(mintAuth,realDev);
    result.innerHTML="⏳ Analyzing holders, whales, volume quality...";
    const [history,holderData,botData,whaleData,lockData,volData]=await Promise.all([
      devInfo.wallet!=="Unknown"?getDevHistory(devInfo.wallet,token):Promise.resolve([]),
      getHolderData(token),analyzeBotActivity(token),
      detectRealWhales(token,liq,vol),
      checkLiquidityLock(pairAddr,token),
      analyzeRealVolume(token,vol,liq)
    ]);
    let score=50;
    if(liq>30000) score+=20; else if(liq<5000) score-=25;
    if(vol>100000) score+=15; else if(vol<1000) score-=10;
    if(volData.real) score+=15; else score-=15;
    if(history.length){
      const dead=history.filter(h=>!h.alive).length/history.length;
      if(dead===1) score-=25; else if(dead>0.6) score-=15; else if(dead<0.3) score+=10;
    }
    if(holderData) score=Math.round(score*(holderData.distScore/100*0.4+0.6));
    if(botData.botScore>60) score-=25; else if(botData.botScore<25) score+=10;
    if(whaleData.whaleScore>70) score+=20; else if(whaleData.whaleScore<30) score-=15;
    if(lockData.locked) score+=15; else score-=10;
    score=Math.min(100,Math.max(0,score));
    const rug=rugChance(liq,vol,whaleData.whaleScore,botData.botScore);
    const status=score>=75&&rug<35?"🟢 LOOKS SOLID":score>=55?"🟡 MODERATE":score<40||rug>65?"🔴 HIGH RISK":"🟡 MID";
    const badgeClass=score>=75?"badge-safe":score>=55?"badge-mid":"badge-risk";
    result.innerHTML=`
<div class="card">
  <h2>${p.baseToken.name} <span style="color:#6ee7b7">(${p.baseToken.symbol})</span></h2>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">
    <span class="hot-stat green">💧 $${fmt(liq)}</span>
    <span class="hot-stat green">📊 $${fmt(vol)}</span>
    ${fdv?`<span class="hot-stat yellow">💰 $${fmt(fdv)}</span>`:''}
    <span class="lock-badge ${lockData.locked?'lock-yes':'lock-no'}">${lockData.label}</span>
  </div>
  <div class="card-actions">
    <a class="dex-btn" href="${dexLink(token,p.url)}" target="_blank">📈 Open on DEX</a>
  </div>
  <hr>
  <h2>Score: ${Math.round(score)}/100 &nbsp;<span class="badge ${badgeClass}">${status}</span></h2>
  <div class="score-bar"><div class="score-fill ${score>=75?'gold':''}" style="width:${score}%"></div></div>
  <hr>
  <h3>📊 Volume Quality</h3>
  <p>${volData.label} &nbsp;|&nbsp; Unique Buyers: <strong>${volData.uniqueBuyers}</strong></p>
  <hr>
  <h3>🐋 Real Whale Analysis</h3>
  <p>${whaleData.label}</p>
  <div class="whale-row">
    <span style="font-size:13px;min-width:60px">Strength</span>
    <div class="whale-bar"><div class="whale-fill" style="width:${whaleData.whaleScore}%"></div></div>
    <span style="font-size:13px;min-width:35px">${whaleData.whaleScore}%</span>
  </div>
  <hr>
  <h3>🤖 Bot Activity</h3>
  <p>${botData.label} &nbsp;|&nbsp; Bot Risk: <strong>${botData.botScore}%</strong></p>
  ${holderData?`<hr>
  <h3>👥 Holder Distribution</h3>
  <p>${holderData.label}</p>
  <p style="font-size:13px">Top1: <strong>${holderData.top1}%</strong> &nbsp; Top5: <strong>${holderData.top5}%</strong> &nbsp; Top10: <strong>${holderData.top10}%</strong></p>`:''}
  <hr>
  <h3>🧬 Dev Wallet</h3>
  <p style="word-break:break-all;font-size:13px">${devInfo.wallet}</p>
  <p style="font-size:12px;color:#6ee7b7">${devInfo.type}</p>
  <hr>
  <h3>📜 Dev History</h3>
  ${buildHistoryHTML(history)}
  <hr>
  <h3>💀 Rug Probability: ${rug}%</h3>
</div>`;
  }catch(e){result.innerHTML="❌ Error: "+e.message;}
}

// ── Hot Filter (FULLY REWORKED) ───────────────────────────────────────
function calcHotScore(liq, vol, change, distScore, botScore, whaleScore, volScore, lockScore){
  let s = 0;

  // Volume/Liquidity ratio (organic momentum)
  const ratio = vol/(liq+1);
  if(ratio>4) s+=25; else if(ratio>2) s+=18; else if(ratio>1) s+=10; else s+=2;

  // Liquidity depth
  if(liq>200000) s+=25; else if(liq>100000) s+=20; else if(liq>50000) s+=14; else if(liq>30000) s+=8;

  // Price trend
  if(change>100) s+=20; else if(change>50) s+=15; else if(change>20) s+=10; else if(change>5) s+=5;
  else if(change<-30) s-=20; else if(change<-10) s-=10;

  // Real volume quality (NEW — weighted heavily)
  if(volScore>=75) s+=25; else if(volScore>=55) s+=15; else if(volScore>=35) s+=5; else s-=20;

  // Holder distribution
  if(distScore>75) s+=12; else if(distScore>55) s+=7; else if(distScore<30) s-=10;

  // Bot score (penalize heavily)
  if(botScore<20) s+=12; else if(botScore<35) s+=6; else if(botScore>55) s-=25; else if(botScore>40) s-=12;

  // Whale score
  if(whaleScore>=80) s+=20; else if(whaleScore>=60) s+=14; else if(whaleScore>=40) s+=7; else if(whaleScore<20) s-=12;

  // Lock
  s += lockScore || 0;

  return Math.min(100, Math.max(0, s));
}

// STRICT filter — must pass ALL conditions
function passesHotFilter(liq, vol, change, rug, fdv, distScore, botScore, whaleData, volData){
  // Minimum liquidity $20K
  if(liq < 20000) return { pass:false, reason:`💧 Liq too low ($${fmt(liq)})` };

  // Minimum vol/liq ratio 1.5x (real activity)
  const ratio = vol/(liq+1);
  if(ratio < 1.5) return { pass:false, reason:`📊 Vol/Liq too low (${ratio.toFixed(1)}x)` };

  // Minimum MC $80K
  if(fdv && fdv < 80000) return { pass:false, reason:`💰 MC too low ($${fmt(fdv)})` };

  // Rug risk below 40%
  if(rug > 40) return { pass:false, reason:`💀 Rug risk too high (${rug}%)` };

  // Price not in freefall
  if(change < -35) return { pass:false, reason:`📉 Price dumping (${change.toFixed(1)}%)` };

  // MUST have real volume (NEW)
  if(volData && volData.score < 40) return { pass:false, reason:`📊 Fake volume detected` };
  if(volData && volData.uniqueBuyers < 4) return { pass:false, reason:`📊 Too few unique buyers (${volData.uniqueBuyers})` };

  // Bot check
  if(botScore !== undefined && botScore > 60) return { pass:false, reason:`🤖 Too many bots (${botScore}%)` };

  // Holder concentration check
  if(distScore !== undefined && distScore < 25) return { pass:false, reason:`👥 Holders too concentrated` };

  // MUST have real whales (NEW — strict)
  if(whaleData && !whaleData.hasRealWhales) return { pass:false, reason:`🐋 No real whales (${whaleData.label})` };

  return { pass:true };
}

async function runHotFilter(){
  const btn = document.getElementById("hotBtn");
  const hotResult = document.getElementById("hotResult");
  const filterInfo = document.getElementById("filterInfo");
  const progressWrap = document.getElementById("progressWrap");
  const progressBar = document.getElementById("progressBar");

  btn.disabled=true; btn.textContent="⏳ Deep Scanning...";
  hotResult.innerHTML="";
  progressWrap.style.display="block";
  progressBar.style.width="0%";
  filterInfo.textContent="Fetching tokens from multiple sources...";

  try{
    // Fetch from multiple DEX sources for better coverage
    const [r1,r2,r3]=await Promise.allSettled([
      fetch("https://api.dexscreener.com/token-boosts/latest/v1").then(r=>r.json()),
      fetch("https://api.dexscreener.com/latest/dex/search?q=SOL").then(r=>r.json()),
      fetch("https://api.dexscreener.com/latest/dex/search?q=pump").then(r=>r.json())
    ]);

    let pairs=[];
    const seen=new Set();

    // Boosts
    if(r1.status==="fulfilled"&&Array.isArray(r1.value)){
      const sb=r1.value.filter(b=>b.chainId==="solana").slice(0,15);
      const br=await Promise.allSettled(sb.map(b=>
        fetch("https://api.dexscreener.com/latest/dex/tokens/"+b.tokenAddress).then(r=>r.json())
      ));
      br.forEach(res=>{
        if(res.status==="fulfilled"&&res.value.pairs?.length>0) pairs.push(res.value.pairs[0]);
      });
    }

    // Trending
    if(r2.status==="fulfilled"&&r2.value.pairs)
      pairs=[...pairs,...r2.value.pairs.filter(p=>p.chainId==="solana").slice(0,15)];

    // Pump search
    if(r3.status==="fulfilled"&&r3.value.pairs)
      pairs=[...pairs,...r3.value.pairs.filter(p=>p.chainId==="solana").slice(0,10)];

    // Deduplicate
    pairs=pairs.filter(p=>{
      const a=p.baseToken?.address;
      if(!a||seen.has(a)) return false;
      seen.add(a); return true;
    });

    // Quick pre-filter before deep scan (save API calls)
    pairs=pairs.filter(p=>{
      const liq=p.liquidity?.usd||0;
      const vol=p.volume?.h24||0;
      const fdv=p.fdv||p.marketCap||0;
      return liq>=20000 && vol/(liq+1)>=1.5 && (!fdv||fdv>=80000);
    });

    filterInfo.textContent=`Pre-filtered to ${pairs.length} candidates — deep scanning...`;

    let passed=[], scanned=0, rejected=[];

    for(let p of pairs){
      scanned++;
      const pct = Math.round(scanned/pairs.length*100);
      progressBar.style.width=pct+"%";
      filterInfo.textContent=`Scanning ${scanned}/${pairs.length}: ${p.baseToken?.symbol||''}...`;

      const liq=p.liquidity?.usd||0;
      const vol=p.volume?.h24||0;
      const change=p.priceChange?.h24||0;
      const fdv=p.fdv||p.marketCap||0;
      const address=p.baseToken?.address||"";

      // Run all checks in parallel
      const [holderData,botData,whaleData,lockData,volData]=await Promise.all([
        getHolderData(address),
        analyzeBotActivity(address),
        detectRealWhales(address,liq,vol),
        checkLiquidityLock(p.pairAddress||address,address),
        analyzeRealVolume(address,vol,liq)
      ]);

      const distScore=holderData?.distScore||50;
      const botScore=botData?.botScore||50;
      const whaleScore=whaleData?.whaleScore||0;
      const rug=rugChance(liq,vol,whaleScore,botScore);

      const filterResult=passesHotFilter(liq,vol,change,rug,fdv,distScore,botScore,whaleData,volData);
      if(!filterResult.pass){ rejected.push(`${p.baseToken?.symbol}: ${filterResult.reason}`); continue; }

      const score=calcHotScore(liq,vol,change,distScore,botScore,whaleScore,volData?.score||50,lockData?.score||0);
      if(score<45) { rejected.push(`${p.baseToken?.symbol}: Score too low (${score})`); continue; }

      const isPremium=score>=75&&whaleData.realWhaleCount>=2&&lockData.locked&&volData.real;

      passed.push({
        name:p.baseToken?.name||"Unknown", symbol:p.baseToken?.symbol||"?",
        address, liq, vol, change, fdv, rug, score, isPremium,
        holderData, botData, whaleData, lockData, volData,
        dexUrl:dexLink(address,p.url)
      });
    }

    passed.sort((a,b)=>b.score-a.score);
    progressBar.style.width="100%";
    filterInfo.textContent=`✅ Found ${passed.length} quality tokens from ${pairs.length} scanned`;

    if(!passed.length){
      const topRejected = rejected.slice(0,5).map(r=>`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">❌ ${r}</div>`).join('');
      hotResult.innerHTML=`<div class="no-results">
        😔 No quality tokens right now — all failed strict filters<br>
        <div style="margin-top:16px;text-align:left;">${topRejected}</div>
        <br><button onclick="runHotFilter()" style="margin-top:10px">🔄 Try Again</button>
      </div>`;
    } else {
      hotResult.innerHTML=`<div class="filter-grid">${passed.map(t=>`
        <div class="hot-card ${t.isPremium?'premium':''}">
          <h3>${t.name} <span style="font-size:14px">(${t.symbol})</span>${t.isPremium?'<span class="premium-badge">⭐ TOP PICK</span>':''}</h3>
          <div class="hot-row">
            <span class="hot-stat green">💧 $${fmt(t.liq)}</span>
            <span class="hot-stat green">📊 $${fmt(t.vol)}</span>
            <span class="hot-stat ${t.change>0?'green':'red'}">${t.change>0?'📈':'📉'} ${t.change.toFixed(1)}%</span>
            ${t.fdv?`<span class="hot-stat yellow">💰 $${fmt(t.fdv)}</span>`:''}
            <span class="hot-stat ${t.volData?.real?'green':'red'}">📊 ${t.volData?.label||'?'}</span>
            <span class="hot-stat ${t.lockData.locked?'green':'red'}">${t.lockData.locked?'🔒 LP Safe':'🔓 LP Open'}</span>
            <span class="hot-stat ${t.whaleData.whaleScore>=60?'gold':'yellow'}">${t.whaleData.label}</span>
            <span class="hot-stat ${t.botData.botScore<30?'green':t.botData.botScore<55?'yellow':'red'}">🤖 ${t.botData.botScore}%</span>
            ${t.holderData?`<span class="hot-stat ${t.holderData.distScore>65?'green':t.holderData.distScore>40?'yellow':'red'}">👥 ${t.holderData.distScore}</span>`:''}
            <span class="hot-stat ${t.rug<30?'green':t.rug<40?'yellow':'red'}">💀 ${t.rug}%</span>
          </div>
          <div class="score-bar" style="margin-top:10px"><div class="score-fill ${t.isPremium?'gold':''}" style="width:${t.score}%"></div></div>
          <div style="font-size:12px;color:${t.isPremium?'#fde68a':'#6ee7b7'};margin-top:6px">Hot Score: ${t.score}/100</div>
          <div class="card-actions">
            <a class="dex-btn" href="${t.dexUrl}" target="_blank">📈 DEX</a>
            <span class="dex-btn" onclick="copyAndScan('${t.address}')">🔍 Analyze</span>
          </div>
        </div>`).join('')}</div>`;
    }
  }catch(e){
    hotResult.innerHTML=`<div class="no-results">❌ Error: ${e.message}</div>`;
  }
  btn.disabled=false;
  btn.textContent="🔥 Find Hot Tokens";
}

function copyAndScan(address){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-scan').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('token').value=address;
  scan();
}
</script>
