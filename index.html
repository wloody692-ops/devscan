<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevScan Scanner</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#010f0b,#000);
color:#eafff3;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

.logo{
font-size:44px;
font-weight:bold;
}

.sub{
color:#00ff99;
font-size:13px;
margin-bottom:10px;
}

.card{
border:1px solid #00ff99;
border-radius:14px;
padding:15px;
background:rgba(0,255,100,0.05);
margin-top:15px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border:1px solid rgba(0,255,100,0.25);
border-radius:12px;
margin-bottom:8px;
background:rgba(0,255,100,0.03);
word-break:break-word;
}

.small{font-size:12px;opacity:0.85}

.green{color:#00ff99}
.orange{color:#ffb84d}
.red{color:#ff4d4d}
.blue{color:#1DA1F2}

.badge{
padding:4px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 DevScan</div>
<div class="sub">Pro Smart Money Scanner</div>

<button onclick="load()">🔄 Refresh Market</button>

<div class="card" id="list">Loading...</div>

</div>

<script>

// ================= FETCH =================
async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/search/?q=solana");
const d = await r.json();
return (d.pairs || []).filter(p => p && p.baseToken);
}catch{
return [];
}
}

// ================= SMART SCORE =================
function analyze(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;

let score = 0;

// liquidity health
if(liq > 100000) score += 40;
else if(liq > 30000) score += 25;
else if(liq > 5000) score += 10;
else score -= 25;

// volume strength
if(vol > 200000) score += 40;
else if(vol > 50000) score += 20;
else if(vol > 10000) score += 10;
else score -= 15;

// momentum
let ratio = vol / (liq || 1);
if(ratio > 1) score += 20;
if(ratio > 2) score += 10;

// whale pressure (approx)
let whale = vol > 150000 && ratio > 1;

// rug risk
let rug = liq < 5000 || vol < 5000;

// signal logic
let signal = "⚪ LOW";

if(rug) signal = "🔴 RUG RISK";
else if(score >= 80) signal = "🔥 STRONG ENTRY";
else if(score >= 60) signal = "🟢 GOOD";
else if(score >= 40) signal = "🟡 WATCH";
else signal = "⚪ WEAK";

return {
score,
signal,
whale
};
}

// ================= RENDER =================
function render(pairs){

if(!pairs.length){
document.getElementById("list").innerHTML="No data";
return;
}

// filter weak coins
pairs = pairs
.filter(p => (p.liquidity?.usd || 0) > 1000)
.sort((a,b)=> analyze(b).score - analyze(a).score)
.slice(0,10);

let html="";

pairs.forEach(p=>{

let a = analyze(p);

let name = p.baseToken?.name || "Unknown";
let symbol = p.baseToken?.symbol || "";
let contract = p.baseToken?.address || "N/A";

html += `
<div class="card">

<div class="row">
<b>🪙 ${name} (${symbol})</b>
<span class="badge ${a.score>80?'red':a.score>60?'green':a.score>40?'orange':'blue'}">
${a.signal}
</span>
</div>

<div class="row small">
<span>📄 Contract</span>
<b>${contract}</b>
</div>

<div class="row small">
<span>💧 Liquidity</span>
<b>$${(p.liquidity?.usd || 0).toLocaleString()}</b>
</div>

<div class="row small">
<span>📊 Volume</span>
<b>$${(p.volume?.h24 || 0).toLocaleString()}</b>
</div>

<div class="row small">
<span>🐋 Whale Pressure</span>
<b class="${a.whale?'green':'orange'}">
${a.whale ? "ACTIVE" : "LOW"}
</b>
</div>

</div>
`;
});

document.getElementById("list").innerHTML=html;
}

// ================= MAIN =================
async function load(){

document.getElementById("list").innerHTML="Scanning market...";

const pairs = await getPairs();
render(pairs);
}

load();
setInterval(load,12000);

</script>

</body>
</html>
