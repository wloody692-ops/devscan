<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Heatmap Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#030a07;
color:#eafff3;
}

.header{
padding:16px;
text-align:center;
background:#071c14;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
color:#10b981;
font-size:26px;
font-weight:900;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
max-width:1000px;
margin:auto;
}

.box{
padding:14px;
border-radius:12px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
position:relative;
overflow:hidden;
transition:0.2s;
}

.box:hover{
transform:scale(1.05);
}

/* heat levels */
.low{background:#062019;}
.mid{background:#114d2c;}
.high{background:#10b981;color:black;}
.risk{background:#ff3b3b;color:white;}

/* names */
.name{font-size:14px;font-weight:bold;}
.symbol{font-size:11px;opacity:0.8;margin-top:2px;}
.small{font-size:11px;opacity:0.85;margin-top:5px;}

/* 💰 animated money flow */
.flow{
position:absolute;
top:0;
left:-50%;
width:200%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
animation:move 2.5s linear infinite;
}

@keyframes move{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

/* pressure bar */
.bar{
margin-top:8px;
height:6px;
border-radius:5px;
background:rgba(255,255,255,0.15);
overflow:hidden;
}

.fill{
height:100%;
background:#00ff88;
}
</style>
</head>

<body>

<div class="header">
<h1>CRYPTO MONEY FLOW HEATMAP</h1>
</div>

<div class="grid" id="grid">Loading flow...</div>

<script>

async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* 🧠 money flow logic */
function calc(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;

let ratio = vol / (liq + 1);

/* flow intensity */
let flow = Math.min(100, ratio * 40);

/* heat level */
let level = "low";

if(flow > 70) level = "high";
else if(flow > 40) level = "mid";
else if(liq < 800) level = "risk";

return {flow, level};
}

function render(pairs){

let grid = document.getElementById("grid");
grid.innerHTML = "";

pairs.slice(0,9).forEach(p=>{

let {flow, level} = calc(p);

grid.innerHTML += `
<div class="box ${level}">

<div class="flow"></div>

<div class="name">${p.baseToken?.name || "Unknown"}</div>
<div class="symbol">${p.baseToken?.symbol || "?"}</div>

<div class="bar">
<div class="fill" style="width:${flow}%"></div>
</div>

<div class="small">
Money Flow: ${flow.toFixed(0)}%
</div>

<div class="small">
Liquidity: $${Math.round(p.liquidity?.usd || 0)}
</div>

</div>
`;
});

}

async function loop(){
let data = await getPairs();
render(data);
}

loop();
setInterval(loop, 6000);

</script>

</body>
</html>
