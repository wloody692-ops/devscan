<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Arena Full</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050a08;
color:#eafff3;
}

.header{
padding:16px;
text-align:center;
background:#071c14;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
color:#10b981;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#0b2a1d;
border:1px solid rgba(16,185,129,0.25);
border-radius:12px;
padding:12px;
margin-top:10px;
}

.name{
font-size:14px;
font-weight:bold;
}

.symbol{
font-size:11px;
opacity:0.7;
}

.stats{
font-size:11px;
opacity:0.85;
margin-top:6px;
}

.bar{
margin-top:8px;
height:8px;
background:rgba(255,255,255,0.12);
border-radius:6px;
overflow:hidden;
}

.fill{
background:#10b981;
height:100%;
transition:0.3s;
}

.vote{
margin-top:8px;
display:flex;
gap:8px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:11px;
font-weight:bold;
}

.up{background:#10b981;color:black;}
.down{background:#3b82f6;color:white;}

.score{
margin-top:6px;
font-size:11px;
color:#00ff88;
}
</style>
</head>

<body>

<div class="header">
<h1>MEME ARENA ⚔️ LIVE</h1>
</div>

<div class="container" id="app">Loading market...</div>

<script>

let votes = JSON.parse(localStorage.getItem("votes") || "{}");

function save(){
localStorage.setItem("votes", JSON.stringify(votes));
}

async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* 🧠 market power */
function power(p){
let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
return vol / (liq + 1);
}

/* 🗳️ vote system */
function vote(symbol,type){

if(!votes[symbol]){
votes[symbol]={up:0,down:0};
}

type==="up" ? votes[symbol].up++ : votes[symbol].down++;
save();
loop(); // refresh instantly
}

/* 🎯 render */
function render(pairs){

let app = document.getElementById("app");
app.innerHTML = "";

/* 🟡 fallback */
if(!pairs || pairs.length === 0){
app.innerHTML = `
<div class="card">
<div class="name">📡 Market Loading...</div>
<div class="symbol">No data from API, retrying...</div>
</div>
`;
return;
}

/* top coins */
let list = pairs.slice(0,10);

list.forEach(p=>{

let symbol = p.baseToken?.symbol || "???";
let name = p.baseToken?.name || "Unknown";

let v = votes[symbol] || {up:0,down:0};

let score = power(p) + (v.up - v.down)*0.1;
let bar = Math.min(100, score*35);

app.innerHTML += `
<div class="card">

<div class="name">${name}</div>
<div class="symbol">${symbol}</div>

<div class="bar">
<div class="fill" style="width:${bar}%"></div>
</div>

<div class="stats">
💧 Liquidity: $${Math.round(p.liquidity?.usd || 0)} |
📊 Volume: $${Math.round(p.volume?.h24 || 0)}
</div>

<div class="score">
🗳️ Votes → 👍 ${v.up} | 👎 ${v.down}
</div>

<div class="vote">
<button class="up" onclick="vote('${symbol}','up')">UP</button>
<button class="down" onclick="vote('${symbol}','down')">DOWN</button>
</div>

</div>
`;
});

}

/* 🔁 loop */
async function loop(){
let data = await getPairs();
render(data);
}

loop();
setInterval(loop, 6000);

</script>

</body>
</html>
