<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open World City</title>
<style>
body { margin:0; overflow:hidden; background:#0b1220; }
canvas { display:block; margin:0 auto; background:#111827; }

#ui{
  position:fixed;
  top:10px; left:10px;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  width:260px;
}
</style>
</head>
<body>

<div id="ui">
🌍 WORLD MAP<br>
💰 Money: <span id="money">0</span><br>
🚗 Car: <span id="car">No</span><br>
📏 Map: 8000x8000<br>
</div>

<canvas id="c" width="800" height="500"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// 🌍 خريطة ضخمة
const world = { w: 8000, h: 8000 };

// 👤 اللاعب
let player = { x:400, y:400, s:18, speed:4 };

// 🚗 السيارة
let car = { x:500, y:500, w:30, h:15, speed:6 };
let inCar = false;

// 📷 كاميرا
let cam = { x:0, y:0 };

let money = 0;

// 🎮 تحكم
let keys = {};
document.addEventListener("keydown", e=>{
  keys[e.key]=true;

  if(e.key==="e" || e.key==="E"){
    let dx = player.x - car.x;
    let dy = player.y - car.y;
    if(Math.sqrt(dx*dx+dy*dy)<60){
      inCar = !inCar;
    }
  }
});
document.addEventListener("keyup", e=>keys[e.key]=false);

// 🏙️ توليد مباني ضخمة (عشوائي)
let buildings = Array.from({length:2000}, ()=>({
  x: Math.random()*world.w,
  y: Math.random()*world.h,
  w: 30 + Math.random()*80,
  h: 30 + Math.random()*80
}));

// 🌲 أشجار
let trees = Array.from({length:3000}, ()=>({
  x: Math.random()*world.w,
  y: Math.random()*world.h
}));

function update(){

  let speed = inCar ? car.speed : player.speed;

  if(keys["ArrowUp"]) inCar ? car.y-=speed : player.y-=speed;
  if(keys["ArrowDown"]) inCar ? car.y+=speed : player.y+=speed;
  if(keys["ArrowLeft"]) inCar ? car.x-=speed : player.x-=speed;
  if(keys["ArrowRight"]) inCar ? car.x+=speed : player.x+=speed;

  let focusX = inCar ? car.x : player.x;
  let focusY = inCar ? car.y : player.y;

  // 📷 كاميرا تتبع
  cam.x = focusX - 400;
  cam.y = focusY - 250;

  cam.x = Math.max(0, Math.min(world.w-800, cam.x));
  cam.y = Math.max(0, Math.min(world.h-500, cam.y));

  money += 0.05;

  document.getElementById("money").innerText = money.toFixed(0);
  document.getElementById("car").innerText = inCar ? "YES" : "NO";
}

// 🎨 رسم مباني فقط داخل الشاشة (Optimization)
function drawBuildings(){
  ctx.fillStyle="#9ca3af";

  for(let b of buildings){
    if(
      b.x > cam.x-50 &&
      b.x < cam.x+850 &&
      b.y > cam.y-50 &&
      b.y < cam.y+550
    ){
      ctx.fillRect(b.x-cam.x, b.y-cam.y, b.w, b.h);
    }
  }
}

// 🌲 رسم الأشجار (خفيف)
function drawTrees(){
  ctx.fillStyle="#14532d";

  for(let t of trees){
    if(
      t.x > cam.x-50 &&
      t.x < cam.x+850 &&
      t.y > cam.y-50 &&
      t.y < cam.y+550
    ){
      ctx.beginPath();
      ctx.arc(t.x-cam.x, t.y-cam.y, 5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function draw(){

  ctx.clearRect(0,0,800,500);

  ctx.fillStyle="#0f172a";
  ctx.fillRect(0,0,800,500);

  drawTrees();
  drawBuildings();

  // 🚗 السيارة
  ctx.fillStyle="red";
  ctx.fillRect(car.x-cam.x, car.y-cam.y, 30, 15);

  // 👤 اللاعب
  if(!inCar){
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cam.x, player.y-cam.y, player.s, player.s);
  } else {
    ctx.fillStyle="cyan";
    ctx.fillRect(car.x-cam.x+10, car.y-cam.y, 10, 10);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
