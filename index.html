<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevScan PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#031a12,#000);
  color:#eafff3;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:40px;
  font-weight:bold;
}

.twitter{
  padding:8px 12px;
  border:1px solid #00ff99;
  border-radius:8px;
  color:#00ff99;
  text-decoration:none;
  font-size:13px;
}

.hook{
  color:#00ff99;
  font-size:13px;
  margin:10px 0 15px;
}

.card{
  border:1px solid #00ff99;
  border-radius:12px;
  padding:15px;
  margin-top:15px;
  background:rgba(0,255,100,0.05);
}

input{
  width:70%;
  padding:12px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.box{
  padding:12px;
  border:1px solid #0f3;
  border-radius:10px;
  background:rgba(0,255,100,0.04);
}

.green{color:#00ff99;}
.red{color:#ff4d4d;}
.orange{color:#ffb84d;}

.alert{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff99;
  color:#000;
  padding:10px;
  border-radius:8px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">🚀 DevScan PRO MAX</div>

    <a class="twitter" href="https://twitter.com/devscan1" target="_blank">
      🐦 @devscan1
    </a>
  </div>

  <div class="hook">
    Smart Money • Trending Detection • On-Chain Risk Engine
  </div>

  <div class="card">
    <input id="input" placeholder="Paste token / wallet"/>
    <button onclick="analyze()">ANALYZE</button>
  </div>

  <div class="card" id="result">
    <div>Waiting for input...</div>
  </div>

</div>

<div id="alert" class="alert"></div>

<script>

// =========================
// CONFIG
// =========================
const API_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";
const DEV_WALLET = "PUT_DEV_WALLET_HERE";

// =========================
// ALERT SYSTEM
// =========================
function alert(msg){
  const a = document.getElementById("alert");
  a.innerText = msg;
  a.style.display = "block";
  setTimeout(()=>a.style.display="none",2500);
}

// =========================
// FETCH TX
// =========================
async function getTx(address){
  const res = await fetch(
    `https://api.helius.xyz/v0/addresses/${address}/transactions?api-key=${API_KEY}`
  );
  return await res.json();
}

// =========================
// SMART ENGINE
// =========================
function calc(txns){

  if(!txns || txns.length === 0) return {risk:90, smart:false};

  let swaps = txns.filter(t => t.type === "SWAP").length;
  let risk = 20 + (txns.length < 5 ? 30 : 0) + (swaps > 25 ? 40 : 0);

  let smart = swaps > 20 && txns.length > 10;

  return {
    risk: Math.min(100,risk),
    smart
  };
}

// =========================
// TREND ENGINE (SIMULATED LOGIC)
// =========================
function trendScore(addr){
  let h = 0;
  for(let i=0;i<addr.length;i++) h += addr.charCodeAt(i);
  return h % 100;
}

// =========================
// MAIN
// =========================
async function analyze(){

  const addr = document.getElementById("input").value;

  if(!addr){
    alert("Enter address");
    return;
  }

  document.getElementById("result").innerHTML = "Loading...";

  try{

    const txns = await getTx(addr);
    const d = calc(txns);

    const devTxns = await getTx(DEV_WALLET);
    const devActive = devTxns && devTxns.length > 5;

    const trend = trendScore(addr);

    let status =
      d.risk > 70 ? "🔴 DANGER" :
      d.risk > 40 ? "🟠 WATCH" :
      "🟢 SAFE";

    if(d.smart) alert("🐋 Smart Money Detected");

    document.getElementById("result").innerHTML = `

      <div class="grid">

        <div class="box">
          🪙 Asset<br>
          <b>${addr.slice(0,12)}...</b>
        </div>

        <div class="box">
          💀 Risk<br>
          <b>${d.risk}/100</b>
        </div>

        <div class="box">
          📈 Trend Score<br>
          <b>${trend}/100</b>
        </div>

        <div class="box">
          🧠 Smart Money<br>
          <b class="${d.smart?'green':'red'}">
            ${d.smart ? 'DETECTED 🐋' : 'NO SIGNAL'}
          </b>
        </div>

        <div class="box">
          👛 Dev Wallet<br>
          <b>${devActive ? "ACTIVE 🟢" : "LOW 🔴"}</b>
        </div>

        <div class="box">
          ⚡ Status<br>
          <b>${status}</b>
        </div>

      </div>

    `;

  }catch(e){
    alert("Error loading data");
  }
}

</script>

</body>
</html>
