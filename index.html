<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#052e1b,#02120c);color:#eafff3;min-height:100vh;}
.header{padding:14px 16px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(16,185,129,0.08);border-bottom:1px solid #10b981;}
.header h1{margin:0;font-size:34px;font-weight:900;color:#10b981;}
.header-x{position:absolute;right:16px;top:50%;transform:translateY(-50%);}
.header-x a{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#000;border:1px solid #10b981;transition:border-color 0.2s;}
.header-x a:hover{border-color:#34d399;}
.header-x svg{width:18px;height:18px;fill:#fff;}
.tabs{display:flex;border-bottom:1px solid #10b981;margin:0;}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:bold;color:#6ee7b7;background:transparent;border:none;font-size:15px;transition:all 0.2s;}
.tab.active{background:rgba(16,185,129,0.15);color:#10b981;border-bottom:2px solid #10b981;}
.tab-content{display:none;padding:12px;max-width:900px;margin:auto;}
.tab-content.active{display:block;}
.searchBox{display:flex;gap:10px;margin-top:10px;}
input{flex:1;padding:12px;border-radius:10px;border:1px solid #10b981;background:#062d1d;color:white;outline:none;}
button{padding:12px 16px;border:none;border-radius:10px;background:#10b981;color:black;font-weight:bold;cursor:pointer;white-space:nowrap;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.card{margin-top:15px;padding:15px;border-radius:14px;border:1px solid #10b981;background:rgba(6,45,29,0.9);}
.badge{display:inline-block;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:bold;}
.badge-safe{background:#10b981;color:black;}
.badge-mid{background:#fbbf24;color:black;}
.badge-risk{background:#f87171;color:black;}
.history-item{padding:8px 10px;border-radius:8px;margin-top:6px;font-size:13px;border-left:3px solid #10b981;background:rgba(16,185,129,0.07);}
.history-dead{border-left-color:#f87171;background:rgba(248,113,113,0.07);}
.history-alive{border-left-color:#34d399;background:rgba(52,211,153,0.07);}
.filter-grid{display:flex;flex-direction:column;gap:12px;margin-top:12px;}
.hot-card{padding:14px;border-radius:14px;border:1px solid #10b981;background:rgba(6,45,29,0.9);transition:border-color 0.2s;}
.hot-card.premium{border-color:#fbbf24;background:rgba(20,15,0,0.95);}
.hot-card:hover{border-color:#34d399;}
.hot-card.premium:hover{border-color:#fde68a;}
.hot-card h3{margin:0 0 6px 0;font-size:16px;color:#10b981;}
.hot-card.premium h3{color:#fbbf24;}
.premium-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:#fbbf24;color:black;font-size:11px;font-weight:900;margin-left:6px;}
.hot-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:13px;}
.hot-stat{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:5px 10px;}
.hot-stat.red{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);color:#fca5a5;}
.hot-stat.green{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:#6ee7b7;}
.hot-stat.yellow{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fcd34d;}
.hot-stat.gold{background:rgba(251,191,36,0.2);border-color:#fbbf24;color:#fde68a;font-weight:bold;}
.score-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.1);margin-top:8px;}
.score-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#34d399);transition:width 0.6s;}
.score-fill.gold{background:linear-gradient(90deg,#f59e0b,#fde68a);}
.filter-info{font-size:12px;color:#6ee7b7;margin-top:4px;}
.no-results{text-align:center;padding:40px;color:#6ee7b7;}
.dex-btn{display:inline-block;padding:7px 14px;border-radius:8px;background:rgba(16,185,129,0.15);border:1px solid #10b981;color:#10b981;font-size:13px;font-weight:bold;text-decoration:none;cursor:pointer;}
.dex-btn:hover{background:rgba(16,185,129,0.3);}
.card-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.lock-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:bold;}
.lock-yes{background:rgba(52,211,153,0.15);border:1px solid #34d399;color:#34d399;}
.lock-no{background:rgba(248,113,113,0.15);border:1px solid #f87171;color:#f87171;}
.whale-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.whale-bar{flex:1;height:10px;border-radius:5px;background:rgba(255,255,255,0.08);overflow:hidden;}
.whale-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#06b6d4,#3b82f6);}
hr{border:none;border-top:1px solid rgba(16,185,129,0.2);margin:12px 0;}
</style>

  <h1>DevScan</h1>
  <div class="header-x">

<script>
const HELIUS_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";
const devCache = {};
const MAX_MC = 70000;

const IGNORE = new Set([
  "11111111111111111111111111111111",
  "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",
  "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1bh",
  "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s",
  "SysvarRent111111111111111111111111111111111",
  "ComputeBudget111111111111111111111111111111",
  "So11111111111111111111111111111111111111112",
  "pump11111111111111111111111111111111111111",
  "6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P"
]);

function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  el.classList.add('active');
}

function dexLink(address, url){ return url || `https://dexscreener.com/solana/${address}`; }
function fmt(n){ return Math.round(n).toLocaleString(); }

async function checkLiquidityLock(pairAddress, mintAddress){
  try{
    const r2 = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${pairAddress}`);
    const d2 = await r2.json();
    const pair = d2?.pairs?.[0] || d2?.pair;
    if(!pair) return { locked: false, label: "Unknown", score: 0 };
    const liq = pair.liquidity?.usd || 0;
    const created = pair.pairCreatedAt || 0;
    const ageHours = created ? (Date.now() - created) / 3600000 : 0;
    const liqH1 = pair.liquidity?.h1Change || 0;
    const liqStable = Math.abs(liqH1) < 15;
    if(liq > 50000 && ageHours > 48 && liqStable){
      return { locked: true, label: "🔒 LP Stable/Locked", score: 30, liq, ageHours };
    } else if(liq > 20000 && ageHours > 24){
      return { locked: true, label: "🔐 LP Likely Safe", score: 20, liq, ageHours };
    } else if(liq > 5000 && ageHours > 6 && liqStable){
      return { locked: true, label: "🔐 LP Stable", score: 10, liq, ageHours };
    } else if(ageHours < 2){
      return { locked: false, label: "⚠️ Very New — Unverified", score: -10, liq, ageHours };
    } else {
      return { locked: false, label: "🔓 LP Not Confirmed", score: 0, liq, ageHours };
    }
  }catch(e){ return { locked: false, label: "Unknown", score: 0 }; }
}

async function detectRealWhales(mint, liquidity, volume){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=40`);
    const txs = await r.json();
    if(!txs || !Array.isArray(txs)) return { hasRealWhales: false, label: "Unknown", whaleScore: 0 };
    const recent = txs.slice(0,30);
    const walletBuys = {};
    let largeTxCount = 0;
    for(let tx of recent){
      if(!tx.tokenTransfers) continue;
      for(let t of tx.tokenTransfers){
        if(!t.tokenAmount || IGNORE.has(tx.feePayer)) continue;
        const fp = tx.feePayer;
        if(!walletBuys[fp]) walletBuys[fp] = { count: 0, totalAmt: 0, slots: [] };
        walletBuys[fp].count++;
        walletBuys[fp].totalAmt += t.tokenAmount;
        walletBuys[fp].slots.push(tx.slot);
        if(t.tokenAmount > 500000) largeTxCount++;
      }
    }
    const whaleWallets = Object.entries(walletBuys).filter(([w, d]) =>
      d.count <= 4 && d.totalAmt > 200000 && !IGNORE.has(w)
    );
    const botWallets = Object.entries(walletBuys).filter(([w, d]) => d.count > 6);
    const uniqueCount = Object.keys(walletBuys).length;
    const realWhaleCount = whaleWallets.length;
    const botRatio = botWallets.length / Math.max(uniqueCount, 1);
    let whaleScore = 0;
    if(realWhaleCount >= 3) whaleScore = 100;
    else if(realWhaleCount === 2) whaleScore = 70;
    else if(realWhaleCount === 1) whaleScore = 40;
    else if(uniqueCount > 10) whaleScore = 20;
    if(botRatio > 0.4) whaleScore -= 20;
    if(largeTxCount > 3) whaleScore += 15;
    whaleScore = Math.min(100, Math.max(0, whaleScore));
    const hasRealWhales = realWhaleCount >= 1 && botRatio < 0.6;
    const label = whaleScore > 70 ? `🐋 ${realWhaleCount} Real Whales Active` :
                  whaleScore > 40 ? `🐋 Some Whale Activity` :
                  whaleScore > 15 ? `🟡 Weak Whale Signal` :
                  `❌ No Whales Detected`;
    return { hasRealWhales, label, whaleScore, realWhaleCount, botRatio: Math.round(botRatio*100) };
  }catch(e){ return { hasRealWhales: false, label: "Unknown", whaleScore: 0 }; }
}

async function getHolderData(mint){
  try{
    const r = await fetch(`https://mainnet.helius-rpc.com/?api-key=${HELIUS_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getTokenLargestAccounts', params:[mint] })
    });
    const d = await r.json();
    const holders = d?.result?.value || [];
    if(!holders.length) return null;
    const total = holders.reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0);
    if(!total) return null;
    const top1  = (parseFloat(holders[0]?.uiAmount)||0)/total*100;
    const top5  = holders.slice(0,5).reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0)/total*100;
    const top10 = holders.slice(0,10).reduce((s,h)=>s+(parseFloat(h.uiAmount)||0),0)/total*100;
    const label = top1>20 ? "🔴 Top wallet holds too much" :
                  top5>50 ? "🟡 Concentrated top 5" :
                  top10>70? "🟡 Moderate concentration" : "🟢 Healthy distribution";
    const distScore = Math.max(0, 100 - top5 - (top1>10?20:0));
    return { top1:top1.toFixed(1), top5:top5.toFixed(1), top10:top10.toFixed(1), label, distScore:Math.round(distScore) };
  }catch(e){ return null; }
}

async function analyzeBotActivity(mint){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=30`);
    const txs = await r.json();
    if(!txs||!Array.isArray(txs)) return { botScore:50, label:"Unknown" };
    const recent = txs.slice(0,20);
    const fps = {}; let sameBlock=0, prevSlot=null, roundBuys=0;
    for(let tx of recent){
      const fp=tx.feePayer;
      if(fp&&!IGNORE.has(fp)) fps[fp]=(fps[fp]||0)+1;
      if(tx.slot===prevSlot) sameBlock++;
      prevSlot=tx.slot;
      if(tx.tokenTransfers) for(let t of tx.tokenTransfers){
        const s=String(Math.round(t.tokenAmount||0));
        if(s.endsWith('000')||s.endsWith('0000')) roundBuys++;
      }
    }
    const multiWallets=Object.values(fps).filter(v=>v>2).length;
    const uniq=Object.keys(fps).length;
    let botScore=0;
    if(sameBlock>3) botScore+=35;
    if(multiWallets>3) botScore+=25;
    if(roundBuys>5) botScore+=20;
    if(uniq/Math.max(recent.length,1)<0.4) botScore+=20;
    botScore=Math.min(100,botScore);
    const label=botScore>65?"🔴 HIGH BOT ACTIVITY":botScore>35?"🟡 SOME BOTS":"🟢 MOSTLY REAL BUYERS";
    return { botScore, label, uniqueWallets:uniq };
  }catch(e){ return { botScore:50, label:"Unknown" }; }
}

async function getMintAuthority(mint){
  try{
    const r=await fetch(`https://api.helius.xyz/v0/mints/${mint}?api-key=${HELIUS_KEY}`);
    const d=await r.json();
    const a=d?.mintAuthority;
    return (a&&!IGNORE.has(a))?a:null;
  }catch(e){ return null; }
}

async function getRealDev(mint){
  if(devCache[mint]) return devCache[mint];
  try{
    const r=await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=25`);
    const txs=await r.json();
    if(!txs||!Array.isArray(txs)||!txs.length) return null;
    const sorted=[...txs].sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    const cands={};
    for(let tx of sorted.slice(0,5)){
      const fp=tx.feePayer;
      if(fp&&!IGNORE.has(fp)&&fp!==mint) cands[fp]=(cands[fp]||0)+1;
    }
    const sc=Object.entries(cands).sort((a,b)=>b[1]-a[1]);
    if(!sc.length) return null;
    const res={wallet:sc[0][0], source:"Fee Payer (Oldest TX)"};
    devCache[mint]=res;
    return res;
  }catch(e){ return null; }
}

async function getDevHistory(devWallet, currentMint){
  try{
    const r=await fetch(`https://api.helius.xyz/v0/addresses/${devWallet}/transactions?api-key=${HELIUS_KEY}&limit=50`);
    const txs=await r.json();
    if(!txs||!Array.isArray(txs)) return [];
    let mints=new Set();
    txs.forEach(tx=>{
      if(tx.feePayer===devWallet&&tx.tokenTransfers)
        tx.tokenTransfers.forEach(t=>{ if(t.mint&&t.mint!==currentMint&&!IGNORE.has(t.mint)) mints.add(t.mint); });
    });
    const toCheck=[...mints].reverse().slice(0,3);
    const results=await Promise.allSettled(toCheck.map(m=>fetch("https://api.dexscreener.com/latest/dex/tokens/"+m).then(r=>r.json())));
    let history=[];
    results.forEach(res=>{
      if(res.status==="fulfilled"&&res.value.pairs?.length>0){
        const p=res.value.pairs[0]; const liq=p.liquidity?.usd||0;
        history.push({name:p.baseToken.name||"Unknown",symbol:p.baseToken.symbol||"?",liquidity:liq,alive:liq>1000});
      }
    });
    return history;
  }catch(e){ return []; }
}

function resolveDev(mintAuth,realDev){
  if(mintAuth) return {wallet:mintAuth,type:"Mint Authority (CONFIRMED DEV)"};
  if(realDev) return {wallet:realDev.wallet,type:`Early Dev Wallet (${realDev.source})`};
  return {wallet:"Unknown",type:"Unverified"};
}

function rugChance(liquidity,volume,whaleP){
  let r=35;
  if(liquidity<3000) r+=30;
  if(volume>liquidity*4) r+=25;
  if(whaleP>60) r+=15;
  if(liquidity>20000) r-=20;
  return Math.min(100,Math.max(0,r));
}

function buildHistoryHTML(history){
  if(!history||!history.length) return `<p style="color:#6ee7b7;font-size:13px">No previous tokens found</p>`;
  const dead=history.filter(h=>!h.alive).length, total=history.length;
  const verdict=dead===total?`🔴 All rugged — HIGH RISK`:dead>total/2?`🟡 Most rugged (${dead}/${total})`:`🟢 Has survivors (${total-dead}/${total})`;
  return `<p style="margin-bottom:6px"><strong>${verdict}</strong></p>`+
    history.map(h=>`<div class="history-item ${h.alive?'history-alive':'history-dead'}">
      ${h.alive?'🟢':'🔴'} <strong>${h.name} (${h.symbol})</strong> — $${fmt(h.liquidity)} ${h.alive?'✅':'💀'}
    </div>`).join('');
}

async function scan(){
  const token=document.getElementById("token").value.trim();
  const result=document.getElementById("result");
  if(!token){result.innerHTML="❌ Enter token address";return;}
  result.innerHTML="🧠 Deep scanning...";
  try{
    const [dexRes,mintAuth,realDev]=await Promise.all([
      fetch("https://api.dexscreener.com/latest/dex/tokens/"+token).then(r=>r.json()),
      getMintAuthority(token), getRealDev(token)
    ]);
    if(!dexRes.pairs){result.innerHTML="❌ No data found";return;}
    const p=dexRes.pairs[0];
    const liq=p.liquidity?.usd||0, vol=p.volume?.h24||0, fdv=p.fdv||p.marketCap||0;
    const pairAddr=p.pairAddress||token;
    const devInfo=resolveDev(mintAuth,realDev);
    result.innerHTML="⏳ Analyzing holders, whales, liquidity lock...";
    const [history,holderData,botData,whaleData,lockData]=await Promise.all([
      devInfo.wallet!=="Unknown"?getDevHistory(devInfo.wallet,token):Promise.resolve([]),
      getHolderData(token), analyzeBotActivity(token),
      detectRealWhales(token,liq,vol),
      checkLiquidityLock(pairAddr,token)
    ]);
    let score=50;
    if(liq>20000) score+=20; else if(liq<3000) score-=25;
    if(vol>100000) score+=15; else if(vol<1000) score-=10;
    if(history.length){
      const dead=history.filter(h=>!h.alive).length/history.length;
      if(dead===1) score-=25; else if(dead>0.6) score-=15; else if(dead<0.3) score+=10;
    }
    if(holderData) score=Math.round(score*(holderData.distScore/100*0.4+0.6));
    if(botData.botScore>65) score-=20; else if(botData.botScore<30) score+=10;
    if(whaleData.whaleScore>70) score+=15; else if(whaleData.whaleScore<20) score-=10;
    if(lockData.locked) score+=15; else score-=10;
    const rug=rugChance(liq,vol,whaleData.whaleScore);
    const status=score>=75&&rug<35?"🟢 LOOKS SOLID":score>=55?"🟡 MODERATE":score<40||rug>65?"🔴 HIGH RISK":"🟡 MID";
    const badgeClass=score>=75?"badge-safe":score>=55?"badge-mid":"badge-risk";
    result.innerHTML=`
<div class="card">
  <h2>${p.baseToken.name} <span style="color:#6ee7b7">(${p.baseToken.symbol})</span></h2>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">
    <span class="hot-stat green">💧 $${fmt(liq)}</span>
    <span class="hot-stat green">📊 $${fmt(vol)}</span>
    ${fdv?`<span class="hot-stat ${fdv<MAX_MC?'yellow':'red'}">💰 MC: $${fmt(fdv)}</span>`:''}
    <span class="lock-badge ${lockData.locked?'lock-yes':'lock-no'}">${lockData.label}</span>
  </div>
  <div class="card-actions">
    <a class="dex-btn" href="${dexLink(token,p.url)}" target="_blank">📈 Open on DEX</a>
  </div>
  <hr>
  <h2>Score: ${Math.round(score)}/100 &nbsp;<span class="badge ${badgeClass}">${status}</span></h2>
  <div class="score-bar"><div class="score-fill ${score>=75?'gold':''}" style="width:${Math.min(100,score)}%"></div></div>
  <hr>
  <h3>🐋 Real Whale Analysis</h3>
  <p>${whaleData.label}</p>
  <div class="whale-row">
    <span style="font-size:13px;min-width:60px">Strength</span>
    <div class="whale-bar"><div class="whale-fill" style="width:${whaleData.whaleScore}%"></div></div>
    <span style="font-size:13px;min-width:35px">${whaleData.whaleScore}%</span>
  </div>
  <hr>
  <h3>🤖 Bot Activity</h3>
  <p>${botData.label} &nbsp;|&nbsp; Bot Risk: <strong>${botData.botScore}%</strong></p>
  ${holderData?`
  <hr>
  <h3>👥 Holder Distribution</h3>
  <p>${holderData.label}</p>
  <p style="font-size:13px">Top1: <strong>${holderData.top1}%</strong> &nbsp; Top5: <strong>${holderData.top5}%</strong> &nbsp; Top10: <strong>${holderData.top10}%</strong></p>`:''}
  <hr>
  <h3>🧬 Dev Wallet</h3>
  <p style="word-break:break-all;font-size:13px">${devInfo.wallet}</p>
  <p style="font-size:12px;color:#6ee7b7">${devInfo.type}</p>
  <hr>
  <h3>📜 Dev History</h3>
  ${buildHistoryHTML(history)}
  <hr>
  <h3>💀 Rug Probability: ${rug}%</h3>
</div>`;
  }catch(e){result.innerHTML="❌ Error: "+e.message;}
}

function calcHotScore(liq,vol,change,distScore,botScore,whaleScore,lockScore){
  let s=0;
  const ratio=vol/(liq+1);
  if(ratio>5) s+=30; else if(ratio>3) s+=22; else if(ratio>1.5) s+=14; else if(ratio>0.5) s+=7;
  if(liq>100000) s+=25; else if(liq>50000) s+=20; else if(liq>20000) s+=13; else if(liq>5000) s+=6;
  if(change>80) s+=20; else if(change>30) s+=14; else if(change>10) s+=7; else if(change<-20) s-=10;
  if(distScore>75) s+=12; else if(distScore>55) s+=7; else if(distScore>30) s+=3;
  if(botScore<20) s+=10; else if(botScore>70) s-=15;
  if(whaleScore>70) s+=18; else if(whaleScore>40) s+=10; else if(whaleScore>15) s+=5;
  s+=(lockScore||0);
  return Math.min(100,Math.max(0,s));
}

function passesFilter(liq,vol,change,rug,fdv,distScore,botScore,whaleData,lockData){
  if(fdv && fdv >= MAX_MC) return false;
  if(liq<5000) return false;
  if(rug>70) return false;
  if(vol/(liq+1)<0.2) return false;
  if(change<-50) return false;
  if(botScore!==undefined&&botScore>85) return false;
  if(distScore!==undefined&&distScore<15) return false;
  return true;
}

async function runHotFilter(){
  const btn=document.getElementById("hotBtn");
  const hotResult=document.getElementById("hotResult");
  const filterInfo=document.getElementById("filterInfo");
  btn.disabled=true; btn.textContent="⏳ Deep Scanning...";
  hotResult.innerHTML=""; filterInfo.textContent="Fetching tokens...";
  try{
    const [r1,r2,r3]=await Promise.allSettled([
      fetch("https://api.dexscreener.com/token-boosts/latest/v1").then(r=>r.json()),
      fetch("https://api.dexscreener.com/latest/dex/search?q=SOL").then(r=>r.json()),
      fetch("https://api.dexscreener.com/token-profiles/latest/v1").then(r=>r.json())
    ]);
    let pairs=[];
    if(r1.status==="fulfilled"&&Array.isArray(r1.value)){
      const sb=r1.value.filter(b=>b.chainId==="solana").slice(0,15);
      const br=await Promise.allSettled(sb.map(b=>fetch("https://api.dexscreener.com/latest/dex/tokens/"+b.tokenAddress).then(r=>r.json())));
      br.forEach(res=>{if(res.status==="fulfilled"&&res.value.pairs?.length>0) pairs.push(res.value.pairs[0]);});
    }
    if(r2.status==="fulfilled"&&r2.value.pairs){
      pairs=[...pairs,...r2.value.pairs.filter(p=>p.chainId==="solana").slice(0,20)];
    }
    if(r3.status==="fulfilled"&&Array.isArray(r3.value)){
      const sp=r3.value.filter(b=>b.chainId==="solana").slice(0,10);
      const pr=await Promise.allSettled(sp.map(b=>fetch("https://api.dexscreener.com/latest/dex/tokens/"+(b.tokenAddress||b.address)).then(r=>r.json())));
      pr.forEach(res=>{if(res.status==="fulfilled"&&res.value.pairs?.length>0) pairs.push(res.value.pairs[0]);});
    }
    const seen=new Set();
    pairs=pairs.filter(p=>{
      const a=p.baseToken?.address;
      if(!a||seen.has(a)||!p.chainId||p.chainId!=="solana") return false;
      seen.add(a);
      return true;
    });
    filterInfo.textContent=`Deep scanning ${pairs.length} tokens...`;
    let passed=[], scanned=0;
    for(let p of pairs){
      scanned++;
      const liq=p.liquidity?.usd||0, vol=p.volume?.h24||0;
      const change=p.priceChange?.h24||0, fdv=p.fdv||p.marketCap||0;
      const address=p.baseToken?.address||"";
      if(!address) continue;
      const rug=rugChance(liq,vol,50);
      if(fdv&&fdv>=MAX_MC) continue;
      if(liq<5000||rug>70) continue;
      filterInfo.textContent=`Scanning ${scanned}/${pairs.length}: ${p.baseToken?.symbol||''}...`;
      const [holderData,botData,whaleData,lockData]=await Promise.all([
        getHolderData(address), analyzeBotActivity(address),
        detectRealWhales(address,liq,vol),
        checkLiquidityLock(p.pairAddress||address,address)
      ]);
      const distScore=holderData?.distScore||50;
      const botScore=botData?.botScore||50;
      const whaleScore=whaleData?.whaleScore||0;
      if(!passesFilter(liq,vol,change,rug,fdv,distScore,botScore,whaleData,lockData)) continue;
      const score=calcHotScore(liq,vol,change,distScore,botScore,whaleScore,lockData.score||0);
      if(score<25) continue;
      const isPremium=score>=70&&whaleData.realWhaleCount>=2&&lockData.locked;
      passed.push({
        name:p.baseToken?.name||"Unknown", symbol:p.baseToken?.symbol||"?",
        address, liq, vol, change, fdv, rug, score, isPremium,
        holderData, botData, whaleData, lockData,
        dexUrl:dexLink(address,p.url)
      });
    }
    passed.sort((a,b)=>b.score-a.score);
    filterInfo.textContent=`✅ Found ${passed.length} gems out of ${pairs.length} scanned`;
    if(!passed.length){
      hotResult.innerHTML=`<div class="no-results">😔 No results — try again soon</div>`;
    } else {
      hotResult.innerHTML=`<div class="filter-grid">${passed.map(t=>`
        <div class="hot-card ${t.isPremium?'premium':''}">
          <h3>${t.name} <span style="font-size:14px">(${t.symbol})</span>${t.isPremium?'<span class="premium-badge">⭐ TOP PICK</span>':''}</h3>
          <div class="hot-row">
            <span class="hot-stat green">💧 $${fmt(t.liq)}</span>
            <span class="hot-stat green">📊 $${fmt(t.vol)}</span>
            <span class="hot-stat ${t.change>0?'green':'red'}">${t.change>0?'📈':'📉'} ${t.change.toFixed(1)}%</span>
            ${t.fdv?`<span class="hot-stat yellow">💰 MC $${fmt(t.fdv)}</span>`:'<span class="hot-stat yellow">💰 MC N/A</span>'}
            <span class="hot-stat ${t.lockData.locked?'green':'red'}">${t.lockData.locked?'🔒 LP Safe':'🔓 LP Open'}</span>
            <span class="hot-stat ${t.whaleData.whaleScore>60?'gold':t.whaleData.whaleScore>30?'yellow':'red'}">${t.whaleData.label}</span>
            <span class="hot-stat ${t.botData.botScore<30?'green':t.botData.botScore<65?'yellow':'red'}">🤖 ${t.botData.botScore}%</span>
            ${t.holderData?`<span class="hot-stat ${t.holderData.distScore>70?'green':t.holderData.distScore>40?'yellow':'red'}">👥 ${t.holderData.distScore}</span>`:''}
            <span class="hot-stat ${t.rug<30?'green':t.rug<50?'yellow':'red'}">💀 ${t.rug}%</span>
          </div>
          <div class="score-bar" style="margin-top:10px"><div class="score-fill ${t.isPremium?'gold':''}" style="width:${t.score}%"></div></div>
          <div style="font-size:12px;color:${t.isPremium?'#fde68a':'#6ee7b7'};margin-top:6px">Hot Score: ${t.score}/100</div>
          <div class="card-actions">
            <a class="dex-btn" href="${t.dexUrl}" target="_blank">📈 DEX</a>
            <span class="dex-btn" onclick="copyAndScan('${t.address}')">🔍 Analyze</span>
          </div>
        </div>`).join('')}</div>`;
    }
  }catch(e){ hotResult.innerHTML=`<div class="no-results">❌ Error: ${e.message}</div>`; }
  btn.disabled=false; btn.textContent="🔥 Find Hot Tokens";
}

function copyAndScan(address){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-scan').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('token').value=address;
  scan();
}
</script>
