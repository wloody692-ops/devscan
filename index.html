<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Arena Mobile</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050a08;
color:#eafff3;
}

.header{
padding:14px;
text-align:center;
background:#071c14;
border-bottom:1px solid #10b981;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#0b2a1d;
border-radius:12px;
padding:12px;
margin-top:10px;
border:1px solid rgba(16,185,129,0.25);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.name{
font-size:14px;
font-weight:bold;
}

.symbol{
font-size:11px;
opacity:0.7;
}

.stats{
font-size:11px;
opacity:0.85;
margin-top:6px;
}

.bar{
margin-top:8px;
height:8px;
background:rgba(255,255,255,0.12);
border-radius:6px;
overflow:hidden;
}

.fill{
background:#10b981;
height:100%;
transition:0.3s;
}

.likeBtn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#10b981;
color:black;
font-weight:bold;
font-size:13px;
cursor:pointer;
}

.likeBtn:active{
transform:scale(0.97);
}

.badge{
font-size:11px;
color:#00ff88;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
MEME ARENA ⚔️ ONE TAP MOBILE
</div>

<div class="container" id="app">Loading coins...</div>

<script>

let likes = JSON.parse(localStorage.getItem("likes") || "{}");

/* =========================
   🔥 REAL API FIXED
   ========================= */
async function getPairs(){

const controller = new AbortController();
const timeout = setTimeout(()=>controller.abort(), 5000);

try{

const res = await fetch(
"https://api.dexscreener.com/latest/dex/search/?q=sol",
{ signal: controller.signal }
);

clearTimeout(timeout);

const data = await res.json();

/* مهم: نجيب pairs إذا موجودة */
return data?.pairs || [];

}catch(e){

clearTimeout(timeout);

return [
{
baseToken:{name:"Pepe Solana",symbol:"PEPE"},
liquidity:{usd:12000},
volume:{h24:8000}
},
{
baseToken:{name:"Bonk Inu",symbol:"BONK"},
liquidity:{usd:22000},
volume:{h24:15000}
},
{
baseToken:{name:"WIF Dog",symbol:"WIF"},
liquidity:{usd:18000},
volume:{h24:11000}
}
];

}
}

/* 🧠 power */
function power(p){
let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
return vol / (liq + 1);
}

/* ❤️ like system (mobile tap) */
function like(symbol){
likes[symbol] = (likes[symbol] || 0) + 1;
localStorage.setItem("likes", JSON.stringify(likes));
render(lastData);
}

let lastData = [];

/* 🎯 render */
function render(pairs){

lastData = pairs;

let app = document.getElementById("app");
app.innerHTML = "";

if(!pairs || pairs.length === 0){
app.innerHTML = `<div class="badge">⚠️ Loading fallback coins...</div>`;
}

pairs.slice(0,8).forEach(p=>{

let name = p.baseToken?.name || "Unknown";
let symbol = p.baseToken?.symbol || "?";

let score = power(p);
let bar = Math.min(100, score*35);

let l = likes[symbol] || 0;

app.innerHTML += `
<div class="card">

<div class="top">
<div>
<div class="name">${name}</div>
<div class="symbol">${symbol}</div>
</div>
<div>❤️ ${l}</div>
</div>

<div class="bar">
<div class="fill" style="width:${bar}%"></div>
</div>

<div class="stats">
💧 Liquidity: $${Math.round(p.liquidity?.usd || 0)} |
📊 Volume: $${Math.round(p.volume?.h24 || 0)}
</div>

<button class="likeBtn" onclick="like('${symbol}')">
👍 TAP TO LIKE
</button>

</div>
`;
});

}

/* 🔁 loop */
async function loop(){
let data = await getPairs();
render(data);
}

loop();
setInterval(loop, 7000);

</script>

</body>
</html>
