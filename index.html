<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevScan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#021a12,#000);
  color:#eafff3;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.logo{
  font-size:36px;
  font-weight:bold;
}

.hook{
  color:#00ff99;
  font-size:13px;
  margin-bottom:10px;
}

.card{
  border:1px solid #00ff99;
  border-radius:12px;
  padding:15px;
  margin-top:15px;
  background:rgba(0,255,100,0.05);
}

input{
  width:70%;
  padding:12px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.alert{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff99;
  color:#000;
  padding:10px;
  border-radius:8px;
  display:none;
  font-weight:bold;
}

.twitter{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  border:1px solid #00ff99;
  border-radius:8px;
  color:#00ff99;
  text-decoration:none;
  font-size:13px;
}

.feed{
  height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">🚀 DevScan</div>
  <div class="hook">We detect smart money before the move ⚡</div>

  <!-- TWITTER -->
  <a class="twitter" href="https://twitter.com/devscan1" target="_blank">
    🐦 Follow @devscan1
  </a>

  <!-- SCANNER -->
  <div class="card">
    <input id="tokenInput" placeholder="Paste token / wallet"/>
    <button onclick="scan()">ANALYZE</button>

    <div id="result" style="margin-top:15px;"></div>
  </div>

  <!-- FEED -->
  <div class="card">
    <h3>🐋 Live Smart Money Feed</h3>
    <div id="feed" class="feed"></div>
  </div>

</div>

<div id="alert" class="alert"></div>

<script>

// =====================
// ALERT
// =====================
function alertUser(msg){
  const a = document.getElementById("alert");
  a.innerText = msg;
  a.style.display = "block";
  setTimeout(()=>a.style.display="none",2500);
}

// =====================
// SIMPLE RISK ENGINE (NO API)
// =====================
function risk(addr){
  let h = 0;
  for(let i=0;i<addr.length;i++){
    h += addr.charCodeAt(i);
  }
  return h % 100;
}

// =====================
// SCAN
// =====================
function scan(){

  const addr = document.getElementById("tokenInput").value;

  if(!addr){
    alertUser("Enter token/wallet");
    return;
  }

  const r = risk(addr);

  let status =
    r > 70 ? "🔴 DANGER" :
    r > 40 ? "🟠 WATCH" :
    "🟢 SAFE";

  if(r > 70){
    alertUser("🚨 HIGH RISK DETECTED");
  }

  document.getElementById("result").innerHTML = `
    🪙 ${addr}<br/>
    💀 Risk: ${r}/100<br/>
    ⚡ ${status}<br/><br/>

    <button onclick="share('${addr}',${r})">
      🚀 Share on X
    </button>
  `;
}

// =====================
// TWITTER SHARE (WITH YOUR HANDLE)
// =====================
function share(addr,r){

  const text = encodeURIComponent(
`🚀 DevScan Alert

🪙 ${addr}
💀 Risk: ${r}/100

Track smart money before moves ⚡
Follow @devscan1 for more alpha 👇
https://twitter.com/devscan1

#Solana #Crypto #Alpha`
  );

  window.open("https://twitter.com/intent/tweet?text="+text,"_blank");
}

// =====================
// LIVE FEED
// =====================
function feed(){

  const coins = ["BONK","WIF","JUP","SOL","MEW","PYTH"];

  setInterval(()=>{

    const c = coins[Math.floor(Math.random()*coins.length)];

    document.getElementById("feed").innerHTML =
      `🐋 Smart Money → <b>${c}</b> | ${new Date().toLocaleTimeString()}`;

  },3000);
}

feed();

</script>

</body>
</html>
