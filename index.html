<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
border-bottom:1px solid #10b981;
background:rgba(16,185,129,0.08);
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.twitterBtn{
display:inline-block;
margin-top:6px;
padding:5px 10px;
border-radius:6px;
background:#000;
color:#fff;
font-size:12px;
font-weight:bold;
text-decoration:none;
border:1px solid #10b981;
}

.container{
max-width:900px;
margin:auto;
padding:12px;
}

.card{
margin-top:12px;
padding:14px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-size:12px;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff3b3b;}

.dexBtn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
border-radius:10px;
background:#10b981;
color:#000;
font-weight:bold;
text-decoration:none;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<h1>DevScan</h1>

<a class="twitterBtn" href="https://twitter.com/devscan1" target="_blank">
Twitter
</a>

</div>

<div class="container">
<div id="feed">Scanning strong volume tokens...</div>
</div>

<script>

/* ================= FETCH ================= */
async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* ================= STRONG FILTER ================= */
function isStrong(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;

/* 🟢 لازم يكون فيه نشاط حقيقي */
let volumeStrength = vol > 800;

/* 🔥 لازم volume قوي مقارنة بالسيولة */
let spike = vol / (liq + 1);
let whalePressure = spike > 1.2;

/* 💧 ما يكون ضخم جدًا ولا ميت */
let healthyLiquidity = liq >= 10000 && liq <= 250000;

/* 🎯 النتيجة */
return volumeStrength && whalePressure && healthyLiquidity;
}

/* ================= DETECT ================= */
function detect(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
let price = parseFloat(p.priceUsd || 0);
let mc = p.fdv || 0;

let spike = vol / (liq + 1);

let score = 50;

if(spike > 2) score += 35;
if(vol > liq * 0.6) score += 25;
if(liq < 50000) score += 10;

let signal = "❌ NO FLOW";

if(score > 80) signal = "🐋 STRONG FLOW";
else if(score > 60) signal = "🟡 ACTIVE";
else signal = "❌ WEAK";

let range = price * (0.02 + spike / 50);

return {
score,
signal,
liq,
vol,
mc,
price,
low: price - range,
high: price + range
};
}

/* ================= RENDER ================= */
function render(pairs){

let feed = document.getElementById("feed");
feed.innerHTML = "";

let list = pairs
.filter(isStrong)
.map(p => {
let d = detect(p);
return {...p, ...d};
});

list.sort((a,b)=>b.score-a.score);

if(list.length === 0){
feed.innerHTML = "🔍 No strong volume tokens right now...";
return;
}

list.slice(0,5).forEach(p=>{

let color = "red";
if(p.signal.includes("STRONG")) color = "green";
else if(p.signal.includes("ACTIVE")) color = "orange";

let dex = p.pairAddress
? `https://dexscreener.com/solana/${p.pairAddress}`
: "#";

feed.innerHTML += `
<div class="card">

<h3>${p.baseToken?.symbol || "UNKNOWN"}</h3>

<p>💰 Market Cap: $${Math.round(p.mc || 0)}</p>
<p>💧 Liquidity: $${Math.round(p.liq)}</p>
<p>📊 Volume: $${Math.round(p.vol)}</p>

<hr>

<p class="badge ${color}">
${p.signal} • Score ${p.score}
</p>

<p>📊 Entry Zone</p>
<p><b>$${p.low.toFixed(8)} - $${p.high.toFixed(8)}</b></p>

<a class="dexBtn" href="${dex}" target="_blank">
Open DexScreener
</a>

</div>
`;
});

}

/* ================= LOOP ================= */
async function loop(){
const p = await getPairs();
render(p);
}

loop();
setInterval(loop, 8000);

</script>

</body>
</html>
