<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CITY RUN AAA</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:fixed;
top:10px;left:10px;
color:#00ffcc;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
z-index:10;
display:none;
}

#store{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#001a2a,#000);
color:white;
z-index:50;
}

#title{
font-size:32px;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
}

button{
padding:15px 40px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00ffcc;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:none;
gap:10px;
z-index:10;
}

.btn{
width:60px;
height:60px;
background:rgba(0,255,204,0.15);
border:2px solid #00ffcc;
border-radius:12px;
color:#00ffcc;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<div id="store">
<div id="title">🕴🏻 NEON CITY RUN</div>
<p>AAA Cyberpunk Mobile Game</p>
<button id="play">PLAY</button>
</div>

<div id="ui">🪙 Coins: <span id="coins">0</span></div>

<div id="controls">
<div class="btn" id="left">⬅️</div>
<div class="btn" id="up">⬆️</div>
<div class="btn" id="down">⬇️</div>
<div class="btn" id="right">➡️</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- 🌟 BLOOM -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

// 🌌 SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.FogExp2(0x05060a, 0.015);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,10);

// 🖥️ RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 AAA LIGHTING
const ambient = new THREE.AmbientLight(0x1b2a3a,0.6);
scene.add(ambient);

const key = new THREE.DirectionalLight(0x9bdcff,1.2);
key.position.set(30,50,20);
scene.add(key);

const fill = new THREE.DirectionalLight(0x6a4cff,0.4);
fill.position.set(-30,20,-20);
scene.add(fill);

const neon = new THREE.PointLight(0x00ffcc,2.5,200);
neon.position.set(0,10,0);
scene.add(neon);

const rim = new THREE.PointLight(0xff00ff,1.5,200);
rim.position.set(-20,10,-20);
scene.add(rim);

// 🌍 GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(250,250),
new THREE.MeshStandardMaterial({
color:0x0b0f14,
metalness:0.3,
roughness:0.7
})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 🧍 PLAYER
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({
color:0x00ffcc,
emissive:0x00ffcc,
emissiveIntensity:1.2
})
);
player.position.y=0.5;
scene.add(player);

// 🏙️ CITY
for(let i=0;i<80;i++){
const h = 2 + Math.random()*12;

const b = new THREE.Mesh(
new THREE.BoxGeometry(2,h,2),
new THREE.MeshStandardMaterial({
color:0x0b1220,
emissive:0x00ffcc,
emissiveIntensity:0.03
})
);

b.position.set((Math.random()-0.5)*150,h/2,(Math.random()-0.5)*150);
scene.add(b);
}

// 🪙 COINS
let coinsArr=[];
let coins=0;

for(let i=0;i<30;i++){
const c=new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshStandardMaterial({
color:0xffff00,
emissive:0x444400
})
);

c.position.set((Math.random()-0.5)*120,0.5,(Math.random()-0.5)*120);
scene.add(c);
coinsArr.push(c);
}

// 🚗 CARS
let cars=[];
for(let i=0;i<10;i++){
const car=new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,2),
new THREE.MeshStandardMaterial({color:0xff0044})
);

car.position.set((Math.random()-0.5)*120,0.25,(Math.random()-0.5)*120);
scene.add(car);
cars.push(car);
}

// 🎮 BLOOM
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));

const bloom = new THREE.UnrealBloomPass(
new THREE.Vector2(innerWidth,innerHeight),
1.5,0.4,0.85
);

composer.addPass(bloom);

// 🎮 INPUT
let move={x:0,z:0};

function bind(btn,x,z){
btn.addEventListener("touchstart",()=>{move.x=x;move.z=z;});
btn.addEventListener("touchend",()=>{move.x=0;move.z=0;});
btn.addEventListener("mousedown",()=>{move.x=x;move.z=z;});
btn.addEventListener("mouseup",()=>{move.x=0;move.z=0;});
}

bind(left,-1,0);
bind(right,1,0);
bind(up,0,-1);
bind(down,0,1);

// ▶ START
document.getElementById("play").onclick=()=>{
document.getElementById("store").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("controls").style.display="flex";
animate();
};

// 🎮 LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
player.position.x += move.x*0.3;
player.position.z += move.z*0.3;

// CAMERA
camera.position.x=player.position.x;
camera.position.z=player.position.z+12;
camera.lookAt(player.position);

// COINS
coinsArr.forEach(c=>{
c.rotation.y+=0.05;
if(c.visible && c.position.distanceTo(player.position)<1){
c.visible=false;
coins++;
document.getElementById("coins").innerText=coins;
}
});

// CARS
cars.forEach(c=>{
c.position.x+=Math.sin(Date.now()*0.001+c.position.z)*0.05;
});

composer.render();
}

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
composer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
