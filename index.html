<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan PRO Stable</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
min-height:100vh;
overflow:auto;
}
.header{
padding:14px;
text-align:center;
background:rgba(16,185,129,0.08);
border-bottom:1px solid #10b981;
}
.header h1{
margin:0;
font-size:34px;
font-weight:900;
letter-spacing:1px;
color:#10b981;
}
.header a{
display:flex;
justify-content:center;
margin-top:6px;
text-decoration:none;
}
.container{
padding:12px;
max-width:900px;
margin:auto;
}
.searchBox{
display:flex;
gap:10px;
margin-top:10px;
}
input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #10b981;
background:#062d1d;
color:white;
outline:none;
}
button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#10b981;
color:black;
font-weight:bold;
cursor:pointer;
}
.card{
margin-top:15px;
padding:15px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}
.badge{
display:inline-block;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
background:#10b981;
color:black;
}
.history-item{
padding:8px 10px;
border-radius:8px;
margin-top:6px;
font-size:13px;
border-left:3px solid #10b981;
background:rgba(16,185,129,0.07);
}
.history-dead{
border-left-color:#f87171;
background:rgba(248,113,113,0.07);
}
.history-alive{
border-left-color:#34d399;
background:rgba(52,211,153,0.07);
}
</style>
</head>

<body>

<div class="header">
  <h1>DevScan</h1>
  <a href="https://twitter.com/devscan1" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="black">
      <path d="M18.244 2H21.5l-7.4 8.44L22 22h-6.9l-5.4-6.4L3.7 22H.5l7.9-9.02L2 2h7l4.9 5.8L18.244 2zm-1.2 18h1.9L6.1 4H4.1l12.944 16z"/>
    </svg>
  </a>
</div>

<div class="container">
  <div class="searchBox">
    <input id="token" placeholder="Paste token address">
    <button onclick="scan()">Analyze</button>
  </div>
  <div id="result"></div>
</div>

<script>

const HELIUS_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";

async function getMintAuthority(mint){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/mints/${mint}?api-key=${HELIUS_KEY}`);
    const d = await r.json();
    return d?.mintAuthority || null;
  }catch(e){ return null; }
}

async function getRealDev(mint){
  try{
    const r = await fetch(
      `https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=100`
    );
    const txs = await r.json();
    if(!txs || !Array.isArray(txs) || txs.length === 0) return null;

    const sorted = [...txs].sort((a,b) =>
      (a.timestamp||a.blockTime||0) - (b.timestamp||b.blockTime||0)
    );
    const oldest = sorted[0];

    if(oldest.accountData && oldest.accountData.length > 0){
      const signerAccount = oldest.accountData[0]?.account;
      if(signerAccount && signerAccount !== mint){
        return { wallet: signerAccount, source: "First Signer (Init TX)" };
      }
    }
    if(oldest.feePayer){
      return { wallet: oldest.feePayer, source: "Fee Payer (Oldest TX)" };
    }
    return null;
  }catch(e){ return null; }
}

async function getDevHistory(devWallet){
  try{
    const r = await fetch(
      `https://api.helius.xyz/v0/addresses/${devWallet}/transactions?api-key=${HELIUS_KEY}&limit=100`
    );
    const txs = await r.json();
    if(!txs || !Array.isArray(txs)) return [];

    let mints = [];
    txs.forEach(tx => {
      if(tx.tokenTransfers && tx.tokenTransfers.length > 0){
        tx.tokenTransfers.forEach(t => {
          if(t.mint && t.mint !== "" && !mints.includes(t.mint)){
            mints.push(t.mint);
          }
        });
      }
    });

    let history = [];
    const toCheck = mints.slice(0, 6);

    for(let mint of toCheck){
      try{
        const dr = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + mint);
        const dd = await dr.json();
        if(dd.pairs && dd.pairs.length > 0){
          const pair = dd.pairs[0];
          const liq = pair.liquidity?.usd || 0;
          history.push({
            name: pair.baseToken.name || mint.slice(0,8)+"...",
            symbol: pair.baseToken.symbol || "?",
            liquidity: liq,
            alive: liq > 1000
          });
        }
      }catch(e){}
    }
    return history;
  }catch(e){ return []; }
}

function resolveDev(mintAuth, realDev){
  if(mintAuth && mintAuth !== "11111111111111111111111111111111"){
    return { wallet: mintAuth, type: "Mint Authority (CONFIRMED DEV)" };
  }
  if(realDev){
    return { wallet: realDev.wallet, type: `Early Dev Wallet (${realDev.source})` };
  }
  return { wallet: "Unknown", type: "Unverified" };
}

function whaleStats(volume, liquidity){
  let ratio = volume / (liquidity + 1);
  let percent = Math.min(100, ratio * 25);
  let label = "NO WHALES";
  if(percent > 70) label = "🐋 STRONG WHALES";
  else if(percent > 40) label = "🐋 MID WHALES";
  else if(percent > 15) label = "🟡 LOW WHALES";
  return {percent:Math.round(percent), label};
}

function rugChance(liquidity, volume, whalePercent){
  let risk = 35;
  if(liquidity < 3000) risk += 30;
  if(volume > liquidity * 4) risk += 25;
  if(whalePercent > 60) risk += 15;
  if(liquidity > 20000) risk -= 20;
  return Math.min(100, Math.max(0, risk));
}

function buildHistoryHTML(history){
  if(!history || history.length === 0){
    return `<p style="color:#6ee7b7;font-size:13px">No previous tokens found — first project or unknown dev</p>`;
  }

  const dead = history.filter(h => !h.alive).length;
  const alive = history.filter(h => h.alive).length;
  const total = history.length;

  const verdict = dead === total
    ? `🔴 All previous tokens rugged — HIGH RISK`
    : dead > alive
    ? `🟡 Most tokens rugged (${dead}/${total})`
    : `🟢 Has surviving tokens (${alive}/${total})`;

  let items = history.map(h => `
    <div class="history-item ${h.alive ? 'history-alive' : 'history-dead'}">
      ${h.alive ? '🟢' : '🔴'} <strong>${h.name} (${h.symbol})</strong>
      — Liquidity: $${Math.round(h.liquidity).toLocaleString()}
      ${h.alive ? '✅ Alive' : '💀 Dead'}
    </div>
  `).join('');

  return `<p style="margin-bottom:6px"><strong>${verdict}</strong></p>${items}`;
}

async function scan(){
  const token = document.getElementById("token").value.trim();
  const result = document.getElementById("result");

  if(!token){
    result.innerHTML = "❌ Enter token address";
    return;
  }

  result.innerHTML = "🧠 Analyzing token...";

  try{
    const r = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + token);
    const data = await r.json();

    if(!data.pairs){
      result.innerHTML = "❌ No data";
      return;
    }

    const p = data.pairs[0];
    const liquidity = p.liquidity?.usd || 0;
    const volume = p.volume?.h24 || 0;

    let score = 50;
    if(liquidity > 20000) score += 20;
    else if(liquidity < 3000) score -= 25;
    if(volume > 100000) score += 15;
    else if(volume < 1000) score -= 10;

    result.innerHTML = "🔍 Fetching dev wallet and history...";

    let mintAuth = await getMintAuthority(token);
    let realDev = await getRealDev(token);
    let devInfo = resolveDev(mintAuth, realDev);

    result.innerHTML = "📜 Analyzing dev history...";

    let history = [];
    if(devInfo.wallet !== "Unknown"){
      history = await getDevHistory(devInfo.wallet);

      const dead = history.filter(h => !h.alive).length;
      const total = history.length;
      if(total > 0){
        const deadRatio = dead / total;
        if(deadRatio === 1) score -= 25;
        else if(deadRatio > 0.6) score -= 15;
        else if(deadRatio < 0.3) score += 10;
      }
    }

    let whale = whaleStats(volume, liquidity);
    let rug = rugChance(liquidity, volume, whale.percent);

    let status = "🟢 SAFE";
    if(score < 40 || rug > 70) status = "🔴 HIGH RISK";
    else if(score < 70) status = "🟡 MID";

    result.innerHTML = `
<div class="card">

<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>
<p>💧 Liquidity: $${Math.round(liquidity)}</p>
<p>📊 Volume: $${Math.round(volume)}</p>

<hr>

<h2>Score: ${Math.round(score)}/100</h2>
<span class="badge">${status}</span>

<hr>

<h3>🧬 Dev Intelligence</h3>
<p style="word-break:break-all">${devInfo.wallet}</p>
<p>${devInfo.type}</p>

<hr>

<h3>📜 Dev History</h3>
${buildHistoryHTML(history)}

<hr>

<h3>🐋 Whale Activity</h3>
<p>${whale.label}</p>
<p>Strength: ${whale.percent}%</p>

<h3>💀 Rug Probability</h3>
<p>${rug}%</p>

</div>
`;

  }catch(e){
    result.innerHTML = "❌ Error";
  }
}

</script>
</body>
</html>
