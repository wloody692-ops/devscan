<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan Entry Zones</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
border-bottom:1px solid #10b981;
background:rgba(16,185,129,0.08);
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.container{
max-width:900px;
margin:auto;
padding:12px;
}

.card{
margin-top:12px;
padding:14px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-size:12px;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff3b3b;}

a.link{
display:inline-block;
margin-top:8px;
color:#10b981;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1>DEVSCAN ENTRY ZONES</h1>
</div>

<div class="container">

<div id="feed">Loading...</div>

</div>

<script>

/* ================= FETCH ================= */
async function getPairs(){
try{
const r=await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const data=await r.json();
return data.pairs || [];
}catch{
return [];
}
}

/* ================= SCORE ================= */
function analyze(p){

let price=parseFloat(p.priceUsd||0);
let liq=p.liquidity?.usd||0;
let vol=p.volume?.h24||0;

let score=0;

/* strength */
if(liq>2000 && liq<50000) score+=30;
if(vol>5000) score+=30;

let ratio=vol/(liq+1);
if(ratio>1) score+=25;

/* ENTRY ZONES */
let zoneLow = price * 0.95;
let zoneHigh = price * 1.05;

let zoneType="🔴 NO ENTRY";

if(score>70) zoneType="🟢 STRONG ENTRY ZONE";
else if(score>40) zoneType="🟡 MID ENTRY ZONE";

return {
score,
price,
zoneLow,
zoneHigh,
liq,
vol,
zoneType
};
}

/* ================= RENDER ================= */
function render(pairs){

let feed=document.getElementById("feed");
feed.innerHTML="";

let scored=pairs.map(p=>{
let r=analyze(p);
return {...p,...r};
});

/* top strongest first */
scored.sort((a,b)=>b.score - a.score);

/* top 5 */
scored.slice(0,5).forEach(p=>{

let color="red";
if(p.zoneType.includes("STRONG")) color="green";
else if(p.zoneType.includes("MID")) color="orange";

let dexLink=p.pairAddress
? `https://dexscreener.com/solana/${p.pairAddress}`
: "#";

feed.innerHTML+=`
<div class="card">

<h3>${p.baseToken?.symbol}</h3>

<p>Price: $${p.price}</p>
<p>Liquidity: $${Math.round(p.liq)}</p>
<p>Volume: $${Math.round(p.vol)}</p>

<hr>

<p class="badge ${color}">
${p.zoneType}
</p>

<p>Entry Zone:</p>
<p><b>$${p.zoneLow.toFixed(8)} - $${p.zoneHigh.toFixed(8)}</b></p>

<a class="link" href="${dexLink}" target="_blank">
🔗 Open DexScreener
</a>

</div>
`;
});

}

async function loop(){
const pairs=await getPairs();
render(pairs);
}

loop();
setInterval(loop,10000);

</script>

</body>
</html>
