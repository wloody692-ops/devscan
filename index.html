<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan PRO Stable</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
min-height:100vh;
}

.header{
padding:14px;
text-align:center;
background:rgba(16,185,129,0.08);
border-bottom:1px solid #10b981;
position:sticky;
top:0;
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.header a{
display:inline-block;
margin-top:6px;
text-decoration:none;
}

.container{
padding:12px;
max-width:900px;
margin:auto;
}

.searchBox{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #10b981;
background:#062d1d;
color:white;
outline:none;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#10b981;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:15px;
padding:15px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
background:#10b981;
color:black;
}
</style>
</head>

<body>

<!-- HEADER ثابت -->
<div class="header">
  <h1>DevScan</h1>

  <a href="https://twitter.com/devscan1" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="black">
      <path d="M18.244 2H21.5l-7.4 8.44L22 22h-6.9l-5.4-6.4L3.7 22H.5l7.9-9.02L2 2h7l4.9 5.8L18.244 2zm-1.2 18h1.9L6.1 4H4.1l12.944 16z"/>
    </svg>
  </a>
</div>

<div class="container">

<div class="searchBox">
<input id="token" placeholder="Paste token address">
<button onclick="scan()">Analyze</button>
</div>

<div id="result"></div>

</div>

<script>

async function getDevWallet(mint){

try{

const r = await fetch("https://api.dexscreener.com/latest/dex/tokens/"+mint);
const data = await r.json();

const pair = data.pairs?.[0];

// أبسط وأقوى احتمال للديف
if(pair?.pairAddress) return pair.pairAddress;

if(pair?.baseToken?.address) return pair.baseToken.address;

return "Unknown";

}catch(e){
return "Unknown";
}
}

async function scan(){

const token = document.getElementById("token").value.trim();
const result = document.getElementById("result");

if(!token){
result.innerHTML="❌ اكتب التوكن";
return;
}

result.innerHTML="🧠 Loading...";

try{

const r = await fetch("https://api.dexscreener.com/latest/dex/tokens/"+token);
const data = await r.json();

if(!data.pairs){
result.innerHTML="❌ No data";
return;
}

const p = data.pairs[0];

const liquidity = p.liquidity?.usd || 0;
const volume = p.volume?.h24 || 0;

const devWallet = await getDevWallet(token);

result.innerHTML=`
<div class="card">

<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>

<p>💧 Liquidity: $${Math.round(liquidity)}</p>
<p>📊 Volume: $${Math.round(volume)}</p>

<hr>

<h3>🧬 Dev Wallet</h3>
<p style="word-break:break-all">${devWallet}</p>

</div>
`;

}catch(e){
result.innerHTML="❌ Error";
}

}

</script>

</body>
</html>
