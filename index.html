<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Stray King 3D</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#ui{
position:fixed;
top:10px;left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;
z-index:10;
}
</style>
</head>
<body>

<div id="ui">
🦴 Bones: <span id="score">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 10, 80);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 🐶 DOG PLAYER
const dog = new THREE.Mesh(
new THREE.SphereGeometry(0.6),
new THREE.MeshStandardMaterial({color:0x8b5a2b})
);
dog.position.y = 0.6;
scene.add(dog);

// CITY
for(let i=0;i<40;i++){
const b = new THREE.Mesh(
new THREE.BoxGeometry(1+Math.random()*2, Math.random()*6, 1+Math.random()*2),
new THREE.MeshStandardMaterial({color:0x888888})
);
b.position.set((Math.random()-0.5)*60, b.geometry.parameters.height/2, (Math.random()-0.5)*60);
scene.add(b);
}

// BONES
let bones = [];
let score = 0;

for(let i=0;i<20;i++){
const bone = new THREE.Mesh(
new THREE.BoxGeometry(0.4,0.2,0.2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
bone.position.set((Math.random()-0.5)*50,0.2,(Math.random()-0.5)*50);
scene.add(bone);
bones.push(bone);
}

// CARS
let cars = [];
for(let i=0;i<6;i++){
const car = new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,2),
new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.set((Math.random()-0.5)*50,0.25,(Math.random()-0.5)*50);
scene.add(car);
cars.push(car);
}

// TOUCH / MOUSE CONTROL
let target = new THREE.Vector3();

document.addEventListener("mousemove",(e)=>{
target.x = (e.clientX/window.innerWidth - 0.5)*30;
target.z = (e.clientY/window.innerHeight - 0.5)*30;
});

document.addEventListener("touchmove",(e)=>{
target.x = (e.touches[0].clientX/window.innerWidth - 0.5)*30;
target.z = (e.touches[0].clientY/window.innerHeight - 0.5)*30;
});

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE DOG
dog.position.x += (target.x - dog.position.x)*0.08;
dog.position.z += (target.z - dog.position.z)*0.08;

// CAMERA FOLLOW
camera.position.x = dog.position.x;
camera.position.z = dog.position.z + 12;
camera.lookAt(dog.position);

// COLLECT BONES
bones.forEach(b=>{
if(b.visible && b.position.distanceTo(dog.position)<1.2){
b.visible = false;
score++;
document.getElementById("score").innerText = score;
}
});

// CAR MOVEMENT
cars.forEach(c=>{
c.position.x += Math.sin(Date.now()*0.001 + c.position.z)*0.1;

if(c.position.distanceTo(dog.position)<1.5){
score = Math.max(0, score-1);
}
});

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
