<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CITY GTA PROTOTYPE</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}

/* UI */
#ui{
position:fixed;top:10px;left:10px;
color:#00ffcc;
background:rgba(0,0,0,0.6);
padding:10px;border-radius:10px;
display:none;
z-index:10;
}

/* STORE */
#store{
position:fixed;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:radial-gradient(circle,#001a2a,#000);
color:white;z-index:50;
}

#title{color:#00ffcc;font-size:32px;text-shadow:0 0 20px #00ffcc}

button{
padding:14px 40px;
margin:10px;
background:#00ffcc;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

/* CONTROLS */
#controls{
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
display:none;gap:10px;
z-index:10;
}

.btn{
width:60px;height:60px;
background:rgba(0,255,204,0.15);
border:2px solid #00ffcc;
border-radius:12px;
color:#00ffcc;
display:flex;align-items:center;justify-content:center;
}

/* ACTION BUTTON */
#action{
position:fixed;
right:20px;
bottom:120px;
width:80px;height:80px;
background:rgba(255,255,255,0.1);
border:2px solid #00ffcc;
border-radius:50%;
color:#00ffcc;
display:none;
z-index:10;
}
</style>
</head>

<body>

<div id="store">
<div id="title">🕴🏻 NEON CITY GTA PRO</div>
<p>Drive • Collect • Missions</p>
<button id="play">PLAY</button>
</div>

<div id="ui">
🪙 Coins: <span id="coins">0</span><br>
🎯 Mission: <span id="mission">0</span><br>
🚗 In Car: <span id="car">No</span>
</div>

<div id="controls">
<div class="btn" id="left">⬅️</div>
<div class="btn" id="up">⬆️</div>
<div class="btn" id="down">⬇️</div>
<div class="btn" id="right">➡️</div>
</div>

<div id="action">🚗</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let player,car;
let coins=[];
let coinsCount=0;
let mission=0;

let move={x:0,z:0};
let inCar=false;
let started=false;

// 🚀 INIT
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x05060a);
scene.fog=new THREE.Fog(0x05060a,20,140);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,6,10);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHT
scene.add(new THREE.AmbientLight(0x223344,0.8));
const light=new THREE.PointLight(0x00ffcc,2);
light.position.set(10,20,10);
scene.add(light);

// 🌆 CITY
for(let i=0;i<80;i++){
const h=2+Math.random()*10;
const b=new THREE.Mesh(
new THREE.BoxGeometry(2,h,2),
new THREE.MeshStandardMaterial({color:0x0b1220})
);
b.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
scene.add(b);
}

// 🧍 PLAYER
player=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
player.position.y=0.5;
scene.add(player);

// 🚗 CAR
car=new THREE.Mesh(
new THREE.BoxGeometry(1,0.6,2),
new THREE.MeshStandardMaterial({color:0xff0044})
);
car.position.set(5,0.3,5);
scene.add(car);

// 🪙 COINS
for(let i=0;i<40;i++){
const c=new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshStandardMaterial({color:0xffff00})
);
c.position.set((Math.random()-0.5)*150,0.5,(Math.random()-05)*150);
scene.add(c);
coins.push(c);
}

// INPUT
bindControls();

animate();
}

// 🎮 CONTROLS
function bindControls(){
function bind(id,x,z){
const el=document.getElementById(id);
el.addEventListener("touchstart",()=>{move.x=x;move.z=z});
el.addEventListener("touchend",()=>{move.x=0;move.z=0});
el.addEventListener("mousedown",()=>{move.x=x;move.z=z});
el.addEventListener("mouseup",()=>{move.x=0;move.z=0});
}
bind("left",-1,0);
bind("right",1,0);
bind("up",0,-1);
bind("down",0,1);

// 🚗 ENTER/EXIT CAR
document.getElementById("action").onclick=()=>{
if(!inCar){
if(player.position.distanceTo(car.position)<3){
inCar=true;
document.getElementById("car").innerText="Yes";
}
}else{
inCar=false;
player.position.copy(car.position);
document.getElementById("car").innerText="No";
}
};
}

// 🎮 LOOP
function animate(){
requestAnimationFrame(animate);
if(!started) return;

let speed=inCar?0.4:0.25;

// PLAYER OR CAR CONTROL
if(inCar){
car.position.x+=move.x*speed;
car.position.z+=move.z*speed;
camera.position.x=car.position.x;
camera.position.z=car.position.z+12;
camera.lookAt(car.position);
}else{
player.position.x+=move.x*speed;
player.position.z+=move.z*speed;
camera.position.x=player.position.x;
camera.position.z=player.position.z+12;
camera.lookAt(player.position);
}

// COINS
coins.forEach(c=>{
if(c.visible && c.position.distanceTo(player.position)<1){
c.visible=false;
coinsCount++;
document.getElementById("coins").innerText=coinsCount;
}
});

// MISSION SYSTEM
if(coinsCount>=10 && mission===0){
mission=1;
document.getElementById("mission").innerText="Collect Done!";
}

renderer.render(scene,camera);
}

// ▶ START
document.getElementById("play").onclick=()=>{
document.getElementById("store").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("controls").style.display="flex";
document.getElementById("action").style.display="block";

started=true;
init();
};

// RESIZE
window.addEventListener("resize",()=>{
if(camera){
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
}
if(renderer){
renderer.setSize(innerWidth,innerHeight);
}
});

</script>

</body>
</html>
