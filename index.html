<body>

<script>

const HELIUS_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";
const devCache = {};

const IGNORE = new Set([
  "11111111111111111111111111111111",
  "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",
  "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1bh",
  "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s",
  "SysvarRent111111111111111111111111111111111",
  "ComputeBudget111111111111111111111111111111",
  "So11111111111111111111111111111111111111112",
  "pump11111111111111111111111111111111111111",
  "6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P"
]);

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
}

// ========== DevScan Functions ==========

async function getMintAuthority(mint){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/mints/${mint}?api-key=${HELIUS_KEY}`);
    const d = await r.json();
    const auth = d?.mintAuthority;
    if(auth && !IGNORE.has(auth)) return auth;
    return null;
  }catch(e){ return null; }
}

async function getRealDev(mint){
  if(devCache[mint]) return devCache[mint];
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${mint}/transactions?api-key=${HELIUS_KEY}&limit=25`);
    const txs = await r.json();
    if(!txs || !Array.isArray(txs) || txs.length === 0) return null;
    const sorted = [...txs].sort((a,b) => (a.timestamp||a.blockTime||0)-(b.timestamp||b.blockTime||0));
    const candidates = {};
    for(let tx of sorted.slice(0,5)){
      const fp = tx.feePayer;
      if(fp && !IGNORE.has(fp) && fp !== mint){
        candidates[fp] = (candidates[fp]||0)+1;
      }
    }
    const sorted_c = Object.entries(candidates).sort((a,b)=>b[1]-a[1]);
    if(!sorted_c.length) return null;
    const result = { wallet: sorted_c[0][0], source: "Fee Payer (Oldest TX)" };
    devCache[mint] = result;
    return result;
  }catch(e){ return null; }
}

async function getDevHistory(devWallet, currentMint){
  try{
    const r = await fetch(`https://api.helius.xyz/v0/addresses/${devWallet}/transactions?api-key=${HELIUS_KEY}&limit=50`);
    const txs = await r.json();
    if(!txs || !Array.isArray(txs)) return [];
    let mints = new Set();
    txs.forEach(tx => {
      if(tx.feePayer === devWallet && tx.tokenTransfers){
        tx.tokenTransfers.forEach(t => {
          if(t.mint && t.mint !== currentMint && !IGNORE.has(t.mint)) mints.add(t.mint);
        });
      }
    });
    const toCheck = [...mints].reverse().slice(0,3);
    const results = await Promise.allSettled(
      toCheck.map(mint => fetch("https://api.dexscreener.com/latest/dex/tokens/"+mint).then(r=>r.json()))
    );
    let history = [];
    results.forEach(res => {
      if(res.status==="fulfilled" && res.value.pairs?.length>0){
        const pair = res.value.pairs[0];
        const liq = pair.liquidity?.usd||0;
        history.push({ name:pair.baseToken.name||"Unknown", symbol:pair.baseToken.symbol||"?", liquidity:liq, alive:liq>1000 });
      }
    });
    return history;
  }catch(e){ return []; }
}

function resolveDev(mintAuth, realDev){
  if(mintAuth) return { wallet:mintAuth, type:"Mint Authority (CONFIRMED DEV)" };
  if(realDev) return { wallet:realDev.wallet, type:`Early Dev Wallet (${realDev.source})` };
  return { wallet:"Unknown", type:"Unverified" };
}

function whaleStats(volume, liquidity){
  let ratio = volume/(liquidity+1);
  let percent = Math.min(100, ratio*25);
  let label = "NO WHALES";
  if(percent>70) label="🐋 STRONG WHALES";
  else if(percent>40) label="🐋 MID WHALES";
  else if(percent>15) label="🟡 LOW WHALES";
  return {percent:Math.round(percent), label};
}

function rugChance(liquidity, volume, whalePercent){
  let risk=35;
  if(liquidity<3000) risk+=30;
  if(volume>liquidity*4) risk+=25;
  if(whalePercent>60) risk+=15;
  if(liquidity>20000) risk-=20;
  return Math.min(100,Math.max(0,risk));
}

function buildHistoryHTML(history){
  if(!history||history.length===0) return `<p style="color:#6ee7b7;font-size:13px">No previous tokens found</p>`;
  const dead=history.filter(h=>!h.alive).length;
  const alive=history.filter(h=>h.alive).length;
  const total=history.length;
  const verdict = dead===total ? `🔴 All previous tokens rugged — HIGH RISK`
    : dead>alive ? `🟡 Most tokens rugged (${dead}/${total})`
    : `🟢 Has surviving tokens (${alive}/${total})`;
  let items = history.map(h=>`
    <div class="history-item ${h.alive?'history-alive':'history-dead'}">
      ${h.alive?'🟢':'🔴'} <strong>${h.name} (${h.symbol})</strong>
      — Liquidity: $${Math.round(h.liquidity).toLocaleString()}
      ${h.alive?'✅ Alive':'💀 Dead'}
    </div>`).join('');
  return `<p style="margin-bottom:6px"><strong>${verdict}</strong></p>${items}`;
}

async function scan(){
  const token=document.getElementById("token").value.trim();
  const result=document.getElementById("result");
  if(!token){ result.innerHTML="❌ Enter token address"; return; }
  result.innerHTML="🧠 Analyzing token...";
  try{
    const [dexRes,mintAuth,realDev] = await Promise.all([
      fetch("https://api.dexscreener.com/latest/dex/tokens/"+token).then(r=>r.json()),
      getMintAuthority(token),
      getRealDev(token)
    ]);
    if(!dexRes.pairs){ result.innerHTML="❌ No data found"; return; }
    const p=dexRes.pairs[0];
    const liquidity=p.liquidity?.usd||0;
    const volume=p.volume?.h24||0;
    let score=50;
    if(liquidity>20000) score+=20; else if(liquidity<3000) score-=25;
    if(volume>100000) score+=15; else if(volume<1000) score-=10;
    const devInfo=resolveDev(mintAuth,realDev);
    result.innerHTML="📜 Fetching dev history...";
    let history=[];
    if(devInfo.wallet!=="Unknown"){
      history=await getDevHistory(devInfo.wallet,token);
      const dead=history.filter(h=>!h.alive).length;
      const total=history.length;
      if(total>0){
        const dr=dead/total;
        if(dr===1) score-=25; else if(dr>0.6) score-=15; else if(dr<0.3) score+=10;
      }
    }
    const whale=whaleStats(volume,liquidity);
    const rug=rugChance(liquidity,volume,whale.percent);
    let status="🟢 SAFE";
    if(score<40||rug>70) status="🔴 HIGH RISK"; else if(score<70) status="🟡 MID";
    result.innerHTML=`
<div class="card">
<h2>${p.baseToken.name} (${p.baseToken.symbol})</h2>
<p>💧 Liquidity: $${Math.round(liquidity).toLocaleString()}</p>
<p>📊 Volume: $${Math.round(volume).toLocaleString()}</p>
<hr>
<h2>Score: ${Math.round(score)}/100</h2>
<span class="badge">${status}</span>
<hr>
<h3>🧬 Dev Intelligence</h3>
<p style="word-break:break-all">${devInfo.wallet}</p>
<p>${devInfo.type}</p>
<hr>
<h3>📜 Dev History (Last 3 Tokens)</h3>
${buildHistoryHTML(history)}
<hr>
<h3>🐋 Whale Activity</h3>
<p>${whale.label}</p>
<p>Strength: ${whale.percent}%</p>
<h3>💀 Rug Probability</h3>
<p>${rug}%</p>
</div>`;
  }catch(e){ result.innerHTML="❌ Error: "+e.message; }
}

// ========== Hot Filter Functions ==========

function hotScore(liquidity, volume, priceChange){
  let score = 0;
  // Whale activity (volume/liquidity ratio)
  const ratio = volume / (liquidity + 1);
  if(ratio > 5) score += 40;
  else if(ratio > 3) score += 30;
  else if(ratio > 1.5) score += 20;
  else if(ratio > 0.8) score += 10;
  // Liquidity
  if(liquidity > 50000) score += 25;
  else if(liquidity > 20000) score += 20;
  else if(liquidity > 8000) score += 12;
  else if(liquidity > 3000) score += 5;
  // Price change (momentum)
  if(priceChange > 50) score += 20;
  else if(priceChange > 20) score += 15;
  else if(priceChange > 5) score += 8;
  else if(priceChange < -20) score -= 15;
  return Math.min(100, score);
}

function passesFilter(liquidity, volume, priceChange, rug){
  if(liquidity < 5000) return false;       // Liquidity ضعيف
  if(rug > 55) return false;               // Rug risk عالي
  const ratio = volume / (liquidity + 1);
  if(ratio < 0.5) return false;            // ما في حيتان
  if(priceChange < -30) return false;      // ينزل بقوة
  return true;
}

async function runHotFilter(){
  const btn = document.getElementById("hotBtn");
  const hotResult = document.getElementById("hotResult");
  const filterInfo = document.getElementById("filterInfo");

  btn.disabled = true;
  btn.textContent = "⏳ Scanning...";
  hotResult.innerHTML = "";
  filterInfo.textContent = "Fetching latest tokens from pump.fun...";

  try{
    // نجيب أحدث توكنات من pump.fun عبر DEXScreener
    const r = await fetch("https://api.dexscreener.com/token-boosts/latest/v1");
    const boosts = await r.json();

    // fallback: نجيب trending Solana tokens
    const r2 = await fetch("https://api.dexscreener.com/latest/dex/search?q=SOL");
    const trending = await r2.json();

    let pairs = [];

    // نجمع من الاثنين
    if(Array.isArray(boosts)){
      const solBoosts = boosts.filter(b => b.chainId === "solana").slice(0,15);
      for(let b of solBoosts){
        try{
          const pr = await fetch("https://api.dexscreener.com/latest/dex/tokens/"+b.tokenAddress);
          const pd = await pr.json();
          if(pd.pairs?.length>0) pairs.push(pd.pairs[0]);
        }catch(e){}
      }
    }

    if(trending.pairs){
      const solPairs = trending.pairs.filter(p => p.chainId==="solana").slice(0,15);
      pairs = [...pairs, ...solPairs];
    }

    // نشيل المكررات
    const seen = new Set();
    pairs = pairs.filter(p => {
      const addr = p.baseToken?.address;
      if(!addr || seen.has(addr)) return false;
      seen.add(addr);
      return true;
    });

    filterInfo.textContent = `Scanning ${pairs.length} tokens...`;

    let passed = [];

    for(let p of pairs){
      const liquidity = p.liquidity?.usd || 0;
      const volume = p.volume?.h24 || 0;
      const priceChange = p.priceChange?.h24 || 0;
      const whale = whaleStats(volume, liquidity);
      const rug = rugChance(liquidity, volume, whale.percent);

      if(!passesFilter(liquidity, volume, priceChange, rug)) continue;

      const score = hotScore(liquidity, volume, priceChange);
      if(score < 30) continue;

      passed.push({
        name: p.baseToken?.name || "Unknown",
        symbol: p.baseToken?.symbol || "?",
        address: p.baseToken?.address || "",
        liquidity,
        volume,
        priceChange,
        whale,
        rug,
        score,
        url: p.url || ""
      });
    }

    // نرتب من الأعلى score
    passed.sort((a,b) => b.score - a.score);

    filterInfo.textContent = `Found ${passed.length} hot tokens out of ${pairs.length} scanned`;

    if(passed.length === 0){
      hotResult.innerHTML = `<div class="no-results">😔 No hot tokens found right now — try again in a few minutes</div>`;
    } else {
      hotResult.innerHTML = `<div class="filter-grid">${passed.map(t => `
        <div class="hot-card" onclick="copyAndScan('${t.address}')">
          <h3>${t.name} <span style="color:#6ee7b7;font-size:14px">(${t.symbol})</span></h3>
          <div class="hot-row">
            <span class="hot-stat green">💧 $${Math.round(t.liquidity).toLocaleString()}</span>
            <span class="hot-stat green">📊 $${Math.round(t.volume).toLocaleString()}</span>
            <span class="hot-stat ${t.priceChange>0?'green':'red'}">
              ${t.priceChange>0?'📈':'📉'} ${t.priceChange.toFixed(1)}%
            </span>
            <span class="hot-stat ${t.whale.percent>60?'green':'yellow'}">${t.whale.label}</span>
            <span class="hot-stat ${t.rug<30?'green':t.rug<55?'yellow':'red'}">💀 Rug: ${t.rug}%</span>
          </div>
          <div class="score-bar"><div class="score-fill" style="width:${t.score}%"></div></div>
          <div style="font-size:12px;color:#6ee7b7;margin-top:4px;">
            Hot Score: ${t.score}/100 — tap to analyze
          </div>
        </div>
      `).join('')}</div>`;
    }

  }catch(e){
    hotResult.innerHTML = `<div class="no-results">❌ Error: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = "🔥 Find Hot Tokens";
}

function copyAndScan(address){
  // ننقل للتاب الأول ونضع العنوان ونبدأ التحليل
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-scan').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('token').value = address;
  scan();
}

</script>
