<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan Whale Lite+</title>

<style>
body{
margin:0;
font-family:Arial;
background:#041a12;
color:#eafff3;
}

.header{
padding:16px;
text-align:center;
background:#0b2a1d;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
font-size:28px;
font-weight:900;
color:#10b981;
}

.container{
padding:10px;
max-width:900px;
margin:auto;
}

.card{
background:#0b2a1d;
border:1px solid #10b981;
padding:12px;
margin-top:10px;
border-radius:10px;
}

.badge{
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff4d4d;}

.small{
opacity:0.8;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<h1>DevScan Whale Lite+</h1>
</div>

<div class="container">
<div id="feed">Scanning whale activity...</div>
</div>

<script>

/* ================= FETCH ================= */
async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* ================= ANALYZE ================= */
function analyze(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
let price = parseFloat(p.priceUsd || 0);
let mc = p.fdv || 0;

/* 🐋 whale spike */
let spike = vol / (liq + 1);

let score = 35;

/* 📊 activity */
if(vol > 300) score += 15;
if(vol > liq * 0.4) score += 20;

/* 🐋 whale entry detection */
if(spike > 2.5) score += 30;
else if(spike > 1.5) score += 20;

/* 💧 liquidity sweet spot */
if(liq >= 1000 && liq <= 150000) score += 10;

/* label */
let label = "🟡 BUILDING";

if(score >= 80) label = "🐋 WHALE ENTRY";
else if(score >= 65) label = "🟠 ACTIVE FLOW";

/* entry zone */
let range = price * (0.03 + spike / 50);

return {
score,
label,
liq,
vol,
mc,
price,
spike,
low: price - range,
high: price + range
};
}

/* ================= RENDER ================= */
function render(pairs){

let feed = document.getElementById("feed");
feed.innerHTML = "";

if(!pairs || pairs.length === 0){
feed.innerHTML = "No market data...";
return;
}

let list = pairs.map(p => ({...p, ...analyze(p)}));

list.sort((a,b)=>b.score-a.score);

/* always show top 6 */
list.slice(0,6).forEach(p=>{

let color = "red";
if(p.label.includes("WHALE")) color = "green";
else if(p.label.includes("ACTIVE")) color = "orange";

feed.innerHTML += `
<div class="card">

<h3>${p.baseToken?.name || "Unknown"}</h3>
<div class="small">${p.baseToken?.symbol || ""}</div>

<p>💧 Liquidity: $${Math.round(p.liq)}</p>
<p>📊 Volume: $${Math.round(p.vol)}</p>
<p>🐋 Spike: ${p.spike.toFixed(2)}</p>

<span class="badge ${color}">
${p.label} • Score ${p.score}
</span>

<p>📊 Entry Zone</p>
<p><b>$${p.low.toFixed(8)} - $${p.high.toFixed(8)}</b></p>

</div>
`;
});

}

/* ================= LOOP ================= */
async function loop(){
const data = await getPairs();
render(data);
}

loop();
setInterval(loop, 7000);

</script>

</body>
</html>
