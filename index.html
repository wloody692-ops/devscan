<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevScan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#021a12,#000);
  color:#eafff3;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:42px;
  font-weight:bold;
}

.hook{
  color:#00ff99;
  font-size:13px;
  margin:10px 0 15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  border:1px solid #00ff99;
  border-radius:12px;
  padding:15px;
  background:rgba(0,255,100,0.05);
  margin-top:15px;
}

input{
  width:70%;
  padding:12px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.box{
  padding:12px;
  border:1px solid #0f3;
  border-radius:10px;
  background:rgba(0,255,100,0.04);
}

.green{color:#00ff99;}
.red{color:#ff4d4d;}
.orange{color:#ffb84d;}

.alert{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff99;
  color:#000;
  padding:10px;
  border-radius:8px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">🚀 DevScan</div>
  </div>

  <div class="hook">
    Smart Money • Whale Tracking • Trending Radar • Heat Engine
  </div>

  <div class="card">
    <input id="input" placeholder="Paste token / wallet"/>
    <button onclick="analyze()">ANALYZE</button>
  </div>

  <div class="card" id="result">Waiting for data...</div>

</div>

<div id="alert" class="alert"></div>

<script>

// =========================
// CONFIG
// =========================
const API_KEY = "1f3e9d07-b2ef-4448-9b62-6938069c82dd";
const DEV_WALLET = "PUT_DEV_WALLET_HERE";

// =========================
// ALERT
// =========================
function alertBox(msg){
  const a = document.getElementById("alert");
  a.innerText = msg;
  a.style.display = "block";
  setTimeout(()=>a.style.display="none",2500);
}

// =========================
// FETCH TX
// =========================
async function getTx(address){
  try{
    const res = await fetch(
      `https://api.helius.xyz/v0/addresses/${address}/transactions?api-key=${API_KEY}`
    );
    return await res.json();
  }catch(e){
    return [];
  }
}

// =========================
// CORE ENGINE
// =========================
function engine(txns){

  const swaps = txns?.filter(t => t.type === "SWAP").length || 0;
  const total = txns?.length || 0;

  let risk = 20;
  risk += total < 5 ? 30 : 0;
  risk += swaps > 25 ? 40 : 0;
  risk += swaps === 0 ? 20 : 0;

  let smart = swaps > 20 && total > 10;
  let whale = swaps > 30 || total > 60;

  let heat = (swaps * 2) + (total / 2);

  return {
    risk: Math.min(100,risk),
    swaps,
    total,
    smart,
    whale,
    heat: Math.min(100,Math.round(heat))
  };
}

// =========================
// DEV INTEL
// =========================
function dev(txns){
  let t = txns?.length || 0;

  return {
    status:
      t > 50 ? "ACTIVE 🔥" :
      t > 20 ? "MODERATE 🟠" :
      "LOW 🔴"
  };
}

// =========================
// TREND RANK (SIMULATED BUT STABLE)
// =========================
function trend(addr){
  let h = 0;
  for(let i=0;i<addr.length;i++) h += addr.charCodeAt(i);
  return h % 100;
}

// =========================
// MAIN
// =========================
async function analyze(){

  const addr = document.getElementById("input").value;

  if(!addr){
    alertBox("Enter address");
    return;
  }

  document.getElementById("result").innerHTML = "Analyzing on-chain data...";

  const txns = await getTx(addr);
  const devTxns = await getTx(DEV_WALLET);

  const d = engine(txns);
  const dv = dev(devTxns);
  const tr = trend(addr);

  if(d.smart) alertBox("🧠 Smart Money Detected");
  if(d.whale) alertBox("🐋 Whale Activity Detected");

  let status =
    d.risk > 70 ? "🔴 DANGER" :
    d.risk > 40 ? "🟠 WATCH" :
    "🟢 SAFE";

  document.getElementById("result").innerHTML = `

    <div class="grid">

      <div class="box">
        🪙 Asset<br>
        <b>${addr.slice(0,12)}...</b>
      </div>

      <div class="box">
        💀 Risk Score<br>
        <b>${d.risk}/100</b>
      </div>

      <div class="box">
        🔥 Heat Score<br>
        <b>${d.heat}/100</b>
      </div>

      <div class="box">
        📈 Trend Rank<br>
        <b>${tr}/100</b>
      </div>

      <div class="box">
        🔁 Swaps<br>
        <b>${d.swaps}</b>
      </div>

      <div class="box">
        🧠 Smart Money<br>
        <b class="${d.smart?'green':'red'}">
          ${d.smart ? "DETECTED 🐋" : "NO SIGNAL"}
        </b>
      </div>

      <div class="box">
        🐋 Whale Activity<br>
        <b class="${d.whale?'orange':'green'}">
          ${d.whale ? "ACTIVE" : "NONE"}
        </b>
      </div>

      <div class="box">
        👛 Dev Wallet<br>
        <b>${DEV_WALLET}</b><br>
        ⚡ ${dv.status}
      </div>

      <div class="box">
        ⚡ Status<br>
        <b>${status}</b>
      </div>

    </div>

  `;
}

</script>

</body>
</html>
