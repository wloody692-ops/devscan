<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dev Tap Game</title>
<style>
body {
margin:0;
background:#050b10;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container {
width:300px;
}

button {
padding:20px;
width:100%;
font-size:20px;
border:none;
border-radius:12px;
background:#00ff99;
cursor:pointer;
font-weight:bold;
}

.stats {
margin-top:20px;
font-size:18px;
}

.result {
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Dev Tap 💰</h1>

<button onclick="tap()">TAP</button>

<div class="stats">
Points: <span id="points">0</span>
</div>

<div class="result" id="result"></div>
</div>

<script>
let points = 0;

function tap() {
points++;
document.getElementById("points").innerText = points;

let rand = Math.random();

if (rand < 0.05) {
document.getElementById("result").innerText = "💀 RUG PULL!";
} 
else if (rand < 0.3) {
document.getElementById("result").innerText = "📉 Dip...";
} 
else {
document.getElementById("result").innerText = "🚀 Pump!";
}
}
</script>

</body>
</html>
