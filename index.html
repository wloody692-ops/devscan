<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUN PRO+</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial;touch-action:none}

/* UI */
#ui{
position:fixed;top:10px;left:10px;
color:#00ffcc;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
z-index:10;
font-size:14px;
}

/* MENU */
#menu{
position:fixed;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:radial-gradient(circle,#020b12,#000);
color:#00ffcc;
z-index:20;
}

button{
padding:14px 30px;
margin:8px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
}

/* CONTROLS */
#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:10;
}

.btn{
width:70px;height:70px;
background:rgba(0,255,204,0.15);
border:2px solid #00ffcc;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:#00ffcc;
font-size:24px;
}
</style>
</head>

<body>

<div id="menu">
<h1>🏆 NEON RUN PRO+</h1>
<p>Shop • Skins • Missions • Leaderboard</p>
<button onclick="startGame()">START</button>
<button onclick="changeSkin()">SKIN</button>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
Best: <span id="best">0</span><br>
Skin: <span id="skin">DEFAULT</span>
</div>

<div id="controls">
<div class="btn" onclick="left()">⬅️</div>
<div class="btn" onclick="right()">➡️</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let player;
let lane=1;
let lanes=[-2,0,2];

let coins=[],obstacles=[];

let score=0;
let best=localStorage.getItem("best")||0;

let running=false;
let speed=0.25;

let skins=[
0x00ffcc,
0xff0044,
0xffcc00,
0x8800ff
];

let skinIndex=0;

// 🔊 sound
function beep(f){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=f;
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.05);
}

// 🚀 INIT
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x05060a);
scene.fog=new THREE.Fog(0x05060a,20,120);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,8);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));

// PLAYER
player=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:skins[skinIndex]})
);
player.position.y=0.5;
scene.add(player);

// ROAD
let road=new THREE.Mesh(
new THREE.PlaneGeometry(12,200),
new THREE.MeshStandardMaterial({color:0x111111})
);
road.rotation.x=-Math.PI/2;
scene.add(road);

// SPAWN
for(let i=0;i<25;i++){
spawn(i*-8);
}

animate();
}

// SPAWN
function spawn(z){

let o=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xff0044})
);
o.position.set(lanes[Math.floor(Math.random()*3)],0.5,z);
scene.add(o);
obstacles.push(o);

let c=new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshStandardMaterial({color:0xffff00})
);
c.position.set(lanes[Math.floor(Math.random()*3)],0.5,z-4);
scene.add(c);
coins.push(c);
}

// LOOP
function animate(){
requestAnimationFrame(animate);
if(!running) return;

speed += 0.00003;
score++;

player.position.z -= speed;
camera.position.z -= speed;
camera.position.x += (player.position.x-camera.position.x)*0.1;

player.position.x = lanes[lane];

// OBSTACLES
obstacles.forEach(o=>{
if(o.position.distanceTo(player.position)<1){
gameOver();
}
if(o.position.z>player.position.z+10){
o.position.z=player.position.z-150;
o.position.x=lanes[Math.floor(Math.random()*3)];
}
});

// COINS
coins.forEach(c=>{
if(c.position.distanceTo(player.position)<1){
score+=10;
beep(800);
c.position.z=player.position.z-150;
}
});

updateUI();
}

// CONTROLS
function left(){ if(lane>0) lane--; }
function right(){ if(lane<2) lane++; }

// SKIN
function changeSkin(){
skinIndex=(skinIndex+1)%skins.length;
document.getElementById("skin").innerText="SKIN "+(skinIndex+1);
}

// GAME OVER
function gameOver(){
running=false;
best=Math.max(best,score);
localStorage.setItem("best",best);
alert("Game Over: "+score);
location.reload();
}

// START
function startGame(){
document.getElementById("menu").style.display="none";
running=true;
init();
}

// UI
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("best").innerText=best;
}

window.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") left();
if(e.key==="ArrowRight") right();
});

</script>

</body>
</html>
