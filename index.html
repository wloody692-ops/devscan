<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#010f0b,#000);
color:#eafff3;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

.logo{
font-size:44px;
font-weight:bold;
}

.sub{
color:#00ff99;
font-size:13px;
margin-bottom:10px;
}

.card{
border:1px solid #00ff99;
border-radius:14px;
padding:15px;
background:rgba(0,255,100,0.05);
margin-top:15px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;
border:1px solid rgba(0,255,100,0.3);
border-radius:12px;
margin-bottom:10px;
background:rgba(0,255,100,0.03);
}

.green{color:#00ff99}
.orange{color:#ffb84d}
.red{color:#ff4d4d}
.blue{color:#1DA1F2}

button{
padding:10px;
background:#00ff99;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 DevScan</div>
<div class="sub">Filtered Smart Money Scanner</div>

<button onclick="load()">🔄 Refresh</button>

<div class="card" id="list">Loading...</div>

</div>

<script>

// ================= FETCH =================
async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/search/?q=solana");
const d = await r.json();
return (d.pairs || []).filter(p => p && p.baseToken);
}catch{
return [];
}
}

// ================= SCORE ENGINE =================
function score(pair){

let liq = pair.liquidity?.usd || 0;
let vol = pair.volume?.h24 || 0;

if(!liq && !vol){
return {score:0,label:"⚪ NO DATA"};
}

let s = 0;

// liquidity
if(liq > 100000) s += 40;
else if(liq > 30000) s += 25;
else if(liq > 5000) s += 10;
else s -= 20;

// volume
if(vol > 200000) s += 40;
else if(vol > 50000) s += 20;
else if(vol > 10000) s += 10;
else s -= 10;

// momentum
let ratio = vol / (liq || 1);
if(ratio > 1) s += 25;
if(ratio > 2) s += 15;

// label
let label = "⚪ LOW";

if(s >= 80) label = "🔥 HOT ENTRY";
else if(s >= 60) label = "🟢 GOOD ENTRY";
else if(s >= 40) label = "🟡 WATCH";
else label = "🔴 RISKY";

return {score:s,label};
}

// ================= RENDER =================
function render(pairs){

if(!pairs.length){
document.getElementById("list").innerHTML="No data, retrying...";
return;
}

// sort best first
pairs = pairs
.sort((a,b)=> score(b).score - score(a).score)
.slice(0,10);

let html="";

pairs.forEach(p=>{

let s = score(p);

html += `
<div class="row">
<b>${p.baseToken?.name || "Unknown"} (${p.baseToken?.symbol || ""})</b>
<span class="${s.score>80?'red':s.score>60?'green':s.score>40?'orange':'blue'}">
${s.label}
</span>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

// ================= MAIN =================
async function load(){

document.getElementById("list").innerHTML="Analyzing...";

const pairs = await getPairs();
render(pairs);
}

// auto start
load();
setInterval(load,15000);

</script>

</body>
</html>
