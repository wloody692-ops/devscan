<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Arena Stable</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050a08;
color:#eafff3;
}

.header{
padding:16px;
text-align:center;
background:#071c14;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
color:#10b981;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#0b2a1d;
border:1px solid rgba(16,185,129,0.25);
border-radius:12px;
padding:12px;
margin-top:10px;
}

.name{font-size:14px;font-weight:bold;}
.symbol{font-size:11px;opacity:0.7;}

.stats{font-size:11px;opacity:0.85;margin-top:6px;}

.bar{
margin-top:8px;
height:8px;
background:rgba(255,255,255,0.12);
border-radius:6px;
overflow:hidden;
}

.fill{
background:#10b981;
height:100%;
}

.badge{
font-size:11px;
color:#00ff88;
margin-top:6px;
}
</style>
</head>

<body>

<div class="header">
<h1>MEME ARENA ⚔️</h1>
</div>

<div class="container" id="app">Loading market...</div>

<script>

async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* 🧠 fallback coins (IMPORTANT) */
function fallback(){
return [
{baseToken:{name:"Pepe Solana",symbol:"PEPE"}, liquidity:{usd:12000}, volume:{h24:8000}},
{baseToken:{name:"Bonk Inu",symbol:"BONK"}, liquidity:{usd:22000}, volume:{h24:15000}},
{baseToken:{name:"WIF Dog",symbol:"WIF"}, liquidity:{usd:18000}, volume:{h24:11000}}
];
}

function power(p){
let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
return vol / (liq + 1);
}

function render(pairs){

let app = document.getElementById("app");
app.innerHTML = "";

/* 🔴 أهم جزء */
if(!pairs || pairs.length === 0){
pairs = fallback();
app.innerHTML += `<div class="badge">⚠️ Using fallback market data</div>`;
}

/* عرض */
pairs.slice(0,10).forEach(p=>{

let name = p.baseToken?.name || "Unknown";
let symbol = p.baseToken?.symbol || "???";

let score = power(p)*100;

app.innerHTML += `
<div class="card">

<div class="name">${name}</div>
<div class="symbol">${symbol}</div>

<div class="bar">
<div class="fill" style="width:${Math.min(100,score)}%"></div>
</div>

<div class="stats">
📊 Volume: ${Math.round(p.volume?.h24 || 0)} |
💧 Liquidity: ${Math.round(p.liquidity?.usd || 0)}
</div>

</div>
`;
});

}

async function loop(){
let data = await getPairs();

/* debug مهم */
console.log("pairs:", data);

render(data);
}

loop();
setInterval(loop, 5000);

</script>

</body>
</html>
