<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1b0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;overflow:hidden;user-select:none;}
#gameWrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;}
#topBar{display:flex;gap:12px;align-items:center;width:100%;}
#topBar .stat{background:#ffffff0f;border:1px solid #ffffff18;border-radius:20px;padding:5px 16px;color:#d4edda;font-size:.88rem;display:flex;align-items:center;gap:6px;}
#topBar .stat b{color:#a8e063;font-size:1rem;}
#topBar .name{background:#56ab2f22;border:1px solid #56ab2f44;border-radius:20px;padding:5px 16px;color:#a8e063;font-family:'Cinzel',serif;font-size:.9rem;margin-left:auto;}
canvas{border:2px solid #2d5a1b;border-radius:10px;box-shadow:0 0 60px #1a4a0a88,0 0 120px #0a2a0444;display:block;cursor:none;}
#botBar{display:flex;gap:8px;width:100%;justify-content:space-between;align-items:center;}
#msg{color:#ffd700;font-size:.9rem;min-height:20px;text-shadow:0 0 8px #ffd70066;font-weight:600;}
#hint{color:#a8e06366;font-size:.78rem;}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(160deg,#0a1f0a99,#0d1b0fbb);display:flex;align-items:center;justify-content:center;z-index:20;border-radius:10px;backdrop-filter:blur(3px);}
#overlay.hidden{display:none;}
.panel{background:linear-gradient(160deg,#12321288,#1b4332cc);border:1.5px solid #56ab2f55;border-radius:18px;padding:36px 44px;text-align:center;color:#fff;max-width:400px;box-shadow:0 8px 40px #00000088;}
.panel h2{font-family:'Cinzel',serif;font-size:1.8rem;color:#a8e063;margin-bottom:6px;text-shadow:0 0 20px #56ab2f66;}
.panel .sub{color:#74c67a;margin-bottom:16px;font-size:.95rem;line-height:1.6;}
.panel .score-big{font-size:2.4rem;color:#ffd700;font-family:'Cinzel',serif;margin:10px 0;}
#nameInput{background:#ffffff0d;border:1.5px solid #56ab2f55;border-radius:10px;padding:9px 16px;color:#fff;font-size:1rem;width:100%;margin-bottom:14px;font-family:'Inter',sans-serif;outline:none;}
#nameInput:focus{border-color:#a8e063;box-shadow:0 0 0 3px #a8e06322;}
#nameInput::placeholder{color:#ffffff44;}
.btn{background:linear-gradient(135deg,#27ae60,#56ab2f);color:#fff;border:none;border-radius:24px;padding:11px 36px;font-size:1rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.5px;}
.btn:hover{background:linear-gradient(135deg,#2ecc71,#a8e063);color:#0d1b0f;transform:translateY(-2px);box-shadow:0 4px 16px #56ab2f44;}
.btn-sm{padding:8px 22px;font-size:.88rem;border-radius:18px;}
#shareLink{background:#ffffff0d;border:1.5px dashed #56ab2f44;border-radius:10px;padding:10px 14px;color:#a8e063;font-size:.78rem;word-break:break-all;margin-top:14px;cursor:pointer;transition:background .2s;}
#shareLink:hover{background:#56ab2f22;}
#shareLabel{color:#74c67a;font-size:.8rem;margin-top:8px;margin-bottom:4px;}
.mini-controls{display:flex;flex-direction:column;align-items:center;gap:2px;position:absolute;bottom:10px;right:10px;opacity:.35;}
.mc-row{display:flex;gap:2px;}
.mc-btn{width:22px;height:22px;background:#fff1;border:1px solid #fff2;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
</style>
</head>
<body>
<div id="gameWrap">
  <div id="topBar">
    <div class="stat">❤️ <b id="livesEl">3</b></div>
    <div class="stat">⭐ <b id="scoreEl">0</b></div>
    <div class="stat">⏱ <b id="timerEl">90</b>s</div>
    <div class="stat">🍎 <b id="appleEl">0</b></div>
    <div class="name" id="playerNameEl">Forest Explorer</div>
  </div>
  <canvas id="c"></canvas>
  <div id="botBar">
    <div id="msg"></div>
    <div id="hint">Arrow keys / WASD to move</div>
  </div>
  <div id="overlay">
    <div class="panel" id="panelBox">
      <h2>🌲 Forest Adventure</h2>
      <div class="sub">Explore the forest village!<br>Collect apples 🍎 · Avoid the wolf 🐺 · Find the deer 🦌</div>
      <input id="nameInput" maxlength="18" placeholder="Enter your name..." autocomplete="off"/>
      <button class="btn" onclick="startGame()">▶ Start Adventure</button>
      <div id="shareArea" style="display:none">
        <div id="shareLabel">🔗 Your personal save link — bookmark it!</div>
        <div id="shareLink" onclick="copyLink()">loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TILE = 32;
const COLS = 32, ROWS = 22;
const W = COLS * TILE, H = ROWS * TILE;
canvas.width = W; canvas.height = H;

// ─── URL SAVE SYSTEM ─────────────────────────────────────────────
function getUrlParam(key){
  return new URLSearchParams(window.location.search).get(key);
}
function buildShareUrl(name, bestScore){
  const base = window.location.href.split('?')[0];
  return `${base}?player=${encodeURIComponent(name)}&best=${bestScore}`;
}
function copyLink(){
  const link = document.getElementById('shareLink').textContent;
  navigator.clipboard.writeText(link).then(()=>{
    document.getElementById('shareLink').textContent = '✅ Copied!';
    setTimeout(()=>{ document.getElementById('shareLink').textContent = link; }, 1800);
  });
}

// Load saved name/best from URL
let savedName = getUrlParam('player') || '';
let savedBest = parseInt(getUrlParam('best') || '0');
if(savedName) document.getElementById('nameInput').value = savedName;

// ─── WORLD MAP (0=grass,1=tree,2=house,3=water,4=path,5=flower) ──
function buildMap(){
  const m = [];
  for(let y=0;y<ROWS;y++){ m.push([]); for(let x=0;x<COLS;x++) m[y].push(1); }
  // clear interior
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++) m[y][x]=0;
  // main path (horizontal + vertical)
  for(let x=1;x<COLS-1;x++) m[10][x]=4, m[11][x]=4;
  for(let y=1;y<ROWS-1;y++) m[y][8]=4, m[y][9]=4, m[y][22]=4, m[y][23]=4;
  // river
  for(let x=13;x<20;x++) m[3][x]=3,m[4][x]=3,m[5][x]=3;
  for(let y=3;y<8;y++) m[y][13]=3,m[y][14]=3;
  // houses (village area)
  const houses=[[3,3],[3,13],[3,24],[6,3],[6,26],[14,3],[14,26],[16,13],[18,3],[18,26]];
  for(let [hy,hx] of houses){ m[hy][hx]=2; m[hy][hx+1]=2; m[hy+1][hx]=2; m[hy+1][hx+1]=2; }
  // scatter flowers
  const seeds=[[2,6],[5,18],[7,12],[9,25],[13,6],[15,20],[19,5],[20,15],[8,4],[12,27]];
  for(let [fy,fx] of seeds) if(m[fy][fx]===0) m[fy][fx]=5;
  // dense forest patches
  const dense=[[2,2],[2,20],[7,20],[7,28],[15,28],[18,10],[20,2],[20,28]];
  for(let [dy,dx] of dense){
    for(let dy2=-1;dy2<=1;dy2++) for(let dx2=-1;dx2<=1;dx2++){
      let ny=dy+dy2,nx=dx+dx2;
      if(ny>0&&ny<ROWS-1&&nx>0&&nx<COLS-1&&m[ny][nx]===0) m[ny][nx]=1;
    }
  }
  // well
  m[13][15]=6; 
  return m;
}
const MAP = buildMap();

function isWalkable(tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return false;
  const t=MAP[ty][tx];
  return t===0||t===4||t===5||t===6;
}

// ─── STATE ───────────────────────────────────────────────────────
let player, apples, wolf, deer, fireflies, score, lives, timer, bestScore;
let gameRunning=false, intervalId=null;
let playerName='Forest Explorer';
let msgTimeout=null;

function showMsg(txt, duration=900){
  const el=document.getElementById('msg');
  el.textContent=txt;
  clearTimeout(msgTimeout);
  if(duration>0) msgTimeout=setTimeout(()=>{ if(gameRunning) el.textContent=''; },duration);
}

function updateHUD(){
  document.getElementById('livesEl').textContent='❤️'.repeat(lives);
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('timerEl').textContent=timer;
  document.getElementById('appleEl').textContent=applesCollected;
  document.getElementById('playerNameEl').textContent=playerName;
}

let applesCollected=0;

function spawnApples(n=12){
  apples=[];
  for(let i=0;i<n;i++){
    let tx,ty,tries=0;
    do{ tx=2+Math.floor(Math.random()*(COLS-4)); ty=2+Math.floor(Math.random()*(ROWS-4)); tries++; }
    while((!isWalkable(tx,ty)||apples.some(a=>a.tx===tx&&a.ty===ty)||(Math.abs(tx-player.tx)<3&&Math.abs(ty-player.ty)<3))&&tries<200);
    if(tries<200) apples.push({tx,ty,bob:Math.random()*Math.PI*2});
  }
}

function spawnDeer(){
  let tx,ty,tries=0;
  do{ tx=2+Math.floor(Math.random()*(COLS-4)); ty=2+Math.floor(Math.random()*(ROWS-4)); tries++; }
  while(!isWalkable(tx,ty)&&tries<100);
  deer={tx,ty,x:tx*TILE,y:ty*TILE,moving:false,frame:0,ft:0,dir:'right',moveTimer:0,visible:true};
}

function startGame(){
  const ni=document.getElementById('nameInput');
  playerName=(ni.value.trim()||'Forest Explorer').slice(0,18);
  document.getElementById('playerNameEl').textContent=playerName;
  bestScore=savedBest;
  document.getElementById('overlay').classList.add('hidden');

  player={tx:15,ty:11,x:15*TILE,y:11*TILE,moving:false,dir:'down',frame:0,ft:0};
  wolf={tx:3,ty:3,x:3*TILE,y:3*TILE,moving:false,frame:0,ft:0,moveTimer:0,speed:600};
  fireflies=Array.from({length:18},()=>({
    x:TILE+Math.random()*(W-2*TILE), y:TILE+Math.random()*(H-2*TILE),
    phase:Math.random()*Math.PI*2, r:1.5+Math.random()*2
  }));
  score=0; lives=3; timer=90; applesCollected=0; gameRunning=true;
  spawnApples();
  spawnDeer();
  updateHUD();
  if(intervalId) clearInterval(intervalId);
  intervalId=setInterval(()=>{
    if(!gameRunning) return;
    timer--; updateHUD();
    if(timer<=0) endGame(false);
  },1000);
  lastTime=0;
  requestAnimationFrame(loop);
}

function endGame(win){
  gameRunning=false;
  clearInterval(intervalId);
  if(score>bestScore) bestScore=score;
  const shareUrl=buildShareUrl(playerName,bestScore);
  const box=document.getElementById('panelBox');
  box.innerHTML=`
    <h2>${win?'🏆 You Win!':'💀 Game Over'}</h2>
    <div class="sub">${win?'You mastered the forest!':'The forest was too wild this time...'}</div>
    <div class="score-big">${score} pts</div>
    <div style="color:#74c67a;font-size:.9rem;margin-bottom:16px">
      🍎 Apples: ${applesCollected} &nbsp;|&nbsp; 🏅 Best: ${bestScore}
    </div>
    <button class="btn" onclick="startGame2()">▶ Play Again</button>
    <div id="shareLabel">🔗 Your personal link (bookmark to save progress!)</div>
    <div id="shareLink" onclick="copyLink()">${shareUrl}</div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}
window.startGame2=function(){
  document.getElementById('nameInput') && (document.getElementById('nameInput').value=playerName);
  startGame();
};

// Pre-fill name and show share if URL has player
window.addEventListener('load',()=>{
  if(savedName){
    const sa=document.getElementById('shareArea');
    sa.style.display='block';
    document.getElementById('shareLink').textContent=buildShareUrl(savedName,savedBest);
  }
});

// ─── INPUT ───────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

let moveDelay=0;
function movePlayer(dt){
  if(player.moving) return;
  moveDelay-=dt;
  if(moveDelay>0) return;
  let nx=player.tx,ny=player.ty;
  if(keys['ArrowLeft']||keys['a']){nx--;player.dir='left';}
  else if(keys['ArrowRight']||keys['d']){nx++;player.dir='right';}
  else if(keys['ArrowUp']||keys['w']){ny--;player.dir='up';}
  else if(keys['ArrowDown']||keys['s']){ny++;player.dir='down';}
  else return;
  if(isWalkable(nx,ny)){player.tx=nx;player.ty=ny;player.moving=true;moveDelay=110;}
}

function animEnt(e,spd=5,dt=16){
  if(e.moving){
    const tx=e.tx*TILE,ty=e.ty*TILE;
    const step=spd;
    if(e.x<tx)e.x=Math.min(e.x+step,tx);
    if(e.x>tx)e.x=Math.max(e.x-step,tx);
    if(e.y<ty)e.y=Math.min(e.y+step,ty);
    if(e.y>ty)e.y=Math.max(e.y-step,ty);
    if(e.x===tx&&e.y===ty)e.moving=false;
  }
  e.ft+=dt;
  if(e.ft>180){e.frame=1-(e.frame||0);e.ft=0;}
}

// Wolf AI — gets faster over time
function moveWolf(dt){
  wolf.moveTimer+=dt;
  const spd=Math.max(300,wolf.speed-(90-timer)*3);
  if(wolf.moveTimer<spd||wolf.moving) return;
  wolf.moveTimer=0;
  let dx=player.tx-wolf.tx, dy=player.ty-wolf.ty;
  let cands=[];
  if(Math.abs(dx)>=Math.abs(dy)){
    if(dx>0)cands.push([wolf.tx+1,wolf.ty]); else cands.push([wolf.tx-1,wolf.ty]);
    if(dy>0)cands.push([wolf.tx,wolf.ty+1]); else cands.push([wolf.tx,wolf.ty-1]);
  } else {
    if(dy>0)cands.push([wolf.tx,wolf.ty+1]); else cands.push([wolf.tx,wolf.ty-1]);
    if(dx>0)cands.push([wolf.tx+1,wolf.ty]); else cands.push([wolf.tx-1,wolf.ty]);
  }
  if(Math.random()<0.2) cands.sort(()=>Math.random()-.5);
  for(let [nx,ny] of cands){
    if(isWalkable(nx,ny)){wolf.tx=nx;wolf.ty=ny;wolf.moving=true;break;}
  }
}

// Deer AI — wanders randomly
function moveDeer(dt){
  deer.moveTimer+=dt;
  if(deer.moveTimer<1200||deer.moving) return;
  deer.moveTimer=0;
  if(Math.random()<0.4) return;
  const dirs=[[deer.tx+1,deer.ty,'right'],[deer.tx-1,deer.ty,'left'],[deer.tx,deer.ty+1,'down'],[deer.tx,deer.ty-1,'up']];
  dirs.sort(()=>Math.random()-.5);
  for(let [nx,ny,d] of dirs){
    if(isWalkable(nx,ny)){deer.tx=nx;deer.ty=ny;deer.moving=true;deer.dir=d;break;}
  }
}

function checkCollisions(){
  // Apple
  apples=apples.filter(a=>{
    if(a.tx===player.tx&&a.ty===player.ty){
      score+=10; applesCollected++;
      showMsg('🍎 +10 Apple collected!');
      updateHUD();
      if(apples.length===1){ setTimeout(()=>{spawnApples(12);},50); }
      return false;
    }
    return true;
  });
  // Deer bonus
  if(deer&&Math.abs(deer.tx-player.tx)<=1&&Math.abs(deer.ty-player.ty)<=1&&!deer.moving&&!player.moving){
    score+=25;
    showMsg('🦌 +25 You found the deer!',1200);
    updateHUD();
    spawnDeer();
  }
  // Wolf
  if(wolf.tx===player.tx&&wolf.ty===player.ty&&!wolf.moving&&!player.moving){
    lives--;
    updateHUD();
    showMsg('🐺 The wolf got you! -❤️',1100);
    player.tx=15;player.ty=11;player.x=15*TILE;player.y=11*TILE;
    wolf.tx=1;wolf.ty=1;wolf.x=TILE;wolf.y=TILE;
    if(lives<=0) endGame(false);
  }
}

// Camera: follow player
let camX=0,camY=0;
const VW=Math.min(W,800), VH=Math.min(H,550);
canvas.width=VW; canvas.height=VH;

// ─── DRAWING ─────────────────────────────────────────────────────
// Palette
const C={
  grass1:'#2d5a1b',grass2:'#336b20',grass3:'#3a7a24',
  path:'#8b7355',path2:'#9e8464',
  tree1:'#1a4a1a',tree2:'#1e5e1e',tree3:'#27723f',trunk:'#5c3d1e',
  water1:'#2980b9',water2:'#3498db',waterLight:'#5dade2',
  houseWall:'#c9a87c',houseWall2:'#d4b48a',houseRoof:'#8b2222',houseDoor:'#6b4226',
  flower1:'#e74c3c',flower2:'#f39c12',flower3:'#9b59b6',
  well:'#6b4226',wellTop:'#4a2f17',
};

// Pre-render tile sprites
const tileCache={};
function getTileSprite(type,tx,ty){
  const key=`${type}_${(tx+ty)%3}`;
  if(tileCache[key]) return tileCache[key];
  const oc=document.createElement('canvas'); oc.width=TILE; oc.height=TILE;
  const ox=oc.getContext('2d');
  const v=(tx+ty)%3;
  if(type===0||type===4||type===5){
    // grass base
    ox.fillStyle=[C.grass1,C.grass2,C.grass3][v];
    ox.fillRect(0,0,TILE,TILE);
    if(type===4){
      ox.fillStyle=[C.path,C.path2][v%2];
      ox.fillRect(0,0,TILE,TILE);
      // gravel dots
      ox.fillStyle='#7a6248';
      for(let i=0;i<8;i++){
        const px=4+Math.sin(i*137)*10, py=4+Math.cos(i*97)*10;
        ox.fillRect(px,py,2,1);
      }
    }
    if(type===5){
      // flower
      const fc=[C.flower1,C.flower2,C.flower3][v];
      ox.fillStyle='#90ee9066'; ox.beginPath(); ox.arc(16,16,5,0,Math.PI*2); ox.fill();
      ox.fillStyle=fc; ox.beginPath(); ox.arc(16,16,4,0,Math.PI*2); ox.fill();
      ox.fillStyle='#ffd700'; ox.beginPath(); ox.arc(16,16,2,0,Math.PI*2); ox.fill();
    }
  } else if(type===1){
    ox.fillStyle=[C.grass1,C.grass2,C.grass3][v]; ox.fillRect(0,0,TILE,TILE);
    // trunk
    ox.fillStyle=C.trunk; ox.fillRect(13,20,6,12);
    // shadow
    ox.fillStyle='#00000022'; ox.beginPath(); ox.ellipse(16,30,9,3,0,0,Math.PI*2); ox.fill();
    // layers
    ox.fillStyle=C.tree1; ox.beginPath(); ox.ellipse(16,18,13,10,0,0,Math.PI*2); ox.fill();
    ox.fillStyle=C.tree2; ox.beginPath(); ox.ellipse(16,13,10,8,0,0,Math.PI*2); ox.fill();
    ox.fillStyle=C.tree3; ox.beginPath(); ox.ellipse(16,8,7,6,0,0,Math.PI*2); ox.fill();
    // highlight
    ox.fillStyle='#52c45444'; ox.beginPath(); ox.ellipse(13,7,4,3,-0.3,0,Math.PI*2); ox.fill();
  } else if(type===3){
    ox.fillStyle=C.water1; ox.fillRect(0,0,TILE,TILE);
    ox.fillStyle=C.water2+'88';
    ox.beginPath(); ox.moveTo(0,16); ox.quadraticCurveTo(8,10,16,16); ox.quadraticCurveTo(24,22,32,16); ox.lineTo(32,32); ox.lineTo(0,32); ox.fill();
  }
  tileCache[key]=oc;
  return oc;
}

function drawHouse(cx,cy,sx,sy){
  const ox=cx*TILE-sx, oy=cy*TILE-sy;
  // foundation
  ctx.fillStyle='#8b7355'; ctx.fillRect(ox+2,oy+38,60,6);
  // wall
  const g=ctx.createLinearGradient(ox,oy,ox+64,oy);
  g.addColorStop(0,C.houseWall); g.addColorStop(1,C.houseWall2);
  ctx.fillStyle=g; ctx.fillRect(ox+4,oy+14,56,30);
  // roof shadow
  ctx.fillStyle='#00000033';
  ctx.beginPath(); ctx.moveTo(ox,oy+18); ctx.lineTo(ox+32,oy); ctx.lineTo(ox+64,oy+18); ctx.fill();
  // roof
  const rg=ctx.createLinearGradient(ox,oy,ox,oy+18);
  rg.addColorStop(0,'#a83232'); rg.addColorStop(1,C.houseRoof);
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.moveTo(ox-2,oy+18); ctx.lineTo(ox+32,oy-1); ctx.lineTo(ox+66,oy+18); ctx.fill();
  // chimney
  ctx.fillStyle='#7a2020'; ctx.fillRect(ox+44,oy-10,10,16);
  // smoke puffs
  const t=Date.now()/2000;
  for(let i=0;i<3;i++){
    const a=(0.5-i*0.15);
    ctx.fillStyle=`rgba(180,180,180,${a})`;
    ctx.beginPath(); ctx.arc(ox+49+Math.sin(t+i)*3, oy-12-i*7, 4+i*1.5, 0, Math.PI*2); ctx.fill();
  }
  // door
  ctx.fillStyle=C.houseDoor; ctx.fillRect(ox+24,oy+28,16,16);
  ctx.fillStyle='#ffd70066'; ctx.beginPath(); ctx.arc(ox+38,oy+36,1.5,0,Math.PI*2); ctx.fill();
  // windows
  for(let wx of [8,44]){
    ctx.fillStyle='#f5e6b8'; ctx.fillRect(ox+wx,oy+18,12,10);
    ctx.strokeStyle='#8b6914'; ctx.lineWidth=1; ctx.strokeRect(ox+wx,oy+18,12,10);
    ctx.strokeStyle='#8b691488'; ctx.beginPath(); ctx.moveTo(ox+wx+6,oy+18); ctx.lineTo(ox+wx+6,oy+28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+wx,oy+23); ctx.lineTo(ox+wx+12,oy+23); ctx.stroke();
    // light flicker
    if(Math.sin(Date.now()/1000+wx)>0.7){ ctx.fillStyle='#ffd70033'; ctx.fillRect(ox+wx,oy+18,12,10); }
  }
}

function drawWell(cx,cy,sx,sy){
  const x=cx*TILE-sx+4, y=cy*TILE-sy+4;
  // base
  ctx.fillStyle='#7a6248'; ctx.beginPath(); ctx.ellipse(x+12,y+20,14,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.well; ctx.fillRect(x,y+4,24,16);
  ctx.fillStyle='#4a2f1788'; ctx.fillRect(x+2,y+6,20,14);
  // water in well
  ctx.fillStyle=C.water2+'aa'; ctx.beginPath(); ctx.ellipse(x+12,y+18,10,3,0,0,Math.PI*2); ctx.fill();
  // roof posts
  ctx.fillStyle=C.trunk; ctx.fillRect(x-2,y-10,4,14); ctx.fillRect(x+22,y-10,4,14);
  // roof
  ctx.fillStyle='#8b2222';
  ctx.beginPath(); ctx.moveTo(x-6,y-8); ctx.lineTo(x+14,y-18); ctx.lineTo(x+34,y-8); ctx.fill();
  // rope
  ctx.strokeStyle='#8b7355'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x+12,y-8); ctx.lineTo(x+12,y+4); ctx.stroke();
}

function drawPlayer(sx,sy){
  const x=player.x-sx, y=player.y-sy;
  const bob=player.frame?-2:0, s=TILE;
  // shadow
  ctx.fillStyle='#00000040';
  ctx.beginPath(); ctx.ellipse(x+s/2,y+s-3,10,3,0,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#2c3e50';
  if(player.moving){
    if(player.frame){ ctx.fillRect(x+10,y+s-11+bob,6,10); ctx.fillRect(x+18,y+s-14+bob,6,10); }
    else { ctx.fillRect(x+10,y+s-14+bob,6,10); ctx.fillRect(x+18,y+s-11+bob,6,10); }
  } else { ctx.fillRect(x+10,y+s-13,6,10); ctx.fillRect(x+18,y+s-13,6,10); }
  // boots
  ctx.fillStyle='#1a252f';
  ctx.fillRect(x+9,y+s-4,8,4); ctx.fillRect(x+17,y+s-4,8,4);
  // body
  const bg=ctx.createLinearGradient(x+8,y+12,x+8,y+s-12);
  bg.addColorStop(0,'#2e86de'); bg.addColorStop(1,'#1a6bb5');
  ctx.fillStyle=bg; ctx.fillRect(x+8,y+s-22+bob,18,12);
  // backpack
  ctx.fillStyle='#e67e22'; ctx.fillRect(x+4,y+s-20+bob,6,9);
  ctx.fillStyle='#d35400'; ctx.fillRect(x+5,y+s-18+bob,4,1);
  // arms
  ctx.fillStyle='#f5cba7';
  if(player.moving&&player.frame){ ctx.fillRect(x+4,y+s-20+bob,4,8); ctx.fillRect(x+26,y+s-18+bob,4,8); }
  else { ctx.fillRect(x+4,y+s-18+bob,4,8); ctx.fillRect(x+26,y+s-20+bob,4,8); }
  // head
  const hg=ctx.createRadialGradient(x+s/2-1,y+s-32+bob,1,x+s/2,y+s-28+bob,10);
  hg.addColorStop(0,'#f9d5a7'); hg.addColorStop(1,'#e8b88a');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x+s/2,y+s-30+bob,10,0,Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle='#6b3a1e';
  ctx.beginPath(); ctx.arc(x+s/2,y+s-38+bob,8,Math.PI,0); ctx.fill();
  ctx.fillRect(x+7,y+s-38+bob,3,5); ctx.fillRect(x+24,y+s-38+bob,3,5);
  // eyes
  ctx.fillStyle='#2c3e50';
  if(player.dir==='left'){ ctx.beginPath(); ctx.arc(x+11,y+s-31+bob,1.5,0,Math.PI*2); ctx.fill(); }
  else if(player.dir==='right'){ ctx.beginPath(); ctx.arc(x+23,y+s-31+bob,1.5,0,Math.PI*2); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(x+14,y+s-31+bob,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+20,y+s-31+bob,1.5,0,Math.PI*2); ctx.fill(); }
  // mouth
  ctx.strokeStyle='#c0875a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x+s/2,y+s-26+bob,3,0.2,Math.PI-0.2); ctx.stroke();
}

function drawWolf(sx,sy){
  const x=wolf.x-sx, y=wolf.y-sy, s=TILE;
  const bob=wolf.frame?-1:0;
  ctx.fillStyle='#00000030'; ctx.beginPath(); ctx.ellipse(x+s/2,y+s-3,12,3,0,0,Math.PI*2); ctx.fill();
  // body
  const bg=ctx.createLinearGradient(x+6,y+14,x+6,y+s);
  bg.addColorStop(0,'#636e72'); bg.addColorStop(1,'#2d3436');
  ctx.fillStyle=bg; ctx.fillRect(x+6,y+18+bob,22,14);
  // tail
  ctx.strokeStyle='#7f8c8d'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x+28,y+20+bob); ctx.quadraticCurveTo(x+40,y+10+bob,x+36,y+4+bob); ctx.stroke();
  ctx.strokeStyle='#b2bec3'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x+28,y+20+bob); ctx.quadraticCurveTo(x+40,y+10+bob,x+36,y+4+bob); ctx.stroke();
  // head
  const hg=ctx.createRadialGradient(x+16,y+12+bob,1,x+16,y+14+bob,11);
  hg.addColorStop(0,'#7f8c8d'); hg.addColorStop(1,'#4a5568');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x+16,y+14+bob,11,0,Math.PI*2); ctx.fill();
  // ears
  ctx.fillStyle='#636e72';
  ctx.beginPath(); ctx.moveTo(x+7,y+8+bob); ctx.lineTo(x+10,y+1+bob); ctx.lineTo(x+14,y+7+bob); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+25,y+8+bob); ctx.lineTo(x+22,y+1+bob); ctx.lineTo(x+18,y+7+bob); ctx.fill();
  ctx.fillStyle='#e8c0c0';
  ctx.beginPath(); ctx.moveTo(x+9,y+7+bob); ctx.lineTo(x+10,y+3+bob); ctx.lineTo(x+13,y+7+bob); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+23,y+7+bob); ctx.lineTo(x+22,y+3+bob); ctx.lineTo(x+19,y+7+bob); ctx.fill();
  // snout
  ctx.fillStyle='#95a5a6'; ctx.beginPath(); ctx.ellipse(x+16,y+19+bob,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2c3e50'; ctx.beginPath(); ctx.arc(x+16,y+17+bob,2,0,Math.PI*2); ctx.fill();
  // eyes (glowing red)
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(x+11,y+12+bob,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(x+21,y+12+bob,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(x+11,y+12+bob,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(x+21,y+12+bob,1.5,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#4a5568';
  if(wolf.frame){ ctx.fillRect(x+7,y+30+bob,6,8); ctx.fillRect(x+21,y+27+bob,6,8); }
  else { ctx.fillRect(x+7,y+27+bob,6,8); ctx.fillRect(x+21,y+30+bob,6,8); }
}

function drawDeer(sx,sy){
  if(!deer) return;
  const x=deer.x-sx, y=deer.y-sy, s=TILE, bob=deer.frame?-1:0;
  ctx.fillStyle='#00000028'; ctx.beginPath(); ctx.ellipse(x+s/2,y+s-3,9,2,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#c0844c';
  ctx.beginPath(); ctx.ellipse(x+s/2,y+s-14+bob,10,7,0,0,Math.PI*2); ctx.fill();
  // belly
  ctx.fillStyle='#e8a87c';
  ctx.beginPath(); ctx.ellipse(x+s/2,y+s-12+bob,7,5,0,0,Math.PI*2); ctx.fill();
  // neck+head
  ctx.fillStyle='#c0844c';
  ctx.fillRect(x+13,y+s-26+bob,7,10);
  ctx.beginPath(); ctx.arc(x+16,y+s-28+bob,8,0,Math.PI*2); ctx.fill();
  // ears
  ctx.fillStyle='#e8a87c';
  ctx.beginPath(); ctx.ellipse(x+10,y+s-32+bob,3,5,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+22,y+s-32+bob,3,5,0.4,0,Math.PI*2); ctx.fill();
  // antlers
  ctx.strokeStyle='#6b4226'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x+11,y+s-34+bob); ctx.lineTo(x+8,y+s-44+bob); ctx.lineTo(x+5,y+s-40+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+8,y+s-42+bob); ctx.lineTo(x+11,y+s-40+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+21,y+s-34+bob); ctx.lineTo(x+24,y+s-44+bob); ctx.lineTo(x+27,y+s-40+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+24,y+s-42+bob); ctx.lineTo(x+21,y+s-40+bob); ctx.stroke();
  // eyes
  ctx.fillStyle='#2c3e50'; ctx.beginPath(); ctx.arc(x+13,y+s-30+bob,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+20,y+s-30+bob,1.5,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#a06030';
  if(deer.moving&&deer.frame){ ctx.fillRect(x+8,y+s-8+bob,4,8); ctx.fillRect(x+20,y+s-11+bob,4,8); }
  else { ctx.fillRect(x+8,y+s-11+bob,4,8); ctx.fillRect(x+20,y+s-8+bob,4,8); }
  ctx.fillRect(x+13,y+s-10+bob,4,9); ctx.fillRect(x+17,y+s-10+bob,4,9);
}

function drawApples(sx,sy){
  const t=Date.now()/600;
  for(let a of apples){
    const x=a.tx*TILE-sx, y=a.ty*TILE-sy;
    if(x<-TILE||x>VW+TILE||y<-TILE||y>VH+TILE) continue;
    const bob=Math.sin(t+a.bob)*3;
    // glow
    ctx.fillStyle='#e74c3c22'; ctx.beginPath(); ctx.arc(x+TILE/2,y+TILE/2+bob,14,0,Math.PI*2); ctx.fill();
    // stem
    ctx.strokeStyle='#5d4037'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x+16,y+12+bob); ctx.lineTo(x+17,y+7+bob); ctx.stroke();
    // leaf
    ctx.fillStyle='#27ae60';
    ctx.beginPath(); ctx.ellipse(x+20,y+7+bob,4,2.5,0.5,0,Math.PI*2); ctx.fill();
    // apple
    const ag=ctx.createRadialGradient(x+13,y+14+bob,2,x+16,y+18+bob,10);
    ag.addColorStop(0,'#ff6b6b'); ag.addColorStop(1,'#c0392b');
    ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(x+16,y+18+bob,10,0,Math.PI*2); ctx.fill();
    // highlight
    ctx.fillStyle='#ff9999aa'; ctx.beginPath(); ctx.arc(x+13,y+14+bob,3.5,0,Math.PI*2); ctx.fill();
  }
}

function drawFireflies(sx,sy){
  const t=Date.now()/1000;
  for(let f of fireflies){
    f.x+=(Math.sin(t*0.7+f.phase)*0.3);
    f.y+=(Math.cos(t*0.5+f.phase)*0.3);
    f.x=((f.x-sx+W)%W)+sx; // wrap
    const px=f.x-sx, py=f.y-sy;
    if(px<0||px>VW||py<0||py>VH) continue;
    const alpha=0.4+Math.sin(t*3+f.phase)*0.4;
    ctx.fillStyle=`rgba(255,255,150,${alpha})`;
    ctx.beginPath(); ctx.arc(px,py,f.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,255,100,${alpha*0.4})`;
    ctx.beginPath(); ctx.arc(px,py,f.r*3,0,Math.PI*2); ctx.fill();
  }
}

function drawWorld(sx,sy){
  // tiles
  const tx0=Math.floor(sx/TILE), ty0=Math.floor(sy/TILE);
  const tx1=Math.ceil((sx+VW)/TILE), ty1=Math.ceil((sy+VH)/TILE);
  for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++){
    if(ty<0||ty>=ROWS||tx<0||tx>=COLS) continue;
    const t=MAP[ty][tx];
    if(t===2) continue; // drawn separately
    ctx.drawImage(getTileSprite(t,tx,ty),tx*TILE-sx,ty*TILE-sy);
    // water shimmer
    if(t===3){
      const wt=Date.now()/1200;
      ctx.fillStyle=`rgba(93,173,226,${0.15+Math.sin(wt+tx*0.5)*0.1})`;
      ctx.fillRect(tx*TILE-sx,ty*TILE-sy,TILE,TILE);
    }
  }
  // houses (2x2 blocks)
  const drawn=new Set();
  for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++){
    if(ty<0||ty>=ROWS||tx<0||tx>=COLS) continue;
    if(MAP[ty][tx]===2){
      const key=`${Math.floor(tx/2)*2}_${Math.floor(ty/2)*2}`;
      if(!drawn.has(key)){ drawn.add(key); drawHouse(Math.floor(tx/2)*2,Math.floor(ty/2)*2,sx,sy); }
    }
  }
  // well
  if(MAP[13][15]===6) drawWell(15,13,sx,sy);
}

// ─── MAIN LOOP ────────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  if(!gameRunning) return;
  const dt=Math.min(ts-lastTime,50); lastTime=ts;

  movePlayer(dt);
  animEnt(player,5,dt);
  moveWolf(dt);
  animEnt(wolf,4.5,dt);
  moveDeer(dt);
  animEnt(deer,3.5,dt);
  checkCollisions();

  // camera (smooth follow)
  const targetCX=player.x-VW/2, targetCY=player.y-VH/2;
  camX+=(targetCX-camX)*0.12;
  camY+=(targetCY-camY)*0.12;
  camX=Math.max(0,Math.min(W-VW,camX));
  camY=Math.max(0,Math.min(H-VH,camY));
  const sx=Math.round(camX), sy=Math.round(camY);

  // draw
  ctx.clearRect(0,0,VW,VH);
  // sky gradient at top
  const sky=ctx.createLinearGradient(0,0,0,VH*0.2);
  sky.addColorStop(0,'#1a3a0a'); sky.addColorStop(1,'#2d6a1b00');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH*0.2);

  drawWorld(sx,sy);
  drawApples(sx,sy);
  drawDeer(sx,sy);
  drawFireflies(sx,sy);
  drawWolf(sx,sy);
  drawPlayer(sx,sy);

  // vignette
  const vig=ctx.createRadialGradient(VW/2,VH/2,VH*0.3,VW/2,VH/2,VH*0.75);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'#00000055');
  ctx.fillStyle=vig; ctx.fillRect(0,0,VW,VH);

  requestAnimationFrame(loop);
}
</script>
