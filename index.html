<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Arena</title>

<style>
body{
margin:0;
font-family:Arial;
background:#040b08;
color:#eafff3;
}

.header{
padding:16px;
text-align:center;
background:#071c14;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
color:#10b981;
font-size:26px;
font-weight:900;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

/* battle card */
.battle{
background:#0b2a1d;
border:1px solid rgba(16,185,129,0.3);
border-radius:12px;
padding:14px;
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.name{
font-size:13px;
font-weight:bold;
}

.symbol{
font-size:11px;
opacity:0.7;
}

.bar{
margin-top:10px;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:6px;
overflow:hidden;
display:flex;
}

.fillA{
background:#10b981;
height:100%;
transition:0.5s;
}

.fillB{
background:#3b82f6;
height:100%;
transition:0.5s;
}

.vs{
text-align:center;
font-size:12px;
opacity:0.8;
margin-top:6px;
}
</style>
</head>

<body>

<div class="header">
<h1>CRYPTO ARENA ⚔️</h1>
</div>

<div class="container" id="arena">
Loading battles...
</div>

<script>

async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* 🧠 battle score */
function score(p){
let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
return vol / (liq + 1);
}

/* ⚔️ build battles */
function createBattles(pairs){

let battles = [];

for(let i=0;i<6;i+=2){

let a = pairs[i];
let b = pairs[i+1];

if(!a || !b) continue;

let sa = score(a);
let sb = score(b);

let total = sa + sb;

let pa = total ? (sa / total) * 100 : 50;
let pb = 100 - pa;

battles.push({
a,b,pa,pb
});
}

return battles;
}

/* 🎯 render */
function render(pairs){

let arena = document.getElementById("arena");
arena.innerHTML = "";

let battles = createBattles(pairs.slice(0,10));

battles.forEach(b=>{

arena.innerHTML += `
<div class="battle">

<div class="row">
<div>
<div class="name">${b.a.baseToken?.name}</div>
<div class="symbol">${b.a.baseToken?.symbol}</div>
</div>

<div class="vs">⚔️ VS ⚔️</div>

<div style="text-align:right">
<div class="name">${b.b.baseToken?.name}</div>
<div class="symbol">${b.b.baseToken?.symbol}</div>
</div>
</div>

<div class="bar">
<div class="fillA" style="width:${b.pa}%"></div>
<div class="fillB" style="width:${b.pb}%"></div>
</div>

<div class="vs">
A ${b.pa.toFixed(0)}% - ${b.pb.toFixed(0)}% B
</div>

</div>
`;
});

}

async function loop(){
let data = await getPairs();
render(data);
}

loop();
setInterval(loop, 5000);

</script>

</body>
</html>
