<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CITY RUN</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#ui{
position:fixed;
top:10px;left:10px;
color:#00ffcc;
font-family:Arial;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
z-index:10;
}
</style>
</head>
<body>

<div id="ui">
🪙 Score: <span id="score">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// 🌌 SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 80);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,10);

// 🖥️ RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHT
const light = new THREE.PointLight(0x00ffcc, 1.5);
light.position.set(10,20,10);
scene.add(light);

// 🌍 GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 🧊 PLAYER (NEON CUBE)
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({
color:0x00ffcc,
emissive:0x00ffcc
})
);
player.position.y = 0.5;
scene.add(player);

// 🏙️ CITY
for(let i=0;i<50;i++){
const b = new THREE.Mesh(
new THREE.BoxGeometry(
1+Math.random()*2,
Math.random()*8,
1+Math.random()*2
),
new THREE.MeshStandardMaterial({
color:0x222222,
emissive:0x111111
})
);

b.position.set(
(Math.random()-0.5)*60,
b.geometry.parameters.height/2,
(Math.random()-0.5)*60
);

scene.add(b);
}

// 🪙 COINS
let coins = [];
let score = 0;

for(let i=0;i<20;i++){
const c = new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshStandardMaterial({
color:0xffff00,
emissive:0x666600
})
);

c.position.set((Math.random()-0.5)*50,0.5,(Math.random()-0.5)*50);
scene.add(c);
coins.push(c);
}

// 🚗 CARS
let cars = [];
for(let i=0;i<6;i++){
const car = new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,2),
new THREE.MeshStandardMaterial({color:0xff0044})
);

car.position.set((Math.random()-0.5)*50,0.25,(Math.random()-0.5)*50);
scene.add(car);
cars.push(car);
}

// 📱 TOUCH CONTROL
let target = new THREE.Vector3();

document.addEventListener("mousemove",(e)=>{
target.x = (e.clientX/window.innerWidth - 0.5)*30;
target.z = (e.clientY/window.innerHeight - 0.5)*30;
});

document.addEventListener("touchmove",(e)=>{
target.x = (e.touches[0].clientX/window.innerWidth - 0.5)*30;
target.z = (e.touches[0].clientY/window.innerHeight - 0.5)*30;
});

// 🎮 LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE PLAYER
player.position.x += (target.x - player.position.x)*0.08;
player.position.z += (target.z - player.position.z)*0.08;

// CAMERA FOLLOW
camera.position.x = player.position.x;
camera.position.z = player.position.z + 12;
camera.lookAt(player.position);

// 🪙 COINS
coins.forEach(c=>{
if(c.visible && c.position.distanceTo(player.position)<1){
c.visible=false;
score++;
document.getElementById("score").innerText=score;
}
});

// 🚗 CARS MOVE
cars.forEach(c=>{
c.position.x += Math.sin(Date.now()*0.001 + c.position.z)*0.1;

if(c.position.distanceTo(player.position)<1.5){
score = Math.max(0, score-1);
}
});

// ROTATION EFFECT
player.rotation.y += 0.03;

renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
