<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background:#02120c;
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
background:#062d1d;
border-bottom:1px solid #10b981;
}

h1{
margin:0;
color:#10b981;
font-size:30px;
font-weight:900;
}

.container{
padding:12px;
max-width:900px;
margin:auto;
}

.card{
margin-top:12px;
padding:14px;
border-radius:12px;
background:#062d1d;
border:1px solid #10b981;
}

.badge{
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff3b3b;}

.dexBtn{
display:inline-block;
margin-top:10px;
padding:10px;
background:#10b981;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
<h1>DevScan</h1>
</div>

<div class="container">
<div id="feed">Connecting to market...</div>
</div>

<script>

/* ================= SAFE API (MULTI SOURCE) ================= */
async function getPairs(){

const urls = [
"https://api.dexscreener.com/latest/dex/search?q=solana",
"https://api.dexscreener.com/latest/dex/search?q=pump",
"https://api.dexscreener.com/latest/dex/tokens/solana"
];

for(let url of urls){
try{
let r = await fetch(url);
let d = await r.json();

if(d?.pairs?.length){
return d.pairs;
}
}catch(e){}
}

/* fallback dummy (prevents dead screen) */
return [{
baseToken:{name:"Waiting Market",symbol:"..."},
liquidity:{usd:1000},
volume:{h24:100},
priceUsd:"0.0001",
pairAddress:""
}];

}

/* ================= SCORE ================= */
function analyze(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;

let score = 30;

if(vol > 200) score += 20;
if(vol > liq * 0.5) score += 20;
if(liq > 1000) score += 10;

let label = "🟡 IDLE";

if(score > 70) label = "🐋 ACTIVE";
if(score > 85) label = "🔥 HOT";

return {score,label,liq,vol};
}

/* ================= RENDER ================= */
function render(pairs){

let feed = document.getElementById("feed");
feed.innerHTML = "";

let list = pairs.map(p=>({...p,...analyze(p)}));

list.sort((a,b)=>b.score-a.score);

list.slice(0,5).forEach(p=>{

feed.innerHTML += `
<div class="card">

<h3>${p.baseToken?.name || "Unknown"}</h3>
<p>${p.baseToken?.symbol || "?"}</p>

<p>💧 ${Math.round(p.liq)}</p>
<p>📊 ${Math.round(p.vol)}</p>

<p class="badge">${p.label} • ${p.score}</p>

</div>
`;
});

}

/* ================= LOOP ================= */
async function loop(){
const p = await getPairs();
render(p);
}

loop();
setInterval(loop, 7000);

</script>

</body>
</html>
