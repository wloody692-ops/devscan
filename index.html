<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
border-bottom:1px solid #10b981;
background:rgba(16,185,129,0.08);
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.container{
max-width:900px;
margin:auto;
padding:12px;
}

.card{
margin-top:12px;
padding:14px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-size:12px;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff3b3b;}

.dexBtn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
border-radius:10px;
background:#10b981;
color:#000;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1>DevScan</h1>
</div>

<div class="container">
<div id="feed">Loading market...</div>
</div>

<script>

async function getPairs(){
try{
const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
const d = await r.json();
return d?.pairs || [];
}catch(e){
return [];
}
}

/* 🧠 scoring بدون فلتر قاسي */
function score(p){

let liq = p.liquidity?.usd || 0;
let vol = p.volume?.h24 || 0;
let price = parseFloat(p.priceUsd || 0);
let mc = p.fdv || 0;

let spike = vol / (liq + 1);

let s = 20;

if(vol > 100) s += 20;
if(vol > 1000) s += 20;
if(spike > 1) s += 20;
if(liq > 1000) s += 10;

let label = "🟡 LOW";

if(s > 70) label = "🐋 ACTIVE";
if(s > 85) label = "🔥 HOT";

let range = price * (0.03 + spike / 50);

return {
score: s,
label,
liq,
vol,
mc,
price,
low: price - range,
high: price + range
};
}

/* 🧠 ALWAYS SHOW SOMETHING */
function render(pairs){

let feed = document.getElementById("feed");
feed.innerHTML = "";

if(!pairs || pairs.length === 0){
feed.innerHTML = "🔄 Waiting for market data...";
return;
}

let list = pairs.map(p => ({...p, ...score(p)}));

list.sort((a,b)=>b.score-a.score);

/* 🔥 ALWAYS TOP 5 EVEN IF WEAK */
list.slice(0,5).forEach(p=>{

let color = "red";
if(p.label.includes("HOT")) color = "green";
else if(p.label.includes("ACTIVE")) color = "orange";

let dex = p.pairAddress
? `https://dexscreener.com/solana/${p.pairAddress}`
: "#";

feed.innerHTML += `
<div class="card">

<h3>${p.baseToken?.name || "Unknown"}</h3>
<p style="opacity:0.7">${p.baseToken?.symbol || "???"}</p>

<p>💰 MC: $${Math.round(p.mc || 0)}</p>
<p>💧 Liquidity: $${Math.round(p.liq)}</p>
<p>📊 Volume: $${Math.round(p.vol)}</p>

<hr>

<p class="badge ${color}">
${p.label} • Score ${p.score}
</p>

<p>📊 Entry Zone</p>
<p><b>$${p.low.toFixed(8)} - $${p.high.toFixed(8)}</b></p>

<a class="dexBtn" href="${dex}" target="_blank">
Open DexScreener
</a>

</div>
`;
});

}

async function loop(){
const p = await getPairs();
render(p);
}

loop();
setInterval(loop, 6000);

</script>

</body>
</html>
