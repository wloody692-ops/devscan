<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CITY RUN</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000;
}

/* 🏪 STORE */
#store{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at top,#002b2b,#000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:50;
}

#icon{font-size:80px;}
#title{font-size:30px;color:#00ffcc;text-shadow:0 0 20px #00ffcc;}
#desc{opacity:0.7;text-align:center;max-width:300px;margin:10px;}

button{
padding:15px 40px;
border:none;
border-radius:12px;
background:#00ffcc;
font-size:18px;
font-weight:bold;
box-shadow:0 0 20px #00ffcc;
cursor:pointer;
}

/* 🎮 UI */
#ui{
position:fixed;
top:10px;left:10px;
color:#00ffcc;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
display:none;
z-index:10;
}

/* 📱 CONTROLS */
#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:none;
gap:10px;
z-index:10;
}

.btn{
width:60px;
height:60px;
background:rgba(0,255,204,0.15);
border:2px solid #00ffcc;
border-radius:12px;
color:#00ffcc;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- 🏪 STORE -->
<div id="store">
<div id="icon">🕴🏻</div>
<div id="title">NEON CITY RUN</div>
<div id="desc">Collect coins, survive traffic, level up, and explore neon city.</div>
<button id="play">▶ PLAY</button>
</div>

<!-- UI -->
<div id="ui">
🪙 Coins: <span id="coins">0</span><br>
❤️ HP: <span id="hp">3</span><br>
🏆 Level: <span id="lvl">1</span>
</div>

<!-- CONTROLS -->
<div id="controls">
<div class="btn" id="left">⬅️</div>
<div class="btn" id="up">⬆️</div>
<div class="btn" id="down">⬇️</div>
<div class="btn" id="right">➡️</div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2b5a1f2d2a.mp3?filename=cyberpunk-moonlight-ambient-116199.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// 🌌 SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 120);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,10);

// 🖥️ RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHT
const light = new THREE.PointLight(0x00ffcc, 2);
light.position.set(10,20,10);
scene.add(light);

// 🌍 GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(250,250),
new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// 🕴🏻 PLAYER
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ffcc,emissive:0x00ffcc})
);
player.position.y=0.5;
scene.add(player);

// 🪙 GAME STATE
let coinsArr=[];
let coins=0;
let hp=3;
let level=1;

// 💾 LOAD SAVE
if(localStorage.getItem("coins")){
coins=parseInt(localStorage.getItem("coins"));
hp=parseInt(localStorage.getItem("hp"));
level=parseInt(localStorage.getItem("level"));
}

// 🪙 COINS
for(let i=0;i<40;i++){
const c=new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshStandardMaterial({color:0xffff00,emissive:0x444400})
);
c.position.set((Math.random()-0.5)*120,0.5,(Math.random()-0.5)*120);
scene.add(c);
coinsArr.push(c);
}

// 🚗 CARS
let cars=[];
for(let i=0;i<10;i++){
const car=new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,2),
new THREE.MeshStandardMaterial({color:0xff0044})
);
car.position.set((Math.random()-0.5)*120,0.25,(Math.random()-0.5)*120);
scene.add(car);
cars.push(car);
}

// 🎮 INPUT
let move={x:0,z:0};

function bind(btn,x,z){
btn.addEventListener("touchstart",()=>{move.x=x;move.z=z;});
btn.addEventListener("touchend",()=>{move.x=0;move.z=0;});
btn.addEventListener("mousedown",()=>{move.x=x;move.z=z;});
btn.addEventListener("mouseup",()=>{move.x=0;move.z=0;});
}

bind(left,-1,0);
bind(right,1,0);
bind(up,0,-1);
bind(down,0,1);

// ▶ START
document.getElementById("play").onclick=()=>{
document.getElementById("store").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("controls").style.display="flex";
document.getElementById("music").play();
animate();
updateUI();
};

// 🧠 UI
function updateUI(){
document.getElementById("coins").innerText=coins;
document.getElementById("hp").innerText=hp;
document.getElementById("lvl").innerText=level;
}

// 🎮 LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
player.position.x += move.x*0.3;
player.position.z += move.z*0.3;

// CAMERA
camera.position.x=player.position.x;
camera.position.z=player.position.z+12;
camera.lookAt(player.position);

// 🪙 COINS
coinsArr.forEach(c=>{
c.rotation.y+=0.05;
if(c.visible && c.position.distanceTo(player.position)<1){
c.visible=false;
coins++;
if(coins%10===0) level++;
updateUI();
save();
}
});

// 🚗 CARS
cars.forEach(c=>{
c.position.x+=Math.sin(Date.now()*0.001+c.position.z)*0.05;
if(c.position.distanceTo(player.position)<1.5){
hp--;
updateUI();
save();
if(hp<=0){
gameOver();
}
}
});

renderer.render(scene,camera);
}

// 💾 SAVE
function save(){
localStorage.setItem("coins",coins);
localStorage.setItem("hp",hp);
localStorage.setItem("level",level);
}

// 💀 GAME OVER
function gameOver(){
alert("Game Over");
location.reload();
}

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
