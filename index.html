<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Arena</title>
</head>

<body style="background:#000;color:#0f0;font-family:Arial">

<h2>DEBUG MODE</h2>

<div id="app">Starting...</div>

<script>

const app = document.getElementById("app");

function show(msg){
app.innerHTML += "<div>"+msg+"</div>";
}

async function testAPI(){
try{

show("🔄 Fetching API...");

const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");

show("📡 Response status: " + res.status);

const data = await res.json();

show("📦 Data length: " + (data.pairs ? data.pairs.length : "NO PAIRS"));

if(!data.pairs || data.pairs.length === 0){
show("⚠️ EMPTY DATA FROM API");
return;
}

show("✅ API WORKING - showing first coin:");

let p = data.pairs[0];

show("Coin: " + p.baseToken?.name);
show("Symbol: " + p.baseToken?.symbol);

}catch(e){
show("❌ ERROR: " + e.message);
}

}

testAPI();

</script>

</body>
</html>
