<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevScan</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#052e1b,#02120c);
color:#eafff3;
}

.header{
padding:18px;
text-align:center;
border-bottom:1px solid #10b981;
background:rgba(16,185,129,0.08);
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
color:#10b981;
}

.twitterBtn{
display:inline-block;
margin-top:8px;
padding:8px 14px;
border-radius:8px;
background:#000;
color:#fff;
font-weight:bold;
text-decoration:none;
border:1px solid #10b981;
}

.container{
max-width:900px;
margin:auto;
padding:12px;
}

.card{
margin-top:12px;
padding:14px;
border-radius:14px;
border:1px solid #10b981;
background:rgba(6,45,29,0.9);
}

.badge{
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-size:12px;
}

.green{color:#00ff88;}
.orange{color:#ffb84d;}
.red{color:#ff3b3b;}

a.link{
display:inline-block;
margin-top:8px;
color:#10b981;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1>DevScan</h1>

<a class="twitterBtn" href="https://twitter.com/devscan1" target="_blank">
Twitter
</a>

</div>

<div class="container">
<div id="feed">Scanning whales...</div>
</div>

<script>

/* 🔊 ALERT */
function alertSound(){
const a=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
a.play();
}

/* FETCH */
async function getPairs(){
try{
const r=await fetch("https://api.dexscreener.com/latest/dex/search?q=solana");
const d=await r.json();
return d.pairs||[];
}catch{
return [];
}
}

/* 🐋 WHALE DETECTION CORE */
function whale(p){

let liq=p.liquidity?.usd||0;
let vol=p.volume?.h24||0;
let price=parseFloat(p.priceUsd||0);
let mc=p.fdv||0;

/* spike logic */
let spike = vol/(liq+1);

let score=50;

if(spike>2) score+=35;   // strong whale activity
if(spike>1) score+=15;
if(vol>15000) score+=20;
if(liq>2000 && liq<60000) score+=10;

/* signal */
let signal="❌ NO WHALE";

if(score>85) signal="🐋 STRONG WHALE ENTRY";
else if(score>65) signal="🟡 SUSPICIOUS FLOW";
else signal="❌ WEAK";

/* entry zone */
let range=price*(0.025 + spike/50);

return {
score,
signal,
liq,
vol,
mc,
price,
low:price-range,
high:price+range
};
}

/* RENDER */
function render(pairs){

let feed=document.getElementById("feed");
feed.innerHTML="";

let list=pairs.map(p=>{
let w=whale(p);
return {...p,...w};
});

list.sort((a,b)=>b.score-a.score);

list.slice(0,5).forEach(p=>{

let color="red";
if(p.signal.includes("STRONG")) color="green";
else if(p.signal.includes("SUSPICIOUS")) color="orange";

/* alert on whale */
if(p.signal.includes("STRONG")){
alertSound();
}

let dex=p.pairAddress
? `https://dexscreener.com/solana/${p.pairAddress}`
: "#";

feed.innerHTML+=`
<div class="card">

<h3>${p.baseToken?.symbol}</h3>

<p>💰 Market Cap: $${Math.round(p.mc||0)}</p>
<p>💧 Liquidity: $${Math.round(p.liq)}</p>
<p>📊 Volume: $${Math.round(p.vol)}</p>

<hr>

<p class="badge ${color}">
${p.signal} • Score ${p.score}
</p>

<p>📊 Entry Zone</p>
<p><b>$${p.low.toFixed(8)} - $${p.high.toFixed(8)}</b></p>

<a class="link" href="${dex}" target="_blank">
Open DexScreener
</a>

</div>
`;
});

}

async function loop(){
const p=await getPairs();
render(p);
}

loop();
setInterval(loop,8000);

</script>

</body>
</html>
