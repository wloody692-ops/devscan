<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON TRADER PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05060a;
color:#00ffcc;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #00ffcc33;
background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:300px 1fr;
height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
border-right:1px solid #00ffcc22;
overflow:auto;
}

.coin{
padding:12px;
border-bottom:1px solid #00ffcc11;
cursor:pointer;
}

.coin:hover{
background:rgba(0,255,204,0.05);
}

/* MAIN */
.main{
padding:10px;
}

/* SEARCH */
input{
width:95%;
margin:10px;
padding:10px;
border-radius:10px;
border:1px solid #00ffcc33;
background:#0b0f14;
color:#00ffcc;
}

/* PRICE */
.price{
font-size:28px;
font-weight:bold;
margin:10px;
}

.up{color:#00ff88}
.down{color:#ff3355}
</style>
</head>

<body>

<header>
<div>📊 NEON TRADER PRO</div>
<div>🟢 LIVE BINANCE DATA</div>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<input id="search" placeholder="Search coin...">

<div id="list"></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="price" id="title">BTCUSDT</div>
<div class="price" id="price">$0</div>
<div id="change">--</div>

<!-- TradingView Chart -->
<iframe id="chart"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark"
width="100%" height="500"></iframe>

</div>

</div>

<script>

let symbols=[
"BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT",
"DOGEUSDT","ADAUSDT","AVAXUSDT","TRXUSDT","MATICUSDT"
];

let prices={};
let selected="BTCUSDT";

// 📡 LIVE STREAM
let streams=symbols.map(s=>s.toLowerCase()+"@ticker").join("/");

let ws=new WebSocket(
`wss://stream.binance.com:9443/stream?streams=${streams}`
);

ws.onmessage=(e)=>{
let data=JSON.parse(e.data).data;

prices[data.s]={
price:parseFloat(data.c),
change:parseFloat(data.P)
};

updateUI();
renderList();
};

// 📊 UI UPDATE
function updateUI(){

if(!prices[selected]) return;

document.getElementById("price").innerText=
"$"+prices[selected].price;

let ch=prices[selected].change;

document.getElementById("change").innerText=
ch+"%";

document.getElementById("change").className=
ch>=0?"up":"down";
}

// 🪙 LIST
function renderList(){

let list=document.getElementById("list");
list.innerHTML="";

for(let s of symbols){

let p=prices[s];

let div=document.createElement("div");
div.className="coin";

div.innerHTML=`
<b>${s}</b><br>
${p?("$"+p.price):"loading..."}
`;

div.onclick=()=>{
selected=s;
document.getElementById("title").innerText=s;

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${s}&interval=1&theme=dark`;
};

list.appendChild(div);
}
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input",(e)=>{

let val=e.target.value.toUpperCase();

document.querySelectorAll(".coin").forEach(c=>{
c.style.display=c.innerText.includes(val)?"":"none";
});

});

</script>

</body>
</html>
